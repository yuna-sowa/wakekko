<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>わけっこ — Structured風デザインモック</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --coral:       #FF5C3A;
      --coral-deep:  #E84820;
      --coral-light: #FF8C6A;
      --coral-pale:  #FFF1EE;
      --coral-mid:   #FFD0C4;
      --bg:          #F5F3F0;
      --card:        #FFFFFF;
      --text-1:      #1C1917;
      --text-2:      #6B6560;
      --text-3:      #AAA49E;
      --border:      #EDE8E3;
      --shadow-sm:   0 1px 3px rgba(0,0,0,0.06), 0 4px 14px rgba(0,0,0,0.05);
      --shadow-md:   0 2px 8px rgba(0,0,0,0.08), 0 12px 36px rgba(0,0,0,0.07);
    }

    html, body {
      min-height: 100vh;
      background: #E8E5E0;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 0;
      font-family: 'Noto Sans JP', 'Plus Jakarta Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Phone shell */
    .phone {
      width: 390px;
      min-height: 844px;
      background: var(--bg);
      border-radius: 48px;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.12),
        0 24px 80px rgba(0,0,0,0.28),
        inset 0 0 0 1px rgba(255,255,255,0.4);
      overflow: hidden;
      position: relative;
    }

    /* Notch */
    .notch {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 126px; height: 34px;
      background: #1C1917;
      border-radius: 0 0 22px 22px;
      z-index: 10;
    }

    /* Status bar */
    .status-bar {
      height: 52px;
      padding: 16px 28px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 5;
    }
    .status-time {
      font-family: 'Plus Jakarta Sans', system-ui;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-1);
      letter-spacing: -0.3px;
    }
    .status-icons {
      display: flex;
      gap: 5px;
      align-items: center;
      color: var(--text-1);
    }

    /* Navigation bar */
    .nav {
      padding: 10px 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-pill {
      background: var(--coral-pale);
      color: var(--coral);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.8px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--coral-mid);
    }
    .nav-btn {
      width: 38px; height: 38px;
      background: var(--card);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      border: none;
    }

    /* Hero / Large title */
    .hero {
      padding: 22px 24px 6px;
    }
    .hero-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2.5px;
      color: var(--text-3);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .hero-title {
      font-size: 46px;
      font-weight: 900;
      color: var(--text-1);
      line-height: 1.0;
      letter-spacing: -2px;
      margin-bottom: 10px;
      font-family: 'Plus Jakarta Sans', 'Noto Sans JP', system-ui;
    }
    .hero-title em {
      font-style: normal;
      color: var(--coral);
    }
    .hero-sub {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text-2);
      line-height: 1.75;
    }

    /* Scroll area */
    .scroll {
      padding: 20px 16px 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Section label */
    .sec-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.8px;
      color: var(--text-3);
      text-transform: uppercase;
      padding: 0 8px;
    }

    /* Card */
    .card {
      background: var(--card);
      border-radius: 22px;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    /* ── Timeline card ── */
    .tl-card { padding: 20px 20px 6px; }
    .tl-card-head {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-3);
      letter-spacing: 1px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .tl-card-head::before {
      content: '';
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--coral);
      display: inline-block;
      flex-shrink: 0;
    }

    .tl-list { position: relative; }
    .tl-list::before {
      content: '';
      position: absolute;
      left: 15px; top: 10px; bottom: 32px;
      width: 1.5px;
      background: linear-gradient(to bottom, var(--coral-mid) 0%, transparent 100%);
    }

    .tl-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding-bottom: 18px;
    }
    .tl-icon {
      width: 32px; height: 32px;
      background: var(--coral-pale);
      border: 1.5px solid var(--coral-mid);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .tl-body { padding-top: 4px; }
    .tl-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-1);
      margin-bottom: 2px;
    }
    .tl-desc {
      font-size: 12px;
      color: var(--text-2);
      line-height: 1.55;
    }

    /* ── Receipt preview card ── */
    .receipt-card {
      background: linear-gradient(148deg, var(--coral) 0%, #FF8A55 100%);
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    .receipt-card::before {
      content: '';
      position: absolute;
      top: -48px; right: -48px;
      width: 160px; height: 160px;
      background: rgba(255,255,255,0.10);
      border-radius: 50%;
    }
    .receipt-card::after {
      content: '';
      position: absolute;
      bottom: -30px; left: -20px;
      width: 100px; height: 100px;
      background: rgba(255,255,255,0.06);
      border-radius: 50%;
    }
    .rc-eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2.5px;
      color: rgba(255,255,255,0.65);
      margin-bottom: 12px;
    }
    .rc-slip {
      background: rgba(255,255,255,0.96);
      border-radius: 14px;
      padding: 14px 16px;
      position: relative;
      z-index: 1;
    }
    .rc-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 12px;
      padding: 5px 0;
      color: #5A4A40;
      border-bottom: 1px dashed #EDE8E3;
    }
    .rc-row:last-child {
      border-bottom: none;
      font-weight: 800;
      color: var(--coral-deep);
      font-size: 13px;
      padding-top: 8px;
      margin-top: 2px;
    }
    .rc-row .nm { font-weight: 500; }
    .rc-row .pr { font-weight: 700; flex-shrink: 0; }
    .rc-arrow {
      margin-top: 14px;
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      display: flex;
      align-items: center;
      gap: 6px;
      position: relative;
      z-index: 1;
    }
    .rc-arrow-icon {
      width: 24px; height: 24px;
      background: rgba(255,255,255,0.22);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
    }

    /* ── People card ── */
    .people-card { padding: 20px; }
    .ppl-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .ppl-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-1);
    }
    .ppl-badge {
      background: var(--coral-pale);
      color: var(--coral);
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--coral-mid);
      transition: all 0.2s;
    }

    .stepper {
      display: flex;
      align-items: center;
      background: var(--bg);
      border-radius: 16px;
      padding: 4px;
      gap: 0;
    }
    .stp-btn {
      width: 46px; height: 46px;
      border-radius: 12px;
      border: none;
      background: transparent;
      font-size: 26px;
      color: var(--text-2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Plus Jakarta Sans', system-ui;
      font-weight: 300;
      transition: background 0.15s, color 0.15s;
      line-height: 1;
    }
    .stp-btn:not(:disabled):active { background: var(--border); color: var(--coral); }
    .stp-btn:disabled { color: var(--border); cursor: default; }
    .stp-val {
      flex: 1;
      text-align: center;
      font-family: 'Plus Jakarta Sans', system-ui;
      font-size: 36px;
      font-weight: 800;
      color: var(--text-1);
      letter-spacing: -2px;
      line-height: 1;
    }
    .stp-unit {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-2);
      letter-spacing: 0;
    }

    .ppl-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 14px;
    }
    .chip {
      height: 28px;
      padding: 0 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      display: flex; align-items: center;
      background: var(--coral-pale);
      color: var(--coral);
      border: 1px solid var(--coral-mid);
      transition: all 0.2s;
    }

    /* ── CTA ── */
    .cta-wrap {
      padding: 8px 16px 48px;
    }
    .btn-start {
      width: 100%;
      height: 60px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--coral) 0%, #FF8C5A 100%);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Noto Sans JP', system-ui;
      letter-spacing: 0.5px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: 10px;
      box-shadow: 0 6px 24px rgba(255,92,58,0.38), 0 2px 8px rgba(255,92,58,0.2);
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .btn-start:active {
      transform: scale(0.975);
      box-shadow: 0 2px 10px rgba(255,92,58,0.22);
    }
    .btn-icon { font-size: 20px; line-height: 1; }
    .btn-hint {
      text-align: center;
      font-size: 12px;
      color: var(--text-3);
      margin-top: 10px;
    }

    /* Animations */
    @keyframes rise {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .status-bar { animation: rise 0.4s 0.0s ease both; }
    .nav        { animation: rise 0.4s 0.04s ease both; }
    .hero       { animation: rise 0.45s 0.09s ease both; }
    .scroll > *:nth-child(1) { animation: rise 0.4s 0.14s ease both; }
    .scroll > *:nth-child(2) { animation: rise 0.4s 0.20s ease both; }
    .scroll > *:nth-child(3) { animation: rise 0.4s 0.20s ease both; }
    .scroll > *:nth-child(4) { animation: rise 0.4s 0.26s ease both; }
    .cta-wrap   { animation: rise 0.4s 0.32s ease both; }
  </style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>

  <!-- Status bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <!-- Signal bars -->
      <svg width="18" height="13" viewBox="0 0 18 13" fill="none">
        <rect x="0"  y="7"  width="3.5" height="6"  rx="1" fill="#1C1917"/>
        <rect x="5"  y="4.5" width="3.5" height="8.5" rx="1" fill="#1C1917"/>
        <rect x="10" y="2"  width="3.5" height="11" rx="1" fill="#1C1917"/>
        <rect x="15" y="0"  width="3"   height="13" rx="1" fill="#1C1917"/>
      </svg>
      <!-- WiFi -->
      <svg width="16" height="12" viewBox="0 0 24 18" fill="none" stroke="#1C1917" stroke-width="2.2" stroke-linecap="round">
        <path d="M1 6c5.8-5.8 16.2-5.8 22 0"/>
        <path d="M4.5 9.5c4-4 11-4 15 0"/>
        <path d="M8.5 13c2-2 5-2 7 0"/>
        <circle cx="12" cy="16.5" r="1.5" fill="#1C1917" stroke="none"/>
      </svg>
      <!-- Battery -->
      <svg width="27" height="13" viewBox="0 0 27 13" fill="none">
        <rect x="0.75" y="0.75" width="23.5" height="11.5" rx="3.25" stroke="#1C1917" stroke-width="1.5"/>
        <rect x="2.5" y="2.5" width="18" height="8" rx="2" fill="#1C1917"/>
        <path d="M25.5 4.5v4" stroke="#1C1917" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <!-- Nav -->
  <div class="nav">
    <div class="nav-pill">わけっこ</div>
    <button class="nav-btn" aria-label="設定">
      <svg width="16" height="16" fill="none" stroke="#6B6560" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="8" cy="8" r="2.5"/>
        <path d="M8 1.5v1.8M8 12.7v1.8M1.5 8h1.8M12.7 8h1.8M3.4 3.4l1.3 1.3M11.3 11.3l1.3 1.3M11.3 3.4l-1.3 1.3M3.4 11.3l1.3-1.3"/>
      </svg>
    </button>
  </div>

  <!-- Hero -->
  <div class="hero">
    <div class="hero-eyebrow">割り勘アプリ</div>
    <div class="hero-title">わけ<em>っ</em>こ</div>
    <div class="hero-sub">レシートを読み込むだけで<br>みんなの支払いを自動計算</div>
  </div>

  <!-- Cards -->
  <div class="scroll">

    <div class="sec-label">使い方</div>

    <!-- Timeline -->
    <div class="card tl-card">
      <div class="tl-card-head">3ステップで完了</div>
      <div class="tl-list">
        <div class="tl-row">
          <div class="tl-icon">📷</div>
          <div class="tl-body">
            <div class="tl-title">レシートを撮影</div>
            <div class="tl-desc">カメラまたはアルバムから読み込み</div>
          </div>
        </div>
        <div class="tl-row">
          <div class="tl-icon">✨</div>
          <div class="tl-body">
            <div class="tl-title">AIが自動認識</div>
            <div class="tl-desc">商品名・金額をかんたんに読み取り</div>
          </div>
        </div>
        <div class="tl-row">
          <div class="tl-icon">🎉</div>
          <div class="tl-body">
            <div class="tl-title">割り勘完了</div>
            <div class="tl-desc">ひとりひとりの金額をすぐ表示</div>
          </div>
        </div>
      </div>
    </div>

    <div class="sec-label">プレビュー</div>

    <!-- Receipt -->
    <div class="card receipt-card">
      <div class="rc-eyebrow">SAMPLE RECEIPT</div>
      <div class="rc-slip">
        <div class="rc-row"><span class="nm">ピザ マルゲリータ</span><span class="pr">¥1,200</span></div>
        <div class="rc-row"><span class="nm">生ビール ×3</span><span class="pr">¥1,500</span></div>
        <div class="rc-row"><span class="nm">カルボナーラ</span><span class="pr">¥980</span></div>
        <div class="rc-row"><span class="nm">合計</span><span class="pr">¥3,680</span></div>
      </div>
      <div class="rc-arrow">
        <div class="rc-arrow-icon">→</div>
        読み込んで割り勘スタート
      </div>
    </div>

    <div class="sec-label">人数</div>

    <!-- People count -->
    <div class="card people-card">
      <div class="ppl-head">
        <div class="ppl-title">何人で割り勘？</div>
        <div class="ppl-badge" id="pplBadge">3人</div>
      </div>
      <div class="stepper">
        <button class="stp-btn" id="btnMinus" onclick="change(-1)">−</button>
        <div class="stp-val"><span id="numVal">3</span><span class="stp-unit">人</span></div>
        <button class="stp-btn" id="btnPlus"  onclick="change(+1)">＋</button>
      </div>
      <div class="ppl-chips" id="chips"></div>
    </div>

  </div>

  <!-- CTA -->
  <div class="cta-wrap">
    <button class="btn-start">
      <span class="btn-icon">🧾</span>
      レシートを読み込む
    </button>
    <div class="btn-hint">写真・カメラどちらでもOK</div>
  </div>

</div>

<script>
  const NAMES = ['Aさん','Bさん','Cさん','Dさん','Eさん','Fさん','Gさん','Hさん'];
  let n = 3;
  function render() {
    document.getElementById('numVal').textContent = n;
    document.getElementById('pplBadge').textContent = n + '人';
    document.getElementById('btnMinus').disabled = n <= 2;
    document.getElementById('btnPlus').disabled  = n >= 8;
    document.getElementById('chips').innerHTML =
      NAMES.slice(0, n).map(l => `<div class="chip">${l}</div>`).join('');
  }
  function change(d) { n = Math.max(2, Math.min(8, n + d)); render(); }
  render();
</script>
</body>
</html>
