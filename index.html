<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>わけっこ - 割り勘アプリ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#F4A987">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Zen Maru Gothic', 'Hiragino Kaku Gothic ProN', sans-serif;
      background: linear-gradient(170deg, #FDF6EE 0%, #FAF0E6 45%, #F5E8DC 100%);
      color: #333333;
      min-height: 100vh;
      line-height: 1.75;
    }

    /* ========== ヘッダー / ロゴ ========== */
    .header {
      background: #fff;
      text-align: center;
      padding: 40px 16px 36px;
      border-bottom: 2px solid #E8D8CC;
      position: relative;
    }
    .header .btn-back {
      position: absolute;
      left: 16px;
      top: 18px;
    }
    .logo {
      font-size: 30px;
      font-weight: 900;
      color: #C9673A;
      letter-spacing: 8px;
      text-shadow: 0 2px 10px rgba(201,103,58,0.18);
    }
    .logo-sub {
      font-size: 12px;
      font-weight: 500;
      color: #A89080;
      margin-top: 6px;
      letter-spacing: 2px;
    }

    /* ========== レイアウト ========== */
    .layout {
      max-width: 540px;
      margin: 0 auto;
      padding: 36px 32px;
    }

    /* ========== カード共通 ========== */
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 2px 10px rgba(180,130,100,0.06);
      margin-bottom: 28px;
    }
    .card-title {
      font-size: 12px;
      font-weight: 700;
      color: #C9673A;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #F0E4D8;
      letter-spacing: 2px;
    }
    .add-form-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      margin-bottom: 0;
      border-bottom: none;
      padding-bottom: 0;
    }
    .add-form-title.open {
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #F0E4D8;
    }
    .add-form-title #addFormChevron {
      font-size: 10px;
      color: #ccc;
    }

    /* ========== フォーム ========== */
    .form-grid {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .form-grid input[type="text"] {
      flex: 1;
      min-width: 0;
    }
    .form-grid input[type="number"] {
      width: 100px;
      flex-shrink: 0;
    }
    .form-grid input {
      padding: 13px 18px;
      border: 1.5px solid #E8D8CC;
      border-radius: 16px;
      font-size: 14px;
      font-family: inherit;
      color: #333333;
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-grid input:focus {
      border-color: #C9673A;
      box-shadow: 0 0 0 3px rgba(201,103,58,0.12);
    }
    .form-grid input::placeholder { color: #ccc; }

    .btn-add {
      width: 100%;
      padding: 14px;
      background: #C9673A;
      color: #fff;
      border: none;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 2px;
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 3px 10px rgba(201,103,58,0.28);
    }
    .btn-add:hover { background: #B8592E; }
    .btn-add:active { transform: scale(0.98); }

    /* ========== 商品カード ========== */
    .item-card {
      background: #fff;
      border-radius: 18px;
      padding: 20px 22px;
      box-shadow: 0 2px 10px rgba(180,130,100,0.06);
      margin-bottom: 14px;
      animation: fadeUp 0.25s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item-card {
      cursor: pointer;
      user-select: none;
    }
    .item-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .item-card.open .item-top {
      margin-bottom: 14px;
    }
    .item-top > div:first-child { min-width: 0; flex: 1; }
    .btn-all {
      width: 100%; margin-top: 8px;
      padding: 6px 14px;
      background: #FDF6EE; border: 1.5px dashed #D8C4B0; border-radius: 20px;
      font-size: 12px; font-weight: 600; color: #B09070;
      cursor: pointer; font-family: inherit; text-align: center;
    }
    .btn-all.active {
      background: #F0E4D8; border-style: solid; border-color: #C9673A; color: #8A5030;
    }
    .item-name {
      font-size: 14px;
      font-weight: 700;
      color: #333333;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-all;
    }
    .item-price-badge {
      display: inline-block;
      font-size: 13px;
      font-weight: 700;
      color: #C9673A;
      background: #FFF5EE;
      padding: 4px 14px;
      border-radius: 10px;
      margin-top: 6px;
    }
    .item-del-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
    }
    .btn-del {
      background: #FDF6EE;
      border: 1px solid #E8D8CC;
      color: #C4A898;
      width: 30px;
      height: 30px;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .btn-del:hover {
      background: #F5E4D4;
      border-color: #C9673A;
      color: #9A4A28;
    }

    /* ========== メンバー選択ピル ========== */
    .checks {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pill input { display: none; }
    .pill label {
      display: inline-block;
      padding: 6px 18px;
      border: 1.5px solid #E8D8CC;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      color: #bbb;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    /* 自分: ピンク */
    .pill input:checked + label.cl-me {
      border-color: #F0A0A8;
      background: #FFF0F0;
      color: #C85060;
      font-weight: 700;
    }
    /* Aさん: ミント */
    .pill input:checked + label.cl-a {
      border-color: #90C8B8;
      background: #F0FAF6;
      color: #408070;
      font-weight: 700;
    }
    /* Bさん: ラベンダー */
    .pill input:checked + label.cl-b {
      border-color: #C0B0D8;
      background: #F5F0FA;
      color: #685088;
      font-weight: 700;
    }
    /* Cさん: アプリコット */
    .pill input:checked + label.cl-c {
      border-color: #E8C098;
      background: #FFF8F0;
      color: #A87030;
      font-weight: 700;
    }
    /* Dさん: スカイブルー（有料版） */
    .pill input:checked + label.cl-d {
      border-color: #90B8D8;
      background: #F0F6FA;
      color: #406080;
      font-weight: 700;
    }
    /* Eさん: セージグリーン（有料版） */
    .pill input:checked + label.cl-e {
      border-color: #A8C4A0;
      background: #F2FAF0;
      color: #407040;
      font-weight: 700;
    }
    /* Fさん: コーラルピーチ（有料版） */
    .pill input:checked + label.cl-f {
      border-color: #E8A898;
      background: #FFF5F2;
      color: #A04858;
      font-weight: 700;
    }
    /* Gさん: ゴールドオリーブ（有料版） */
    .pill input:checked + label.cl-g {
      border-color: #C8B870;
      background: #FAFAE8;
      color: #706830;
      font-weight: 700;
    }
    /* 全員 */
    .pill input:checked + label.cl-all {
      border-color: #C9673A;
      background: #FFF5EE;
      color: #8A4520;
      font-weight: 700;
    }

    .split-note {
      font-size: 11px;
      color: #bbb;
      margin-top: 10px;
    }
    .split-note b { color: #C9673A; }

    /* ========== インライン編集 ========== */
    .editable-field { cursor: pointer; }
    .edit-icon {
      font-size: 10px;
      color: #ddd;
      margin-left: 3px;
      vertical-align: middle;
      transition: color 0.15s;
    }
    .editable-field:hover .edit-icon,
    .editable-field:active .edit-icon { color: #C9673A; }
    .edit-input {
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      color: #333;
      border: 1.5px solid #C9673A;
      border-radius: 8px;
      padding: 3px 8px;
      outline: none;
      background: #FFF8F4;
      box-sizing: border-box;
      width: 100%;
    }
    .edit-price-input {
      width: 130px;
      text-align: right;
      font-size: 13px;
    }

    /* ========== 個数割り当てコントロール ========== */
    .qty-checks { display: flex; flex-direction: column; gap: 8px; }
    .qty-row { display: flex; align-items: center; justify-content: space-between; }
    .qty-label {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1.5px solid #E8D8CC;
      color: #bbb;
      min-width: 60px;
      text-align: center;
    }
    .qty-label.cl-me { border-color: #F0A0A8; background: #FFF0F0; color: #C85060; }
    .qty-label.cl-a  { border-color: #90C8B8; background: #F0FAF6; color: #408070; }
    .qty-label.cl-b  { border-color: #C0B0D8; background: #F5F0FA; color: #685088; }
    .qty-label.cl-c  { border-color: #E8C098; background: #FFF8F0; color: #A87030; }
    .qty-label.cl-d  { border-color: #90B8D8; background: #F0F6FA; color: #406080; }
    .qty-label.cl-e  { border-color: #A8C4A0; background: #F2FAF0; color: #407040; }
    .qty-label.cl-f  { border-color: #E8A898; background: #FFF5F2; color: #A04858; }
    .qty-label.cl-g  { border-color: #C8B870; background: #FAFAE8; color: #706830; }
    .qty-ctrl { display: flex; align-items: center; gap: 12px; }
    .qty-btn {
      background: #FDF6EE;
      border: 1.5px solid #E8D8CC;
      color: #C9673A;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      flex-shrink: 0;
    }
    .qty-btn:hover { background: #F5E4D4; }
    .qty-btn:disabled { opacity: 0.25; cursor: default; pointer-events: none; }
    .qty-num { font-size: 18px; font-weight: 700; color: #333; min-width: 24px; text-align: center; }
    .qty-unit-hint { font-size: 11px; font-weight: 400; color: #aaa; }
    .qty-remaining {
      font-size: 12px;
      font-weight: 700;
      text-align: right;
      margin-bottom: 6px;
      color: #C9673A;
    }
    .qty-remaining.complete { color: #5CBF8A; }
    .qty-total-hint { font-size: 11px; color: #ddd; margin-top: 4px; text-align: right; }
    .qty-mode-btn {
      font-size: 12px; color: #aaa; background: none;
      border: 1px dashed #ddd; border-radius: 10px;
      padding: 4px 12px; cursor: pointer; font-family: inherit;
    }
    .qty-mode-btn:hover { background: #f9f9f9; }

    .btn-split-all {
      width: 100%;
      padding: 8px 14px;
      background: #FDF6EE;
      border: 1.5px dashed #D8C4B0;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
      color: #9A5530;
      cursor: pointer;
      letter-spacing: 1px;
      margin-bottom: 8px;
      transition: all 0.2s;
      font-family: inherit;
      text-align: center;
    }
    .btn-split-all:hover { background: #F0E4D8; border-color: #C9673A; }
    .btn-split-all.active { background: #F0E4D8; border-style: solid; border-color: #C9673A; }

    .btn-all-split {
      width: 100%;
      padding: 10px 14px;
      background: #FDF6EE;
      border: 1.5px solid #E8D8CC;
      border-radius: 14px;
      font-size: 12px;
      font-weight: 700;
      color: #C9673A;
      cursor: pointer;
      letter-spacing: 1px;
      margin-bottom: 14px;
      transition: all 0.2s;
      font-family: inherit;
      text-align: center;
    }
    .btn-all-split:hover { background: #F0E4D8; border-color: #C9673A; }

    .empty-msg {
      text-align: center;
      color: #ccc;
      padding: 48px 16px;
      font-size: 13px;
    }

    /* ========== 結果: 合計カード ========== */
    .totals-grid {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 4px;
    }
    .totals-grid::-webkit-scrollbar { display: none; }
    .total-box {
      flex: 1 0 auto;
      min-width: 80px;
      text-align: center;
      padding: 20px 14px;
      border-radius: 18px;
    }
    .total-box.me { background: #FFF0F0; }
    .total-box.a  { background: #F0FAF6; }
    .total-box.b  { background: #F5F0FA; }
    .total-box.c  { background: #FFF8F0; }
    .total-box.d  { background: #F0F6FA; }
    .total-box.e  { background: #F2FAF0; }
    .total-box.f  { background: #FFF5F2; }
    .total-box.g  { background: #FAFAE8; }

    .total-name {
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    .total-box.me .total-name { color: #C85060; }
    .total-box.a  .total-name { color: #408070; }
    .total-box.b  .total-name { color: #685088; }
    .total-box.c  .total-name { color: #A87030; }
    .total-box.d  .total-name { color: #406080; }
    .total-box.e  .total-name { color: #407040; }
    .total-box.f  .total-name { color: #A04858; }
    .total-box.g  .total-name { color: #706830; }

    .total-yen {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.5px;
      white-space: nowrap;
      color: #333333;
    }

    /* ========== 内訳テーブル ========== */
    .detail-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13px;
    }
    .detail-table thead th {
      padding: 12px 6px;
      font-size: 11px;
      font-weight: 700;
      color: #bbb;
      text-align: center;
      border-bottom: 1px solid #F0E4D8;
    }
    .detail-table thead th:first-child { text-align: left; }
    .detail-table thead .h-me { color: #C85060; }
    .detail-table thead .h-a  { color: #408070; }
    .detail-table thead .h-b  { color: #685088; }
    .detail-table thead .h-c  { color: #A87030; }
    .detail-table thead .h-d  { color: #406080; }
    .detail-table thead .h-e  { color: #407040; }
    .detail-table thead .h-f  { color: #A04858; }
    .detail-table thead .h-g  { color: #706830; }

    .detail-table tbody td {
      padding: 11px 6px;
      text-align: center;
      border-bottom: 1px solid #FAF0E6;
    }
    .detail-table tbody tr:last-child td { border-bottom: none; }
    .detail-table tbody td:first-child {
      text-align: left;
      font-weight: 500;
      color: #666666;
      font-size: 12px;
      max-width: 100px;
      word-break: break-all;
    }
    .detail-table tbody td:first-child .cell-name {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .detail-table tbody tr.expanded td:first-child .cell-name {
      -webkit-line-clamp: unset;
      overflow: visible;
    }
    .detail-table tbody tr { cursor: pointer; transition: background 0.15s; }
    .detail-table tbody tr:active { background: #FAF0E6; }
    .detail-table .val  { color: #333333; font-weight: 700; font-size: 14px; }
    .detail-table .zero { color: #ddd; }
    .detail-table .adj-row td { border-top: 1px dashed #E8D8CC; }
    .detail-table .adj-row .cell-name { color: #bbb; font-size: 11px; line-height: 1.5; }
    .detail-table .adj-row small { display: block; color: #bbb; }
    .detail-table .adj-val { color: #bbb !important; font-weight: 500 !important; font-size: 12px !important; }
    .split-warning {
      background: #FFF5F0;
      border: 1px solid #FFD0B0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 12px;
      color: #C06020;
      margin-top: 12px;
      line-height: 1.6;
    }

    .detail-table tfoot td {
      padding: 14px 6px;
      font-weight: 900;
      font-size: 15px;
      text-align: center;
      border-top: 1px solid #F0E4D8;
      color: #333333;
    }
    .detail-table tfoot td:first-child { text-align: left; color: #666666; }

    .result-empty {
      text-align: center;
      color: #ccc;
      padding: 40px 0;
      font-size: 13px;
    }

    .btn-share {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      background: linear-gradient(145deg, #D4703E 0%, #C9673A 55%, #BE5D32 100%);
      color: #fff;
      border: none;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 2px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-share:active { opacity: 0.8; }
    .btn-share:disabled { background: #ddd; cursor: default; }

    /* ========== クリアボタン ========== */
    .btn-clear {
      width: 100%;
      padding: 13px;
      margin-bottom: 28px;
      background: #fff;
      color: #bbb;
      border: 1.5px solid #E8D8CC;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
    }
    .btn-clear:hover {
      background: #FAF0E6;
      border-color: #C9B8A8;
      color: #999;
    }

    /* ========== レスポンシブ ========== */
    @media (max-width: 480px) {
      .layout {
        padding: 24px 18px;
      }
      .total-box { min-width: 72px; padding: 18px 10px; }
      .total-yen { font-size: 22px; }
      .form-grid { gap: 8px; }
      .header { padding: 32px 16px 28px; }
      .logo { font-size: 26px; letter-spacing: 6px; }
    }
    @media (max-width: 400px) {
      .logo { font-size: 22px; letter-spacing: 4px; }
      .logo-sub { font-size: 11px; }
      .totals-grid { gap: 8px; }
      .total-box { min-width: 68px; padding: 16px 8px; }
      .total-yen { font-size: 20px; }
      .form-grid { flex-wrap: wrap; }
      .form-grid input[type="text"] { flex: 1 1 100%; }
      .form-grid input[type="number"] { flex: 1 1 100%; width: auto; }
      .detail-table { font-size: 12px; }
      .detail-table .val { font-size: 13px; }
    }

    /* ========== カメラ/ライブラリ画面 ========== */
    #screen-camera {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      background: #000;
      z-index: 50;
    }
    .camera-header {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: env(safe-area-inset-top, 16px) 20px 16px;
      padding-top: max(env(safe-area-inset-top, 0px), 16px);
      background: linear-gradient(rgba(0,0,0,0.35), transparent);
    }
    .btn-camera-close {
      background: none;
      border: none;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      padding: 8px 4px;
      letter-spacing: 0.5px;
      opacity: 0.9;
    }
    .camera-tabs {
      display: flex;
      background: rgba(255,255,255,0.18);
      border-radius: 20px;
      padding: 3px;
    }
    .camera-tab {
      padding: 7px 22px;
      border: none;
      border-radius: 17px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      background: transparent;
      color: rgba(255,255,255,0.65);
      transition: all 0.2s;
    }
    .camera-tab.active {
      background: #fff;
      color: #333;
    }
    #cameraView {
      position: absolute;
      inset: 0;
    }
    #cameraVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .camera-shutter-area {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 36px 0 max(env(safe-area-inset-bottom, 0px), 48px);
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(transparent, rgba(0,0,0,0.28));
    }
    .btn-shutter {
      width: 74px; height: 74px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.85);
      background: rgba(255,255,255,0.18);
      cursor: pointer;
      position: relative;
      transition: transform 0.1s, background 0.1s;
    }
    .btn-shutter::after {
      content: '';
      position: absolute;
      inset: 7px;
      border-radius: 50%;
      background: #fff;
    }
    .btn-shutter:active { transform: scale(0.91); }


    /* ========== スタート画面 ========== */
    #screen-start {
      min-height: 100vh;
      background: linear-gradient(170deg, #FDF6EE 0%, #FAF0E6 45%, #F5E8DC 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 28px 60px;
      position: relative;
      overflow: hidden;
    }
    #screen-main { display: none; }

    /* 背景グロー */
    .start-glow-top {
      position: absolute;
      top: -120px; left: 50%;
      transform: translateX(-50%);
      width: 480px; height: 480px;
      background: radial-gradient(circle, rgba(201,103,58,0.16) 0%, transparent 65%);
      pointer-events: none;
    }
    .start-glow-br {
      position: absolute;
      bottom: -100px; right: -80px;
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(201,103,58,0.12) 0%, transparent 65%);
      pointer-events: none;
    }

    /* フローティングドット */
    .start-dot {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }
    .start-dot--1 {
      width: 72px; height: 72px;
      background: rgba(201,103,58,0.07);
      top: 10%; right: -16px;
      animation: sdFloat 9s ease-in-out infinite;
    }
    .start-dot--2 {
      width: 44px; height: 44px;
      background: rgba(232,112,122,0.09);
      bottom: 22%; left: -10px;
      animation: sdFloat 11s 1s ease-in-out infinite reverse;
    }
    .start-dot--3 {
      width: 20px; height: 20px;
      background: rgba(201,103,58,0.11);
      top: 28%; left: 6%;
      animation: sdFloat 7s 2s ease-in-out infinite;
    }
    .start-dot--4 {
      width: 32px; height: 32px;
      background: rgba(232,112,122,0.07);
      top: 18%; right: 14%;
      animation: sdFloat 13s 0.5s ease-in-out infinite reverse;
    }

    /* レシートカード（ヒービジュアル） */
    .start-receipt {
      position: relative;
      width: 210px;
      background: #FFFFFF;
      border-radius: 3px 3px 12px 12px;
      padding: 22px 22px 26px;
      margin-bottom: 36px;
      box-shadow:
        0 6px 32px rgba(160,80,40,0.13),
        0 2px 8px rgba(160,80,40,0.08),
        0 0 0 1px rgba(201,103,58,0.06);
      animation: sdReceiptDrop 0.72s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    /* ミシン目（上部・下部は点線ボーダーで表現） */
    .start-receipt::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: repeating-linear-gradient(
        90deg,
        #EDD8C4 0px, #EDD8C4 6px,
        transparent 6px, transparent 12px
      );
      border-radius: 3px 3px 0 0;
    }
    .start-receipt::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 4px;
      background: repeating-linear-gradient(
        90deg,
        #EDD8C4 0px, #EDD8C4 6px,
        transparent 6px, transparent 12px
      );
      border-radius: 0 0 12px 12px;
    }

    .start-receipt-head {
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      color: #C9673A;
      letter-spacing: 3px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px dashed #EDD8C4;
    }
    .start-receipt-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 10.5px;
      color: #8A7060;
      margin-bottom: 6px;
      gap: 8px;
    }
    .start-receipt-row .rn {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .start-receipt-row .rp { font-weight: 700; color: #5A4A40; flex-shrink: 0; }
    .start-receipt-divider {
      border: none;
      border-top: 1px dashed #EDD8C4;
      margin: 12px 0;
    }
    .start-receipt-total {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-weight: 900;
      font-size: 14px;
      color: #C9673A;
    }

    /* ロゴ */
    .start-logo {
      font-size: 50px;
      font-weight: 900;
      color: #C9673A;
      letter-spacing: 12px;
      text-indent: 12px;
      margin-bottom: 10px;
      text-shadow: 0 3px 14px rgba(201,103,58,0.18);
      animation: sdFadeRise 0.55s 0.28s ease both;
    }

    /* タグライン */
    .start-tagline {
      font-size: 13px;
      font-weight: 500;
      color: #A89080;
      letter-spacing: 1.5px;
      text-align: center;

      animation: sdFadeRise 0.55s 0.42s ease both;
    }

    /* ========== 人数選択 ========== */
    .start-member-select {
      margin-top: 16px;
      margin-bottom: 32px;
      text-align: center;
      animation: sdFadeRise 0.55s 0.49s ease both;
    }
    .start-member-label {
      font-size: 11px;
      font-weight: 700;
      color: #B8A090;
      letter-spacing: 2.5px;
      margin-bottom: 16px;
    }
    .member-stepper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    .stepper-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 2px solid #E8D8CC;
      background: rgba(255,255,255,0.8);
      font-size: 22px;
      color: #C9673A;

    .stepper-btn:not(:disabled):hover { border-color: #C9673A; background: #fff; box-shadow: 0 2px 8px rgba(201,103,58,0.18); }
    .stepper-btn:disabled { color: #D4C4B8; cursor: default; }
    .stepper-display {
      font-size: 30px;
      font-weight: 900;
      color: #C9673A;
      min-width: 72px;
      text-align: center;
      letter-spacing: -0.5px;

    .stepper-unit {
      font-size: 16px;
      font-weight: 700;
      color: #B09888;
      margin-left: 1px;
    }
    .paid-toast {
      position: fixed;
      bottom: 52px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(50,35,25,0.86);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      padding: 10px 22px;
      border-radius: 22px;
      letter-spacing: 0.5px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s;
      z-index: 200;
      white-space: nowrap;
    }
    .paid-toast.show { opacity: 1; }

    /* CTAボタン行 */
    .btn-cta-row {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 320px;
      animation: sdFadeRise 0.55s 0.56s ease both;
    }

    .btn-start {
      flex: 1;
      min-width: 0;
      padding: 20px 16px;
      background: linear-gradient(145deg, #D4703E 0%, #C9673A 55%, #BE5D32 100%);
      color: #fff;
      border: none;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 1.5px;
      white-space: nowrap;
      cursor: pointer;
      box-shadow:
        0 10px 30px rgba(201,103,58,0.36),
        0 3px 8px rgba(201,103,58,0.20),
        inset 0 1px 0 rgba(255,255,255,0.18);
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* 履歴ボタン */
    .btn-history {
      flex: 0 0 auto;
      padding: 20px 16px;
      background: rgba(201,103,58,0.10);
      color: #C9673A;
      border: 2px solid rgba(201,103,58,0.22);
      border-radius: 100px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 1.5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
      transition: transform 0.15s, background 0.15s;
    }
    .btn-history:active {
      transform: scale(0.97);
      background: rgba(201,103,58,0.16);
    }
    .btn-start::before {
      content: '';
      position: absolute;
      top: -50%; left: -70%;
      width: 45%; height: 200%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
      transform: skewX(-20deg);
      animation: sdShimmer 3.5s 1.8s ease infinite;
    }
    .btn-start:active {
      transform: scale(0.97);
      box-shadow: 0 4px 14px rgba(201,103,58,0.28);
    }
    .btn-start-icon { font-size: 17px; }
    .btn-history-icon { font-size: 15px; line-height: 1; }

    /* フッター */
    .start-footer {
      margin-top: 28px;
      font-size: 11px;
      color: #C8B8B0;
      letter-spacing: 1px;
      animation: sdFadeRise 0.55s 0.7s ease both;
    }

    /* アニメーション */
    @keyframes sdReceiptDrop {
      from { opacity: 0; transform: translateY(-28px) rotate(-1.5deg) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)     rotate(0deg)    scale(1); }
    }
    @keyframes sdFadeRise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes sdShimmer {
      0%   { left: -70%; }
      100% { left: 160%; }
    }
    @keyframes sdFloat {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    /* ========== 履歴画面 ========== */
    #screen-history {
      min-height: 100vh;
      background: #FFF5F5;
      display: none;
      flex-direction: column;
    }
    .history-header {
      display: flex;
      align-items: center;
      padding: 20px 20px 0;
      position: relative;
      min-height: 52px;
      flex-shrink: 0;
    }
    .history-page-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      font-weight: 700;
      color: #7A5C48;
      letter-spacing: 2.5px;
    }
    .history-body {
      flex: 1;
      padding: 20px 24px 56px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }
    .history-empty {
      text-align: center;
      padding: 60px 0;
      color: #C8B8B0;
      font-size: 13px;
      letter-spacing: 1px;
      line-height: 2.2;
    }
    .history-card {
      background: #fff;
      border-radius: 20px;
      padding: 20px 22px;
      box-shadow: 0 2px 10px rgba(180,130,100,0.06);
    }
    .h-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .h-date {
      font-size: 10px;
      color: #B8A8A0;
      letter-spacing: 1px;
    }
    .h-total {
      font-size: 20px;
      font-weight: 900;
      color: #C9673A;
    }
    .h-store {
      font-size: 13px;
      font-weight: 700;
      color: #555;
      margin-bottom: 14px;
    }
    .h-items {
      border-top: 1px solid #F0E4D8;
      padding-top: 12px;
      margin-bottom: 16px;
    }
    .h-item-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #8A7060;
      margin-bottom: 5px;
    }
    .h-item-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-right: 12px;
    }
    .h-item-price { font-weight: 700; color: #5A4A40; flex-shrink: 0; }
    .h-item-more {
      font-size: 11px;
      color: #B8A8A0;
      margin-top: 4px;
    }
    .h-restore-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(145deg, #D4703E 0%, #C9673A 55%, #BE5D32 100%);
      color: #fff;
      border: none;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .h-restore-btn:active { opacity: 0.8; }
    .h-detail-btn {
      width: auto;
      padding: 10px 24px;
      background: #fff;
      color: #C9673A;
      border: 2px solid #C9673A;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .h-detail-btn:active { opacity: 0.8; }

    /* ========== 履歴詳細画面 ========== */
    #screen-history-detail {
      min-height: 100vh;
      background: #FFF5F5;
      display: none;
      flex-direction: column;
    }
    .h-detail-all-items .h-item-row { margin-bottom: 8px; }
    /* ========== レシート読み込み画面 ========== */
    #screen-upload {
      min-height: 100vh;
      background: #FAF8F4;
      display: none;
      flex-direction: column;
    }
    .upload-header {
      display: flex;
      align-items: center;
      padding: 20px 20px 0;
      position: relative;
      min-height: 52px;
    }
    .btn-back {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      color: #B09888;
      cursor: pointer;
      padding: 8px 4px;
      letter-spacing: 0.5px;
      z-index: 1;
    }
    .btn-back:active { opacity: 0.6; }
    .upload-page-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      font-weight: 700;
      color: #7A5C48;
      letter-spacing: 2.5px;
      white-space: nowrap;
    }
    .upload-body {
      flex: 1;
      padding: 28px 24px 56px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }
    /* 選択前: プレースホルダーゾーン */
    .upload-zone {
      display: block;
      width: 100%;
      aspect-ratio: 3 / 4;
      max-height: 52vh;
      border: 2px dashed #D4C4B8;
      border-radius: 24px;
      background: #FFFAF7;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      transition: border-color 0.2s, background 0.2s;
    }
    .upload-zone:hover       { border-color: #C9673A; background: #FFF6EF; }
    .upload-zone.has-image   { border-style: solid; border-color: #C9673A; }
    .upload-zone-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: opacity 0.2s;
    }
    .upload-zone.has-image .upload-zone-placeholder { opacity: 0; pointer-events: none; }
    .upload-zone-icon  { font-size: 52px; line-height: 1; }
    .upload-zone-label {
      font-size: 14px;
      font-weight: 700;
      color: #B09888;
      letter-spacing: 1.5px;
    }
    .upload-zone-sub {
      font-size: 11px;
      color: #C8B8B0;
      letter-spacing: 0.8px;
    }
    /* プレビュー画像 */
    .preview-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    .upload-zone.has-image .preview-img { display: block; }
    /* 選択済みバッジ */
    .preview-badge {
      position: absolute;
      bottom: 14px;
      right: 14px;
      background: rgba(201,103,58,0.88);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 6px 14px;
      border-radius: 20px;
      display: none;
    }
    .upload-zone.has-image .preview-badge { display: block; }
    /* ライブラリ / カメラ ボタン行 */
    .upload-btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .btn-upload-opt {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 18px 12px;
      background: #fff;
      border: 1.5px solid #E8D8CC;
      border-radius: 20px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      color: #8A6858;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(180,130,100,0.06);
    }
    .btn-upload-opt:hover  { background: #FFF5EE; border-color: #C9673A; color: #C9673A; }
    .btn-upload-opt:active { transform: scale(0.97); }
    .btn-upload-opt-icon   { font-size: 26px; line-height: 1; }
    /* 解析ボタン */
    .btn-analyze {
      width: 100%;
      padding: 20px 24px;
      background: #C9673A;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(201,103,58,0.30);
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s, opacity 0.2s;
      margin-top: 4px;
    }
    .btn-analyze:disabled {
      background: #D4C4B8;
      box-shadow: none;
      cursor: not-allowed;
      opacity: 0.65;
    }
    .btn-analyze:not(:disabled):hover  { background: #B8592E; box-shadow: 0 8px 24px rgba(201,103,58,0.38); }
    .btn-analyze:not(:disabled):active { transform: scale(0.97); box-shadow: 0 3px 12px rgba(201,103,58,0.22); }
    .upload-note {
      text-align: center;
      font-size: 11px;
      color: #C8B8B0;
      letter-spacing: 0.5px;
      line-height: 1.8;
    }

    /* ========== OCR解析結果 ========== */
    .ocr-result-box {
      background: #FFFAF7;
      border: 1.5px solid #E8D8CC;
      border-radius: 20px;
      padding: 20px;
    }
    .ocr-result-title {
      font-size: 12px;
      font-weight: 700;
      color: #C9673A;
      margin-bottom: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .ocr-text-area {
      font-size: 12px;
      color: #6A5848;
      line-height: 1.9;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 200px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
    }
    .ocr-parsed-list {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .ocr-parsed-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #FFF5EE;
      border-radius: 12px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      color: #7A5C48;
    }
    .ocr-parsed-item span:last-child {
      font-weight: 700;
      color: #C9673A;
    }
    .ocr-empty {
      text-align: center;
      color: #C8B8B0;
      font-size: 12px;
      padding: 12px 0;
      letter-spacing: 0.5px;
    }
