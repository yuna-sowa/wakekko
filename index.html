<script>
  /* ================================================================
     わけっこ — メインロジック
     ----------------------------------------------------------------
     OCR エンジン: Google Cloud Vision API (TEXT_DETECTION)
     APIキーの渡し方: URL パラメータ ?APIkey=YOUR_KEY
       例) https://yuna-sowa.github.io/wakekko/?APIkey=AIzaSy...
           http://localhost:8080/?APIkey=AIzaSy...
     ================================================================ */

  // ── 定数・状態 ────────────────────────────────────────────────
  const ALL_MEMBERS = [
    { key: 'me', label: '自分',  cl: 'cl-me', box: 'me', hcl: 'h-me', fcl: 'f-me' },
    { key: 'a',  label: 'Aさん', cl: 'cl-a',  box: 'a',  hcl: 'h-a',  fcl: 'f-a'  },
    { key: 'b',  label: 'Bさん', cl: 'cl-b',  box: 'b',  hcl: 'h-b',  fcl: 'f-b'  },
    { key: 'c',  label: 'Cさん', cl: 'cl-c',  box: 'c',  hcl: 'h-c',  fcl: 'f-c'  },
    { key: 'd',  label: 'Dさん', cl: 'cl-d',  box: 'd',  hcl: 'h-d',  fcl: 'f-d'  }, // 有料版
    { key: 'e',  label: 'Eさん', cl: 'cl-e',  box: 'e',  hcl: 'h-e',  fcl: 'f-e'  }, // 有料版
    { key: 'f',  label: 'Fさん', cl: 'cl-f',  box: 'f',  hcl: 'h-f',  fcl: 'f-f'  }, // 有料版
    { key: 'g',  label: 'Gさん', cl: 'cl-g',  box: 'g',  hcl: 'h-g',  fcl: 'f-g'  }, // 有料版
  ];
  const FREE_MAX = 4;
  let memberCount = Math.min(parseInt(localStorage.getItem('memberCount') || '2', 10), FREE_MAX);
  let MEMBERS = ALL_MEMBERS.slice(0, memberCount);

  const items = [];
  const $ = id => document.getElementById(id);
  let selectedFile = null;
  let currentParsedResult = null; // OCR解析結果を保持するグローバル変数
  let receiptTotal = 0; // OCRで取得したレシート合計金額（差額按分に使用）
  let currentHistoryId = null; // 現在のセッションに対応する履歴エントリのID

  // ── ユーティリティ ────────────────────────────────────────────

  // XSS 対策: ユーザー入力や外部テキストを innerHTML に埋め込む前にエスケープする
  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // 全角数字（IME 変換後など）を半角に統一して数値だけ返す
  function zenToHan(str) {
    return str
      .replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
      .replace(/[^0-9]/g, '');
  }

  // ── 画面切替 ──────────────────────────────────────────────────
  function showScreen(id) {
    ['screen-start', 'screen-upload', 'screen-main', 'screen-camera', 'screen-history', 'screen-history-detail'].forEach(s => {
      const el = $(s);
      if (el) el.style.display = 'none';
    });
    const target = $(id);
    if (target) target.style.display = ['screen-start', 'screen-upload', 'screen-camera', 'screen-history', 'screen-history-detail'].includes(id) ? 'flex' : 'block';
  }

  // ── OCR ──────────────────────────────────────────────────────

  /**
   * 画像ファイルを受け取り、プレビュー表示と OCR を開始する。
   * fileInput / cameraInput / startCameraInput の change イベントから呼ぶ共通エントリ。
   */
  function handleFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    selectedFile = file;

    // プレビュー表示（FileReader で data URL に変換して <img> に渡す）
    const reader = new FileReader();
    reader.onload = e => {
      $('previewImg').src = e.target.result;
      $('uploadZone').classList.add('has-image');
    };
    reader.readAsDataURL(file);

    analyzeReceipt(file);
  }

  /**
   * 画像ファイルを純粋な Base64 文字列に変換する。
   * Vision API のリクエストボディに埋め込むため、data:... プレフィックスは除去する。
   */
  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload  = e => resolve(e.target.result.split(',')[1]); // "data:image/...;base64," を除去
      reader.onerror = () => reject(new Error('ファイルの読み込みに失敗しました'));
      reader.readAsDataURL(file);
    });
  }

  /**
   * Google Cloud Vision API（TEXT_DETECTION）で OCR を実行し、結果を画面に表示する。
   *
   * APIキーは URL パラメータ ?APIkey=... から取得する。
   * キーが未指定の場合はエラーメッセージを表示して処理を中断する。
   *
   * 処理フロー:
   *   1. URLSearchParams から APIキーを取得
   *   2. 画像を Base64 に変換
   *   3. Vision API に POST → fullTextAnnotation.text を取得
   *   4. Claude API でテキストから商品・金額を抽出
   *   5. 結果を画面に表示し、割り勘リストへ追加するボタンを出す
   */
  async function analyzeReceipt(file) {
    const btnAnalyze = $('btnAnalyze');
    const ocrResult  = $('ocrResult');
    const ocrText    = $('ocrText');
    const ocrParsed  = $('ocrParsedList');
    const btnGoMain  = $('btnGoMain');

    // 解析中 UI にリセット
    btnAnalyze.disabled     = true;
    btnAnalyze.textContent  = '解析中…';
    ocrResult.style.display = 'block';
    ocrText.textContent     = '解析しています…';
    ocrParsed.innerHTML     = '';
    btnGoMain.style.display = 'none';

    try {
      // 1. URLパラメータから APIキーを取得
      const apiKey    = new URLSearchParams(window.location.search).get('APIkey');
      const claudeKey = new URLSearchParams(window.location.search).get('ClaudeKey');
      if (!apiKey)    throw new Error('Google APIキーが指定されていません。URLに ?APIkey=YOUR_KEY を追加してください。');
      if (!claudeKey) throw new Error('Claude APIキーが指定されていません。URLに &ClaudeKey=YOUR_KEY を追加してください。');

      // 2. 画像を Base64 に変換
      const base64Image = await fileToBase64(file);

      // 3. Vision API へ POST
      ocrText.textContent = '① 文字を読み取り中…';
      const endpoint = `https://vision.googleapis.com/v1/images:annotate?key=${apiKey}`;
      const response = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          requests: [{
            image:    { content: base64Image },
            features: [{ type: 'DOCUMENT_TEXT_DETECTION' }],
          }],
        }),
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        const msg = err?.error?.message ?? `HTTP ${response.status}`;
        throw new Error(`Vision API エラー: ${msg}`);
      }

      // 4. fullTextAnnotation.text を取得
      const data       = await response.json();
      const annotation = data?.responses?.[0]?.fullTextAnnotation;
      const text       = annotation?.text ?? '';

      // 生テキストをそのまま表示（デバッグ・確認用）
      ocrText.textContent = text.trim() || '（テキストを検出できませんでした）';

      // 5. Claude AI で商品・金額・店名・合計を抽出
      ocrParsed.innerHTML = '<div class="ocr-empty">② AIが商品リストを作成中…</div>';
      currentParsedResult = await parseReceiptWithClaude(text, claudeKey); // グローバルに保持

      if (currentParsedResult.items.length > 0) {
        const metaRows = [
          currentParsedResult.storeName   ? `<div class="ocr-parsed-item ocr-meta"><span>店名</span><span>${esc(currentParsedResult.storeName)}</span></div>` : '',
          currentParsedResult.totalAmount ? `<div class="ocr-parsed-item ocr-meta"><span>合計</span><span>¥${currentParsedResult.totalAmount.toLocaleString()}</span></div>` : '',
        ].join('');
        ocrParsed.innerHTML = metaRows + currentParsedResult.items
          .map(it => {
            const qtyBadge = it.quantity > 1 ? ` <small>×${it.quantity}</small>` : '';
            return `<div class="ocr-parsed-item">`
              + `<span>${esc(it.name)}${qtyBadge}</span>`
              + `<span>¥${it.price.toLocaleString()}</span>`
              + `</div>`;
          })
          .join('');
        btnGoMain.textContent   = '割り勘リストに追加して進む →';
        btnGoMain.style.display = 'block';
        btnGoMain.onclick = () => {
          console.log('[btnGoMain] 保存データ:', currentParsedResult);
          localStorage.setItem('currentParsedResult', JSON.stringify(currentParsedResult));
          saveToHistory(currentParsedResult);
          items.length = 0; // 既存データをクリアしてOCR結果のみ反映
          receiptTotal = currentParsedResult.totalAmount || 0;
          currentParsedResult.items.forEach(it => {
            const checked = {};
            MEMBERS.forEach(m => (checked[m.key] = false));
            const qty = {};
            MEMBERS.forEach(m => (qty[m.key] = 0));
            const newItem = {
              id: Date.now() + (Math.random() * 1000 | 0),
              name: it.name, price: it.price,
              quantity: it.quantity || 1, unitPrice: it.unitPrice || null,
              checked, qty, fromReceipt: true, splitAll: false, useQtyMode: false,
            };
            items.push(newItem);
          });
          render();
          showScreen('screen-main');
        };
      } else {
        ocrParsed.innerHTML     = '<div class="ocr-empty">商品と金額を自動検出できませんでした。手動で入力してください。</div>';
        btnGoMain.textContent   = '手動で入力する →';
        btnGoMain.style.display = 'block';
        btnGoMain.onclick       = () => showScreen('screen-main');
      }
    } catch (err) {
      ocrText.textContent = `エラー: ${err.message ?? 'OCR処理に失敗しました。もう一度お試しください。'}`;
      ocrResult.style.display = 'block';
    } finally {
      btnAnalyze.disabled    = false;
      btnAnalyze.textContent = '再解析する';
    }
  }

  /**
   * Claude AI に OCR テキストを渡して商品リストを返す。
   * @param {string} text - Vision API の fullTextAnnotation.text
   * @param {string} claudeKey - Claude API キー
   * @returns {Promise<{ storeName: string, totalAmount: number, items: {name:string, price:number}[] }>}
   */
  async function parseReceiptWithClaude(text, claudeKey) {
    const prompt = `あなたはレシート解析AIです。以下のレシートOCRテキストから商品情報を抽出し、JSONのみで返してください。説明文は不要です。

## 抽出ルール
- storeName: 店名（不明なら空文字）
- totalAmount: 合計金額の数値（¥・カンマなし）
- items: 商品リスト
  - name: 商品名（記号・コード類を除いた読みやすい名前）
  - price: 割引・クーポン適用後の正の整数
- TEL・ポイント・消費税・日時などはitemsに含めない
- 割引・クーポンは該当商品の価格に反映させ、itemsには含めない

## 金額の読み方
- 金額の後に「内」「外」「税」が付いている場合（例: 1,078内）は、それを除いた数字が金額
- 「¥」「￥」「\\」は通貨記号として無視し、数字部分だけを金額とする

## 2セクション形式のレシート（関西スーパー等）
- レシートには同じ商品が2回登場することがある（上部サマリーと下部明細）
- 商品名の前に「*」が付いている行は**明細セクション**の価格で、こちらが正確な元値
- 同じ商品が「*」ありと「*」なしで両方ある場合は、「*」付きの明細価格を優先すること
- 「自動割引1 10.00 -XX」の「-XX」が割引額で、その商品の元値から引いた値が最終価格
- 割引額はその商品元値のおよそ10%（例: 元値¥199 → 割引-19、元値¥89 → 割引-8）
- OCRの読み取り順の都合で割引行が**商品行より前**に現れる場合がある。その場合も直後の商品に適用する
- OCRが崩れて複数商品の価格・割引が混在した行になることがある。割引額と商品価格の10%の対応で正しく紐付けること
- 抽出完了後、全商品の最終価格の合計がレシートに記載された税抜き合計額（「税8%対象」の金額）と一致するか確認すること。不一致の場合は割引の紐付けを見直すこと

## コストコのレシート
- 価格末尾の \`T\`（10%）または \`E\`（8%）は税区分コードであり金額ではない（例: \`3,188 T\` → ¥3,188）
- **同名商品の重複排除禁止**：同じ商品名が複数回登場しても1件にまとめず、それぞれ別の購入として抽出すること。ただし \`>>> BOTTOM OF BASKET ITEM COUNT N <<<\` が付いている場合はN個購入を示すので、\`quantity: N, unitPrice: 単価, price: 単価×N\` の形式で1件として返す（例: 単価¥3,188×2個 → \`quantity: 2, unitPrice: 3188, price: 6376\`）
- **CPNブロックの処理**：\`CPN\` 行を含むブロックはクーポン詳細であり、以下のルールで処理する
  - CPNブロック内の \`NNN-T\` や \`NNN-E\`（例: \`600-T\`・\`240-T\`・\`300-E\`）はクーポン割引額。直近の商品の元値からこの金額を引いた値が最終価格（元値 − 割引額）
  - 末尾が \`TPD\` の行（例: \`MERRIES B SELF TPD\`・\`TOILET BRUSH TPD\`）はクーポン名のため **itemsに含めない**
  - 末尾に \`CPN\` を含む名前（例: \`イトウエンムキチャクロマメCPN\`）はクーポン名のため **itemsに含めない**（前後の商品に割引を適用）
  - \`*\` 単独行はCPNブロック内の区切り記号のため無視する
- **元値と最終価格の使い分け**：同一商品に \`2,998 2,998 T\`（最終価格）と \`3.988 T\`（割引前元値）の両方がある場合は小さい方の価格（割引後）を使う
- **除外すべき行**：CPN（単独行）・SUBTOTAL・TOTAL・TAX・IRC・B.O.B・末尾が \`TPD\` の行（例: \`MERRIES B SELF TPD\`、\`TOILET BRUSH TPD\`）
- \`数字@\` は数量マーカーであり商品名ではない（例: \`1@\`・\`2@\`）

## 複数行にまたがる商品の読み方
- 「単価×数量」「@単価 数量」のような行は商品名ではなく数量・単価の補足行
- その場合、商品名はその直前の行、金額はその補足行に記載された合計金額を使う
- 例：
  おむつ           ← 商品名
  ¥298×2  596内   ← 単価×数量。商品名=おむつ、金額=596

## 個数がある商品の読み方
- 「ランチプレート ¥1,500×3 4,500内」のように単価・個数・合計がある場合は quantity と unitPrice も返す
- quantity: 個数（整数）、unitPrice: 単価（整数）、price: 合計金額（unitPrice × quantity）
- 個数が1または不明な場合は quantity と unitPrice は省略する

## 返答形式（JSONのみ、余分なテキストなし）
{"storeName":"","totalAmount":0,"items":[{"name":"","price":0,"quantity":3,"unitPrice":1500}]}

OCRテキスト:
${text}`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': claudeKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 2048,
        messages: [{ role: 'user', content: prompt }],
      }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      const msg = err?.error?.message ?? `HTTP ${res.status}`;
      throw new Error(`Claude API エラー: ${msg}`);
    }

    const data    = await res.json();
    const content = data?.content?.[0]?.text ?? '';
    const match   = content.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('Claude APIの応答からJSONを取得できませんでした');

    const parsed = JSON.parse(match[0]);
    return {
      storeName:   String(parsed.storeName  ?? '').trim(),
      totalAmount: Number(parsed.totalAmount) || 0,
      items: (parsed.items ?? [])
        .map(it => {
          const quantity  = Number(it.quantity)  || 1;
          const rawPrice  = Number(it.price)     || 0;
          const rawUnit   = Number(it.unitPrice) || 0;
          // AIが単価を price として返すケースを補正:
          // unitPrice が設定済みで price が単価と等しい（＝合計未計算）なら price を再計算
          let price = rawPrice;
          let unitPrice = null;
          if (quantity > 1) {
            if (rawUnit > 0) {
              unitPrice = rawUnit;
              // price が単価と一致する場合のみ合計に補正（AIが単価を返したケース）
              price = rawPrice === rawUnit ? rawUnit * quantity : rawPrice;
            } else {
              unitPrice = Math.round(rawPrice / quantity);
            }
          }
          return {
            name:      String(it.name ?? '').trim(),
            price,
            quantity:  quantity > 1 ? quantity : 1,
            unitPrice: quantity > 1 ? unitPrice : null,
          };
        })
        .filter(it => it.name && it.price > 0),
    };
  }

  // ── 商品リスト操作 ────────────────────────────────────────────
  function addItem() {
    const name  = $('itemName').value.trim();
    const price = parseInt($('itemPrice').value, 10);
    if (!name)                     { $('itemName').focus();  return; }
    if (isNaN(price) || price < 0) { $('itemPrice').focus(); return; }

    const checked = {};
    MEMBERS.forEach(m => (checked[m.key] = false));
    const newId = Date.now();
    items.push({ id: newId, name, price, quantity: 1, unitPrice: null, checked, qty: {}, fromReceipt: false, splitAll: false, useQtyMode: false });

    $('itemName').value  = '';
    $('itemPrice').value = '';
    $('itemName').focus();
    render();
  }

  function deleteItem(id) {
    const i = items.findIndex(x => x.id === id);
    if (i === -1) return;
    const item = items[i];
    if (item.fromReceipt) receiptTotal = Math.max(0, receiptTotal - item.price);
    items.splice(i, 1);
    if (editingState?.id === id) editingState = null;
    render();
  }

  function toggle(itemId, key) {
    const item = items.find(x => x.id === itemId);
    if (item) { item.checked[key] = !item.checked[key]; render(); }
  }

  window.toggleMember = function(id, key) {
    const item = items.find(x => x.id === id);
    if (!item) return;
    item.splitAll = false;
    item.checked[key] = !item.checked[key];
    render();
  };

  window.toggleAll = function(id) {
    const item = items.find(x => x.id === id);
    if (!item) return;
    const allChecked = MEMBERS.every(m => item.checked[m.key]);
    MEMBERS.forEach(m => (item.checked[m.key] = !allChecked));
    item.splitAll = false;
    render();
  };

  // ── インライン編集 ───────────────────────────────────────────
  let editingState = null; // { id, field: 'name' | 'price' }

  function startEdit(id, field) {
    editingState = { id, field };
    render();
  }

  function saveEdit(id, field, value) {
    if (!editingState) return; // blur が Enter 後に二重発火するのを防ぐ
    const item = items.find(x => x.id === id);
    if (item) {
      if (field === 'name') {
        const v = value.trim();
        if (v) item.name = v;
      } else if (field === 'price') {
        const v = parseInt(String(value).replace(/[^0-9]/g, ''), 10);
        if (!isNaN(v) && v > 0) {
          item.price = v;
          if (item.quantity > 1) item.unitPrice = Math.round(v / item.quantity);
        }
      }
    }
    editingState = null;
    render();
  }

  function cancelEdit() {
    editingState = null;
    render();
  }

  function setQty(itemId, key, val) {
    const item = items.find(x => x.id === itemId);
    if (!item) return;
    const currentTotal = MEMBERS.reduce((s, m) => s + (item.qty[m.key] || 0), 0);
    const delta = val - (item.qty[key] || 0);
    if (delta > 0 && currentTotal + delta > item.quantity) return;
    item.qty[key] = Math.max(0, val);
    render();
  }

  window.setSplitAll = function(id, val) {
    const item = items.find(x => x.id === id);
    if (item) { item.splitAll = val; render(); }
  };

  window.setQtyMode = function(id, val) {
    const item = items.find(x => x.id === id);
    if (item) { item.useQtyMode = val; render(); }
  };

  window.setAllSplitAll = function() {
    items.forEach(item => {
      if (item.quantity > 1 && item.useQtyMode) {
        item.splitAll = true;
      } else {
        MEMBERS.forEach(m => (item.checked[m.key] = true));
        item.splitAll = false;
      }
    });
    render();
  };

  // 各メンバーの負担額を計算する。
  // 端数の+1円は itemIdx でローテーションして分配する。同じ割り方のメンバー間で
  // 何商品あっても最大差が1円に収まる。
  // チェックなし／個数未割り当ての場合は「自分」に全額を加算する。
  function calcShares(item, itemIdx = 0) {
    const shares = {};
    MEMBERS.forEach(m => (shares[m.key] = 0));

    if (item.splitAll) {
      const base   = Math.floor(item.price / MEMBERS.length);
      const rem    = item.price % MEMBERS.length;
      const offset = itemIdx % MEMBERS.length;
      MEMBERS.forEach((m, i) => { shares[m.key] = base + ((i + offset) % MEMBERS.length < rem ? 1 : 0); });
      return shares;
    }

    if (item.quantity > 1 && item.useQtyMode) {
      const assigned = MEMBERS.filter(m => (item.qty?.[m.key] || 0) > 0);
      const totalAssigned = MEMBERS.reduce((s, m) => s + (item.qty?.[m.key] || 0), 0);
      if (totalAssigned === 0) return shares; // 未割り当て → 全員0（表では「-」表示）
      assigned.forEach(m => {
        shares[m.key] = Math.round(item.price * item.qty[m.key] / item.quantity);
      });
      if (totalAssigned === item.quantity) {
        const sum     = assigned.reduce((s, m) => s + shares[m.key], 0);
        let rem       = item.price - sum;
        const offset  = itemIdx % assigned.length;
        const rotated = [...assigned.slice(offset), ...assigned.slice(0, offset)];
        for (const m of rotated) { if (rem <= 0) break; shares[m.key]++; rem--; }
      }
      return shares;
    }

    const sel = MEMBERS.filter(m => item.checked[m.key]);
    if (sel.length === 0) { shares.me = item.price; return shares; }
    const base   = Math.floor(item.price / sel.length);
    const rem    = item.price % sel.length;
    const offset = itemIdx % sel.length;
    sel.forEach((m, i) => { shares[m.key] = base + ((i + offset) % sel.length < rem ? 1 : 0); });
    return shares;
  }

  /**
   * レシート合計に基づく割り勘計算。
   * レシート商品のみで差額を計算し、手動商品は別途加算する。
   *
   * ケース2（差額正）: 差額を購入比率で自動按分 → adjRow を返す
   * ケース3（差額負・5%未満）: 同上（マイナス按分）
   * ケース3（差額負・5%以上）: 調整せず警告を返す
   *
   * @returns {{ finals, adjRow, warning }}
   */
  function calcSplitByReceipt(itemList, receiptTotal, payer = 'me') {
    const keys = MEMBERS.map(m => m.key);

    // レシート商品の各人合計
    const receiptRaw = {};
    keys.forEach(k => (receiptRaw[k] = 0));
    itemList.forEach((item, idx) => {
      if (!item.fromReceipt) return;
      const sh = calcShares(item, idx);
      keys.forEach(k => (receiptRaw[k] += sh[k]));
    });

    // 手動商品の各人合計
    const manualRaw = {};
    keys.forEach(k => (manualRaw[k] = 0));
    itemList.forEach((item, idx) => {
      if (item.fromReceipt) return;
      const sh = calcShares(item, idx);
      keys.forEach(k => (manualRaw[k] += sh[k]));
    });

    // 差額計算（レシート商品のみ）
    const receiptItemsTotal = keys.reduce((s, k) => s + receiptRaw[k], 0);
    const diff = receiptTotal - receiptItemsTotal;

    const adj = {};
    keys.forEach(k => (adj[k] = 0));
    let adjRow = null, warning = null;

    if (diff !== 0) {
      const diffRate = Math.abs(diff) / receiptTotal;
      if (diff > 0 || diffRate < 0.05) {
        // 自動按分（購入比率で分配）
        if (receiptItemsTotal > 0) {
          keys.forEach(k => { adj[k] = Math.round((receiptRaw[k] / receiptItemsTotal) * diff); });
        } else {
          adj[payer] = diff;
        }
        // 端数補正
        const adjSum = keys.reduce((s, k) => s + adj[k], 0);
        adj[payer] += diff - adjSum;
        adjRow = { adj: { ...adj }, total: diff };
      } else {
        // 5%以上のマイナス差額 → 警告、調整なし
        warning = { diff, rate: Math.round(diffRate * 100) };
      }
    }

    const finals = {};
    keys.forEach(k => (finals[k] = receiptRaw[k] + adj[k] + manualRaw[k]));
    return { finals, adjRow, warning };
  }

  // 商品カードに表示する割り勘ヒント文を返す
  function hint(item) {
    if (item.splitAll) return `全員 (${MEMBERS.length}人) で <b>均等割り</b>`;
    if (item.quantity > 1 && item.useQtyMode) {
      const totalAssigned = MEMBERS.reduce((s, m) => s + (item.qty?.[m.key] || 0), 0);
      if (totalAssigned === 0) return `<b>⚠️ ${item.quantity}個を誰かに割り当ててください</b>`;
      const parts = MEMBERS.filter(m => (item.qty?.[m.key] || 0) > 0)
        .map(m => `${m.label}×${item.qty[m.key]}`).join(' ＋ ');
      const unassigned = item.quantity - totalAssigned;
      const suffix = unassigned > 0
        ? `　<b>⚠️ 残り${unassigned}個を割り当ててください</b>`
        : '　<b>✓ 割り当て完了</b>';
      return parts + suffix;
    }
    const sel = MEMBERS.filter(m => item.checked[m.key]);
    if (sel.length === 0) return '<b>自分に全額加算</b>';
    if (sel.length === MEMBERS.length) return `全員 (${MEMBERS.length}人) で <b>均等割り</b>`;
    return `${sel.map(m => m.label).join(' + ')} で <b>${sel.length}人割り</b>`;
  }

  function render() {
    if (items.length === 0) {
      $('itemList').innerHTML      = '<div class="empty-msg">商品を追加すると、ここに一覧が表示されます</div>';
      $('resultContent').innerHTML = '<div class="result-empty">商品を追加するとここに結果が表示されます</div>';
      return;
    }

    $('itemList').innerHTML = items.map(item => {
      let controls, priceBadge;
      const isEditName  = item.fromReceipt && editingState?.id === item.id && editingState?.field === 'name';
      const isEditPrice = item.fromReceipt && editingState?.id === item.id && editingState?.field === 'price';

      // priceBadge: 複数個は常に単価×個数を表示
      priceBadge = item.quantity > 1
        ? `¥${item.price.toLocaleString()} <span class="qty-unit-hint">(¥${item.unitPrice.toLocaleString()}×${item.quantity})</span>`
        : `¥${item.price.toLocaleString()}`;

      if (item.quantity > 1 && item.useQtyMode) {
        // 個数割り当てモード
        const totalAssigned = MEMBERS.reduce((s, m) => s + (item.qty?.[m.key] || 0), 0);
        const remaining = item.quantity - totalAssigned;
        const complete  = remaining === 0;
        const qtyRows = MEMBERS.map(m => {
          const v = item.qty?.[m.key] || 0;
          const minusDis = v <= 0        ? 'disabled' : '';
          const plusDis  = remaining <= 0 ? 'disabled' : '';
          return `<div class="qty-row">`
            + `<span class="qty-label ${m.cl}">${esc(m.label)}</span>`
            + `<div class="qty-ctrl">`
            +   `<button class="qty-btn" onclick="setQty(${item.id},'${m.key}',${v - 1})" ${minusDis}>−</button>`
            +   `<span class="qty-num">${v}</span>`
            +   `<button class="qty-btn" onclick="setQty(${item.id},'${m.key}',${v + 1})" ${plusDis}>＋</button>`
            + `</div>`
            + `</div>`;
        }).join('');
        const remainingLabel = complete
          ? `<div class="qty-remaining complete">✓ 全${item.quantity}個を割り当て済み</div>`
          : `<div class="qty-remaining">残り ${remaining}個</div>`;
        const backBtn = `<div style="margin-top:8px"><button class="qty-mode-btn" onclick="event.stopPropagation();setQtyMode(${item.id},false)">個数指定をやめる</button></div>`;
        controls = remainingLabel + `<div class="qty-checks">${qtyRows}</div>` + backBtn;
      } else {
        // チェックモード（1個・複数個共通）
        const memberPills = MEMBERS.map(m => {
          const uid = `c_${item.id}_${m.key}`;
          const chk = item.checked[m.key] ? 'checked' : '';
          return `<span class="pill">`
            + `<input type="checkbox" id="${uid}" ${chk} onchange="event.stopPropagation();toggleMember(${item.id},'${m.key}')">`
            + `<label for="${uid}" class="${m.cl}">${esc(m.label)}</label>`
            + `</span>`;
        }).join('');
        const allChecked = MEMBERS.every(m => item.checked[m.key]);
        const allBtn = `<button class="btn-all${allChecked ? ' active' : ''}" onclick="event.stopPropagation();toggleAll(${item.id})">みんなで割る（${MEMBERS.length}人）</button>`;
        const qtyModeBtn = item.quantity > 1
          ? `<div style="margin-top:8px"><button class="qty-mode-btn" onclick="event.stopPropagation();setQtyMode(${item.id},true)">個数を振り分ける</button></div>`
          : '';
        controls = `<div class="checks">${memberPills}</div>${allBtn}${qtyModeBtn}`;
      }

      // 商品名 HTML（レシート商品は常に編集可）
      const nameHtml = isEditName
        ? `<input class="edit-input edit-input-focus" type="text" value="${esc(item.name)}"
             onclick="event.stopPropagation()"
             onkeydown="if(event.key==='Enter'){event.preventDefault();saveEdit(${item.id},'name',this.value)}else if(event.key==='Escape'){cancelEdit()}"
             onblur="saveEdit(${item.id},'name',this.value)">`
        : `<div class="item-name${item.fromReceipt ? ' editable-field' : ''}"${item.fromReceipt ? ` onclick="event.stopPropagation();startEdit(${item.id},'name')"` : ''}>${esc(item.name)}${item.fromReceipt ? '<span class="edit-icon">✎</span>' : ''}</div>`;

      // 価格バッジ HTML（レシート商品は常に編集可）
      const badgeHtml = isEditPrice
        ? `<span class="item-price-badge"><input class="edit-input edit-price-input edit-input-focus" type="number" value="${item.price}" min="1"
             onclick="event.stopPropagation()"
             onkeydown="if(event.key==='Enter'){event.preventDefault();saveEdit(${item.id},'price',this.value)}else if(event.key==='Escape'){cancelEdit()}"
             onblur="saveEdit(${item.id},'price',this.value)"></span>`
        : `<span class="item-price-badge${item.fromReceipt ? ' editable-field' : ''}"${item.fromReceipt ? ` onclick="event.stopPropagation();startEdit(${item.id},'price')"` : ''}>${priceBadge}${item.fromReceipt ? '<span class="edit-icon">✎</span>' : ''}</span>`;

      return `<div class="item-card open">`
        + `<div class="item-top">`
        +   `<div>`
        +     nameHtml
        +     badgeHtml
        +   `</div>`
        + `</div>`
        + `<div class="item-controls" onclick="event.stopPropagation()">${controls}<div class="split-note">${hint(item)}</div><div class="item-del-row"><button class="btn-del" onclick="event.stopPropagation();deleteItem(${item.id})" title="削除">&times;</button></div></div>`
        + `</div>`;
    }).join('');

    // 編集モード中はinputにフォーカスを当てる
    const focusEl = $('itemList').querySelector('.edit-input-focus');
    if (focusEl) { focusEl.focus(); try { focusEl.select(); } catch(e) {} }

    const rawTotals = {};
    MEMBERS.forEach(m => (rawTotals[m.key] = 0));

    const rows = items.map((item, idx) => {
      const sh = calcShares(item, idx);
      MEMBERS.forEach(m => (rawTotals[m.key] += sh[m.key]));
      const cells = MEMBERS.map(m => {
        const v = sh[m.key];
        return `<td class="${v > 0 ? 'val' : 'zero'}">${v > 0 ? '¥' + v.toLocaleString() : '-'}</td>`;
      }).join('');
      return `<tr onclick="this.classList.toggle('expanded')">`
        + `<td><span class="cell-name">${esc(item.name)}</span></td>${cells}`
        + `</tr>`;
    }).join('');

    // qty≥2で未割り当て商品があるときはレシート合計按分を使わない（差額が歪むため）
    const hasUnassignedQty = items.some(it =>
      it.quantity > 1 && it.useQtyMode && !it.splitAll && MEMBERS.reduce((s, m) => s + (it.qty?.[m.key] || 0), 0) < it.quantity
    );

    let totals, adjRow = null, splitWarning = null;
    if (receiptTotal > 0 && !hasUnassignedQty) {
      const result = calcSplitByReceipt(items, receiptTotal);
      totals       = result.finals;
      adjRow       = result.adjRow;
      splitWarning = result.warning;
    } else {
      totals = rawTotals;
    }

    // 調整額行（差額を自動按分した場合のみ表示）
    let adjRowHtml = '';
    if (adjRow) {
      const sign     = adjRow.total > 0 ? '＋' : '−';
      const absTotal = Math.abs(adjRow.total).toLocaleString();
      const adjCells = MEMBERS.map(m => {
        const v = adjRow.adj[m.key];
        if (v === 0) return `<td class="zero">-</td>`;
        return `<td class="val adj-val">${v > 0 ? '＋¥' : '−¥'}${Math.abs(v).toLocaleString()}</td>`;
      }).join('');
      adjRowHtml = `<tr class="adj-row">`
        + `<td><span class="cell-name">調整額（税など）<small>${sign}¥${absTotal}</small></span></td>`
        + adjCells + `</tr>`;
    }

    // 警告（5%以上のマイナス差額）
    let warningHtml = '';
    if (splitWarning) {
      const absStr = Math.abs(splitWarning.diff).toLocaleString();
      warningHtml = `<div class="split-warning">⚠️ 商品合計がレシート合計より¥${absStr}（${splitWarning.rate}%）多くなっています。商品の金額をご確認ください。</div>`;
    }

    const boxes = MEMBERS.map(m =>
      `<div class="total-box ${m.box}">`
      + `<div class="total-name">${esc(m.label)}</div>`
      + `<div class="total-yen">¥${totals[m.key].toLocaleString()}</div>`
      + `</div>`
    ).join('');

    const ths = MEMBERS.map(m => `<th class="${m.hcl}">${esc(m.label)}</th>`).join('');
    const fts = MEMBERS.map(m => `<td class="${m.fcl}">¥${totals[m.key].toLocaleString()}</td>`).join('');

    $('resultContent').innerHTML =
      `<div class="totals-grid">${boxes}</div>`
      + `<table class="detail-table">`
      +   `<thead><tr><th>商品</th>${ths}</tr></thead>`
      +   `<tbody>${rows}${adjRowHtml}</tbody>`
      +   `<tfoot><tr><td>合計</td>${fts}</tr></tfoot>`
      + `</table>`
      + warningHtml;
  }

  // ── イベントリスナー ──────────────────────────────────────────

  // IME 確定後に全角数字を半角に自動変換（スマホ日本語キーボード対策）
  $('itemPrice').addEventListener('compositionend', function () {
    const converted = zenToHan(this.value);
    if (converted) this.value = converted;
  });

  // 商品を追加フォームの折りたたみ
  let addFormOpen = false;
  window.toggleAddForm = function() {
    addFormOpen = !addFormOpen;
    const body    = $('addFormBody');
    const chevron = $('addFormChevron');
    const title   = chevron.closest('.add-form-title');
    body.style.display = addFormOpen ? '' : 'none';
    chevron.textContent = addFormOpen ? '▲' : '▼';
    title.classList.toggle('open', addFormOpen);
    if (addFormOpen) $('itemName').focus();
  };

  // 商品を追加 / Enter キーでフォーカス移動
  $('btnAdd').addEventListener('click', addItem);
  $('itemPrice').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addItem(); } });
  $('itemName').addEventListener('keydown',  e => { if (e.key === 'Enter') { e.preventDefault(); $('itemPrice').focus(); } });

  // 人数ステッパー
  let paidToastTimer = null;
  function showPaidToast() {
    clearTimeout(paidToastTimer);
    $('paidToast').classList.add('show');
    paidToastTimer = setTimeout(() => $('paidToast').classList.remove('show'), 2200);
  }
  function updateStepper() {
    $('stepperCount').textContent = memberCount;
    $('stepperMinus').disabled = memberCount <= 2;
    $('stepperPlus').textContent = memberCount >= FREE_MAX ? '🔒' : '＋';
  }
  $('stepperMinus').addEventListener('click', () => {
    if (memberCount <= 2) return;
    memberCount--;
    MEMBERS = ALL_MEMBERS.slice(0, memberCount);
    localStorage.setItem('memberCount', memberCount);
    updateStepper();
  });
  $('stepperPlus').addEventListener('click', () => {
    if (memberCount >= FREE_MAX) { showPaidToast(); return; }
    memberCount++;
    MEMBERS = ALL_MEMBERS.slice(0, memberCount);
    localStorage.setItem('memberCount', memberCount);
    updateStepper();
  });
  updateStepper();

  // ── 履歴 ──────────────────────────────────────────────────────
  const HISTORY_KEY = 'wakekko_history';
  const HISTORY_MAX = 3;

  function saveToHistory(result) {
    if (!result || !result.items || result.items.length === 0) return;
    const history = loadHistory();
    currentHistoryId = Date.now();
    history.unshift({
      id: currentHistoryId,
      date: new Date().toISOString(),
      storeName: result.storeName || '',
      totalAmount: result.totalAmount || 0,
      items: result.items.map(it => ({ name: it.name, price: it.price, quantity: it.quantity || 1 })),
    });
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(0, HISTORY_MAX)));
  }

  function calcCurrentTotals() {
    const rawTotals = {};
    MEMBERS.forEach(m => (rawTotals[m.key] = 0));
    items.forEach((item, idx) => {
      const sh = calcShares(item, idx);
      MEMBERS.forEach(m => (rawTotals[m.key] += sh[m.key]));
    });
    const hasUnassignedQty = items.some(it =>
      it.quantity > 1 && it.useQtyMode && !it.splitAll &&
      MEMBERS.reduce((s, m) => s + (it.qty?.[m.key] || 0), 0) < it.quantity
    );
    if (receiptTotal > 0 && !hasUnassignedQty) {
      return calcSplitByReceipt(items, receiptTotal).finals;
    }
    return rawTotals;
  }

  function updateHistorySplitResult() {
    if (!currentHistoryId || items.length === 0) return;
    const history = loadHistory();
    const entry = history.find(e => e.id === currentHistoryId);
    if (!entry) return;
    entry.splitTotals = calcCurrentTotals();
    entry.members = MEMBERS.map(m => ({ key: m.key, label: m.label, box: m.box }));
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    currentHistoryId = null;
  }

  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; }
  }

  function formatHistoryDate(iso) {
    const d = new Date(iso);
    const diff = (Date.now() - d) / 1000;
    if (diff < 60)    return 'たった今';
    if (diff < 3600)  return `${Math.floor(diff / 60)}分前`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}時間前`;
    const days = Math.floor(diff / 86400);
    if (days < 7)     return `${days}日前`;
    return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}`;
  }

  function renderHistory() {
    const history = loadHistory();
    const body = $('historyBody');
    if (history.length === 0) {
      body.innerHTML = '<div class="history-empty">まだ履歴がありません<br>レシートを読み込むと<br>ここに表示されます</div>';
      return;
    }
    body.innerHTML = history.map((entry, i) => {
      const preview = entry.items.slice(0, 3)
        .map(it => `<div class="h-item-row"><span class="h-item-name">${esc(it.name)}</span><span class="h-item-price">¥${it.price.toLocaleString()}</span></div>`)
        .join('');
      const more = entry.items.length > 3
        ? `<div class="h-item-more">他 ${entry.items.length - 3} 品</div>` : '';
      return `
        <div class="history-card">
          <div class="h-meta">
            <span class="h-date">${formatHistoryDate(entry.date)}</span>
            <span class="h-total">¥${entry.totalAmount.toLocaleString()}</span>
          </div>
          <div class="h-store">${esc(entry.storeName) || '店名不明'}</div>
          <div class="h-items">${preview}${more}</div>
          <button class="h-detail-btn" onclick="showHistoryDetail(${i})">詳細を見る</button>
        </div>`;
    }).join('');
  }

  window.restoreHistory = function(idx) {
    const entry = loadHistory()[idx];
    if (!entry) return;
    items.length = 0;
    receiptTotal = entry.totalAmount || 0;
    entry.items.forEach(it => {
      const checked = {}, qty = {};
      MEMBERS.forEach(m => { checked[m.key] = false; qty[m.key] = 0; });
      items.push({
        id: Date.now() + (Math.random() * 1000 | 0),
        name: it.name, price: it.price,
        quantity: it.quantity || 1, unitPrice: null,
        checked, qty, fromReceipt: true, splitAll: false, useQtyMode: false,
      });
    });
    render();
    showScreen('screen-main');
  };

  window.showHistoryDetail = function(idx) {
    const entry = loadHistory()[idx];
    if (!entry) return;

    let splitHtml = '';
    if (entry.splitTotals && entry.members && entry.members.length > 0) {
      const boxes = entry.members.map(m =>
        `<div class="total-box ${m.box}">`
        + `<div class="total-name">${esc(m.label)}</div>`
        + `<div class="total-yen">¥${(entry.splitTotals[m.key] || 0).toLocaleString()}</div>`
        + `</div>`
      ).join('');
      splitHtml = `<div class="totals-grid" style="margin-bottom:16px">${boxes}</div>`;
    }

    const allItems = entry.items
      .map(it => `<div class="h-item-row"><span class="h-item-name">${esc(it.name)}</span><span class="h-item-price">¥${it.price.toLocaleString()}</span></div>`)
      .join('');

    $('historyDetailBody').innerHTML = `
      <div class="history-card">
        <div class="h-meta">
          <span class="h-date">${formatHistoryDate(entry.date)}</span>
          <span class="h-total">¥${entry.totalAmount.toLocaleString()}</span>
        </div>
        <div class="h-store">${esc(entry.storeName) || '店名不明'}</div>
        ${splitHtml}
        <div class="h-items h-detail-all-items">${allItems}</div>
      </div>`;
    showScreen('screen-history-detail');
  };

  $('btnHistory').addEventListener('click', () => {
    renderHistory();
    showScreen('screen-history');
  });
  $('btnHistoryBack').addEventListener('click', () => showScreen('screen-start'));
  $('btnHistoryDetailBack').addEventListener('click', () => {
    renderHistory();
    showScreen('screen-history');
  });

  // アップロード画面のもどるボタン
  $('btnBack').addEventListener('click', () => showScreen('screen-start'));

  // メイン画面のもどるボタン
  $('btnMainBack').addEventListener('click', () => showScreen('screen-start'));

  // 共有ボタン
  $('btnShare').addEventListener('click', async () => {
    if (items.length === 0) return;

    updateHistorySplitResult();
    const totals = calcCurrentTotals();

    const dateStr = new Date().toLocaleDateString('ja-JP', { month: 'long', day: 'numeric' });
    const storeName = currentParsedResult?.storeName || '';
    const storeStr = storeName ? `\n${storeName}` : '';

    const itemLines = items.map(it => `${it.name}　¥${it.price.toLocaleString()}`).join('\n');
    const memberLines = MEMBERS.map(m => `${m.label}　→　¥${totals[m.key].toLocaleString()}`).join('\n');

    const text = `わけっこ結果 🧾\n${dateStr}${storeStr}\n\n【品目】\n${itemLines}\n\n【割り勘】\n${memberLines}`;

    if (navigator.share) {
      try { await navigator.share({ text }); } catch (e) { /* キャンセル等 */ }
    } else {
      await navigator.clipboard.writeText(text);
      const btn = $('btnShare');
      const orig = btn.textContent;
      btn.textContent = 'コピーしました！';
      setTimeout(() => { btn.textContent = orig; }, 2000);
    }
  });

  // ── カメラ画面 ────────────────────────────────────────────────
  let cameraStream = null;
  let awaitingLibrarySelection = false;

  async function startCamera() {
    const video = $('cameraVideo');
    try {
      cameraStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1920 } }
      });
      video.srcObject = cameraStream;
    } catch (e) {
      // カメラ権限なし or 非対応 → ネイティブcamera inputにフォールバック
      stopCamera();
      $('captureInput').click();
    }
  }

  function stopCamera() {
    if (cameraStream) {
      cameraStream.getTracks().forEach(t => t.stop());
      cameraStream = null;
    }
    const video = $('cameraVideo');
    if (video) video.srcObject = null;
  }

  function openCameraScreen() {
    showScreen('screen-camera');
    $('tabCamera').classList.add('active');
    $('tabLibrary').classList.remove('active');
    startCamera();
  }

  function switchCameraTab(tab) {
    if (tab === 'library') {
      stopCamera();
      awaitingLibrarySelection = true;
      $('libInput').value = ''; // 同じファイルを再選択できるようリセット
      $('libInput').click();
      return;
    }
    $('tabCamera').classList.add('active');
    $('tabLibrary').classList.remove('active');
    startCamera();
  }

  function capturePhoto() {
    const video  = $('cameraVideo');
    const canvas = $('cameraCanvas');
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    canvas.toBlob(blob => {
      const file = new File([blob], 'receipt.jpg', { type: 'image/jpeg' });
      stopCamera();
      showScreen('screen-upload');
      handleFile(file);
    }, 'image/jpeg', 0.92);
  }

  // スタート画面の「レシートを読み込む」→ カメラ画面を開く
  $('btnGoUpload').addEventListener('click', openCameraScreen);

  // カメラ画面: 閉じる
  $('btnCameraClose').addEventListener('click', () => { stopCamera(); showScreen('screen-start'); });

  // タブ切り替え
  $('tabCamera').addEventListener('click',  () => switchCameraTab('camera'));
  $('tabLibrary').addEventListener('click', () => switchCameraTab('library'));

  // シャッターボタン
  $('btnShutter').addEventListener('click', capturePhoto);

  // フォールバック用 capture input
  $('captureInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) { showScreen('screen-upload'); handleFile(file); }
  });

  // ライブラリ: キャンセル検出（モダンブラウザ）→ カメラ再起動
  $('libInput').addEventListener('cancel', () => {
    if (!awaitingLibrarySelection) return;
    awaitingLibrarySelection = false;
    startCamera();
  });

  // ライブラリ: キャンセル検出フォールバック（windowフォーカス復帰時）
  window.addEventListener('focus', () => {
    if (!awaitingLibrarySelection) return;
    setTimeout(() => {
      if (awaitingLibrarySelection) {
        awaitingLibrarySelection = false;
        startCamera();
      }
    }, 400);
  }, true);

  // ライブラリ: ファイル選択 → 即OCR画面へ
  $('libInput').addEventListener('change', e => {
    awaitingLibrarySelection = false;
    const file = e.target.files[0];
    if (!file) { startCamera(); return; }
    selectedFile = file;
    stopCamera();
    showScreen('screen-upload');
    handleFile(file);
  });

  // ファイル選択 → プレビュー表示 & OCR 自動開始
  $('fileInput').addEventListener('change',   e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
  $('cameraInput').addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

  // 「再解析する」ボタン（OCR 完了後に有効になる）
  $('btnAnalyze').addEventListener('click', () => {
    if (selectedFile) analyzeReceipt(selectedFile);
  });
</script>

</div><!-- /screen-main -->
<script>
  // Service Worker を登録してオフライン対応・PWA インストールを有効にする。
  // HTTPS（GitHub Pages）または localhost でのみ動作する。
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
      .then(() => console.log('Service Worker registered'));
  }
</script>
</body>
</html>
