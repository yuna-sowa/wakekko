<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>わけっこ - 割り勘アプリ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#F4A987">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Zen Maru Gothic', 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #FFF5F5;
      color: #333333;
      min-height: 100vh;
      line-height: 1.75;
    }

    /* ========== ヘッダー / ロゴ ========== */
    .header {
      background: #fff;
      text-align: center;
      padding: 40px 16px 36px;
      border-bottom: 2px solid #FFE0E0;
    }
    .logo {
      font-size: 30px;
      font-weight: 900;
      color: #E8707A;
      letter-spacing: 8px;
    }
    .logo-sub {
      font-size: 12px;
      font-weight: 500;
      color: #999;
      margin-top: 6px;
      letter-spacing: 2px;
    }

    /* ========== 2カラム ========== */
    .layout {
      display: flex;
      gap: 32px;
      max-width: 1040px;
      margin: 0 auto;
      padding: 36px 32px;
      align-items: flex-start;
    }
    .col-left  { flex: 1; min-width: 0; }
    .col-right { flex: 1; min-width: 0; position: sticky; top: 36px; }

    /* ========== カード共通 ========== */
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 2px 10px rgba(200,100,100,0.06);
      margin-bottom: 28px;
    }
    .card-title {
      font-size: 12px;
      font-weight: 700;
      color: #E8707A;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #FFE8E8;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ========== フォーム ========== */
    .form-grid {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .form-grid input[type="text"] {
      flex: 1;
      min-width: 0;
    }
    .form-grid input[type="number"] {
      width: 100px;
      flex-shrink: 0;
    }
    .form-grid input {
      padding: 13px 18px;
      border: 1.5px solid #F0D8D8;
      border-radius: 16px;
      font-size: 14px;
      font-family: inherit;
      color: #333333;
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-grid input:focus {
      border-color: #E8707A;
      box-shadow: 0 0 0 3px rgba(232,112,122,0.10);
    }
    .form-grid input::placeholder { color: #ccc; }

    .btn-add {
      width: 100%;
      padding: 14px;
      background: #E8707A;
      color: #fff;
      border: none;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 2px;
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 3px 10px rgba(232,112,122,0.25);
    }
    .btn-add:hover { background: #D8606A; }
    .btn-add:active { transform: scale(0.98); }

    /* ========== 商品カード ========== */
    .item-card {
      background: #fff;
      border-radius: 18px;
      padding: 20px 22px;
      box-shadow: 0 2px 10px rgba(200,100,100,0.06);
      margin-bottom: 14px;
      animation: fadeUp 0.25s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    .item-top > div { min-width: 0; flex: 1; }
    .item-name {
      font-size: 14px;
      font-weight: 700;
      color: #333333;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-all;
    }
    .item-price-badge {
      display: inline-block;
      font-size: 13px;
      font-weight: 700;
      color: #E8707A;
      background: #FFF0F0;
      padding: 4px 14px;
      border-radius: 10px;
      margin-top: 6px;
    }
    .btn-del {
      background: #FFF5F5;
      border: 1px solid #F0D8D8;
      color: #D0A8A8;
      width: 30px;
      height: 30px;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .btn-del:hover {
      background: #FFE0E0;
      border-color: #E09090;
      color: #C05050;
    }

    /* ========== メンバー選択ピル ========== */
    .checks {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pill input { display: none; }
    .pill label {
      display: inline-block;
      padding: 6px 18px;
      border: 1.5px solid #F0D8D8;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      color: #bbb;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    /* 自分: ピンク */
    .pill input:checked + label.cl-me {
      border-color: #F0A0A8;
      background: #FFF0F0;
      color: #C85060;
      font-weight: 700;
    }
    /* Aさん: ミント */
    .pill input:checked + label.cl-a {
      border-color: #90C8B8;
      background: #F0FAF6;
      color: #408070;
      font-weight: 700;
    }
    /* Bさん: ラベンダー */
    .pill input:checked + label.cl-b {
      border-color: #C0B0D8;
      background: #F5F0FA;
      color: #685088;
      font-weight: 700;
    }
    /* Cさん: アプリコット */
    .pill input:checked + label.cl-c {
      border-color: #E8C098;
      background: #FFF8F0;
      color: #A87030;
      font-weight: 700;
    }

    .split-note {
      font-size: 11px;
      color: #bbb;
      margin-top: 10px;
    }
    .split-note b { color: #E8707A; }

    .empty-msg {
      text-align: center;
      color: #ccc;
      padding: 48px 16px;
      font-size: 13px;
    }

    /* ========== 結果: 合計カード ========== */
    .totals-grid {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 4px;
    }
    .totals-grid::-webkit-scrollbar { display: none; }
    .total-box {
      flex: 1 0 auto;
      min-width: 80px;
      text-align: center;
      padding: 20px 14px;
      border-radius: 18px;
    }
    .total-box.me { background: #FFF0F0; }
    .total-box.a  { background: #F0FAF6; }
    .total-box.b  { background: #F5F0FA; }
    .total-box.c  { background: #FFF8F0; }

    .total-name {
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    .total-box.me .total-name { color: #C85060; }
    .total-box.a  .total-name { color: #408070; }
    .total-box.b  .total-name { color: #685088; }
    .total-box.c  .total-name { color: #A87030; }

    .total-yen {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.5px;
      white-space: nowrap;
      color: #333333;
    }

    /* ========== 内訳テーブル ========== */
    .detail-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13px;
    }
    .detail-table thead th {
      padding: 12px 6px;
      font-size: 11px;
      font-weight: 700;
      color: #bbb;
      text-align: center;
      border-bottom: 1px solid #FFE8E8;
    }
    .detail-table thead th:first-child { text-align: left; }
    .detail-table thead .h-me { color: #C85060; }
    .detail-table thead .h-a  { color: #408070; }
    .detail-table thead .h-b  { color: #685088; }
    .detail-table thead .h-c  { color: #A87030; }

    .detail-table tbody td {
      padding: 11px 6px;
      text-align: center;
      border-bottom: 1px solid #FFF0F0;
    }
    .detail-table tbody tr:last-child td { border-bottom: none; }
    .detail-table tbody td:first-child {
      text-align: left;
      font-weight: 500;
      color: #666666;
      font-size: 12px;
      max-width: 100px;
      word-break: break-all;
    }
    .detail-table tbody td:first-child .cell-name {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .detail-table tbody tr.expanded td:first-child .cell-name {
      -webkit-line-clamp: unset;
      overflow: visible;
    }
    .detail-table tbody tr { cursor: pointer; transition: background 0.15s; }
    .detail-table tbody tr:active { background: #FFF5F5; }
    .detail-table .val  { color: #333333; font-weight: 700; font-size: 14px; }
    .detail-table .zero { color: #ddd; }

    .detail-table tfoot td {
      padding: 14px 6px;
      font-weight: 900;
      font-size: 15px;
      text-align: center;
      border-top: 1px solid #FFE8E8;
      color: #333333;
    }
    .detail-table tfoot td:first-child { text-align: left; color: #666666; }

    .result-empty {
      text-align: center;
      color: #ccc;
      padding: 40px 0;
      font-size: 13px;
    }

    /* ========== クリアボタン ========== */
    .btn-clear {
      width: 100%;
      padding: 13px;
      background: #fff;
      color: #bbb;
      border: 1.5px solid #F0D8D8;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
    }
    .btn-clear:hover {
      background: #FFF5F5;
      border-color: #E8B0B0;
      color: #999;
    }

    /* ========== レスポンシブ ========== */
    @media (max-width: 720px) {
      .layout {
        flex-direction: column;
        padding: 24px 18px;
        gap: 24px;
      }
      .col-right { position: static; }
      .total-box { min-width: 72px; padding: 18px 10px; }
      .total-yen { font-size: 22px; }
      .form-grid { gap: 8px; }
      .header { padding: 32px 16px 28px; }
      .logo { font-size: 26px; letter-spacing: 6px; }
    }
    @media (max-width: 400px) {
      .logo { font-size: 22px; letter-spacing: 4px; }
      .logo-sub { font-size: 11px; }
      .totals-grid { gap: 8px; }
      .total-box { min-width: 68px; padding: 16px 8px; }
      .total-yen { font-size: 20px; }
      .form-grid { flex-wrap: wrap; }
      .form-grid input[type="text"] { flex: 1 1 100%; }
      .form-grid input[type="number"] { flex: 1 1 100%; width: auto; }
      .detail-table { font-size: 12px; }
      .detail-table .val { font-size: 13px; }
    }

    /* ========== スタート画面 ========== */
    #screen-start {
      min-height: 100vh;
      background: #FAF8F4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 32px 64px;
    }
    #screen-main { display: none; }

    .start-illustration {
      font-size: 64px;
      margin-bottom: 8px;
      line-height: 1;
    }
    .start-logo {
      font-size: 48px;
      font-weight: 900;
      color: #C9673A;
      letter-spacing: 10px;
      margin-bottom: 16px;
    }
    .start-tagline {
      font-size: 14px;
      font-weight: 500;
      color: #A89080;
      letter-spacing: 1.5px;
      text-align: center;
      line-height: 1.9;
      margin-bottom: 64px;
    }
    .btn-start {
      width: 100%;
      max-width: 320px;
      padding: 20px 24px;
      background: #C9673A;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(201,103,58,0.30);
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn-start:hover {
      background: #B8592E;
      box-shadow: 0 8px 24px rgba(201,103,58,0.38);
    }
    .btn-start:active {
      transform: scale(0.97);
      box-shadow: 0 3px 12px rgba(201,103,58,0.25);
    }
    .start-footer {
      margin-top: 40px;
      font-size: 11px;
      color: #C8B8B0;
      letter-spacing: 1px;
    }

    /* ========== レシート読み込み画面 ========== */
    #screen-upload {
      min-height: 100vh;
      background: #FAF8F4;
      display: none;
      flex-direction: column;
    }
    .upload-header {
      display: flex;
      align-items: center;
      padding: 20px 20px 0;
      position: relative;
      min-height: 52px;
    }
    .btn-back {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      color: #B09888;
      cursor: pointer;
      padding: 8px 4px;
      letter-spacing: 0.5px;
      z-index: 1;
    }
    .btn-back:active { opacity: 0.6; }
    .upload-page-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      font-weight: 700;
      color: #7A5C48;
      letter-spacing: 2.5px;
      white-space: nowrap;
    }
    .upload-body {
      flex: 1;
      padding: 28px 24px 56px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }
    /* 選択前: プレースホルダーゾーン */
    .upload-zone {
      display: block;
      width: 100%;
      aspect-ratio: 3 / 4;
      max-height: 52vh;
      border: 2px dashed #D4C4B8;
      border-radius: 24px;
      background: #FFFAF7;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      transition: border-color 0.2s, background 0.2s;
    }
    .upload-zone:hover       { border-color: #C9673A; background: #FFF6EF; }
    .upload-zone.has-image   { border-style: solid; border-color: #C9673A; }
    .upload-zone-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: opacity 0.2s;
    }
    .upload-zone.has-image .upload-zone-placeholder { opacity: 0; pointer-events: none; }
    .upload-zone-icon  { font-size: 52px; line-height: 1; }
    .upload-zone-label {
      font-size: 14px;
      font-weight: 700;
      color: #B09888;
      letter-spacing: 1.5px;
    }
    .upload-zone-sub {
      font-size: 11px;
      color: #C8B8B0;
      letter-spacing: 0.8px;
    }
    /* プレビュー画像 */
    .preview-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    .upload-zone.has-image .preview-img { display: block; }
    /* 選択済みバッジ */
    .preview-badge {
      position: absolute;
      bottom: 14px;
      right: 14px;
      background: rgba(201,103,58,0.88);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 6px 14px;
      border-radius: 20px;
      display: none;
    }
    .upload-zone.has-image .preview-badge { display: block; }
    /* ライブラリ / カメラ ボタン行 */
    .upload-btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .btn-upload-opt {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 18px 12px;
      background: #fff;
      border: 1.5px solid #E8D8CC;
      border-radius: 20px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      color: #8A6858;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(180,130,100,0.06);
    }
    .btn-upload-opt:hover  { background: #FFF5EE; border-color: #C9673A; color: #C9673A; }
    .btn-upload-opt:active { transform: scale(0.97); }
    .btn-upload-opt-icon   { font-size: 26px; line-height: 1; }
    /* 解析ボタン */
    .btn-analyze {
      width: 100%;
      padding: 20px 24px;
      background: #C9673A;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(201,103,58,0.30);
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s, opacity 0.2s;
      margin-top: 4px;
    }
    .btn-analyze:disabled {
      background: #D4C4B8;
      box-shadow: none;
      cursor: not-allowed;
      opacity: 0.65;
    }
    .btn-analyze:not(:disabled):hover  { background: #B8592E; box-shadow: 0 8px 24px rgba(201,103,58,0.38); }
    .btn-analyze:not(:disabled):active { transform: scale(0.97); box-shadow: 0 3px 12px rgba(201,103,58,0.22); }
    .upload-note {
      text-align: center;
      font-size: 11px;
      color: #C8B8B0;
      letter-spacing: 0.5px;
      line-height: 1.8;
    }

    /* ========== OCR解析結果 ========== */
    .ocr-result-box {
      background: #FFFAF7;
      border: 1.5px solid #E8D8CC;
      border-radius: 20px;
      padding: 20px;
    }
    .ocr-result-title {
      font-size: 12px;
      font-weight: 700;
      color: #C9673A;
      margin-bottom: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .ocr-text-area {
      font-size: 12px;
      color: #6A5848;
      line-height: 1.9;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 200px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
    }
    .ocr-parsed-list {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .ocr-parsed-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #FFF5EE;
      border-radius: 12px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      color: #7A5C48;
    }
    .ocr-parsed-item span:last-child {
      font-weight: 700;
      color: #C9673A;
    }
    .ocr-empty {
      text-align: center;
      color: #C8B8B0;
      font-size: 12px;
      padding: 12px 0;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

<!-- ========== スタート画面 ========== -->
<div id="screen-start">
  <div class="start-illustration">🧾</div>
  <div class="start-logo">わけっこ</div>
  <div class="start-tagline">レシートを読み込んで<br>かんたん割り勘</div>
  <button class="btn-start" id="btnGoUpload">レシートを読み込む</button>
  <input type="file" id="startCameraInput" accept="image/*" capture="environment" style="display:none">
  <div class="start-footer">まずはレシートの写真を用意してね</div>
</div>

<!-- ========== レシート読み込み画面 ========== -->
<div id="screen-upload">
  <div class="upload-header">
    <button class="btn-back" id="btnBack">← もどる</button>
    <div class="upload-page-title">レシートを読み込む</div>
  </div>

  <div class="upload-body">
    <!-- アップロードゾーン（ライブラリ用） -->
    <label class="upload-zone" id="uploadZone" for="fileInput">
      <div class="upload-zone-placeholder">
        <div class="upload-zone-icon">🧾</div>
        <div class="upload-zone-label">タップして画像を選択</div>
        <div class="upload-zone-sub">JPG · PNG · HEIC に対応</div>
      </div>
      <img class="preview-img" id="previewImg" alt="プレビュー">
      <div class="preview-badge">✓ 選択済み</div>
    </label>
    <input type="file" id="fileInput" accept="image/*" style="display:none">
    <!-- カメラ専用 input（capture） -->
    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">

    <!-- サブボタン行 -->
    <div class="upload-btn-row">
      <button class="btn-upload-opt" id="btnLibrary">
        <span class="btn-upload-opt-icon">🖼️</span>
        <span>ライブラリから</span>
      </button>
      <button class="btn-upload-opt" id="btnCamera">
        <span class="btn-upload-opt-icon">📷</span>
        <span>写真を撮る</span>
      </button>
    </div>

    <!-- 解析ボタン -->
    <button class="btn-analyze" id="btnAnalyze" disabled>解析する</button>
    <p class="upload-note">レシート全体が映るように撮影してください</p>

    <!-- OCR解析結果エリア -->
    <div id="ocrResult" style="display:none">
      <div class="ocr-result-box">
        <div class="ocr-result-title">解析結果</div>
        <div id="ocrText" class="ocr-text-area"></div>
        <div id="ocrParsedList" class="ocr-parsed-list"></div>
      </div>
      <button class="btn-analyze" id="btnGoMain" style="display:none;margin-top:4px">割り勘リストに追加して進む →</button>
    </div>
  </div>
</div>

<!-- ========== メイン画面 ========== -->
<div id="screen-main">
<div class="header">
  <div class="logo">わけっこ</div>
  <div class="logo-sub">みんなでかんたん割り勘</div>
</div>

<div class="layout">
  <!-- ===== 左カラム: 入力 ===== -->
  <div class="col-left">
    <div class="card">
      <div class="card-title">商品を追加</div>
      <div class="form-grid">
        <input type="text" id="itemName" placeholder="商品名（例: ピザ）">
        <input type="number" id="itemPrice" placeholder="¥ 金額" min="0">
      </div>
      <button class="btn-add" id="btnAdd">+ 追加する</button>
    </div>

    <div id="itemList">
      <div class="empty-msg">商品を追加すると、ここに一覧が表示されます</div>
    </div>

    <button class="btn-clear" id="btnClear">すべてクリア</button>
  </div>

  <!-- ===== 右カラム: 結果 ===== -->
  <div class="col-right">
    <div class="card" id="resultCard">
      <div class="card-title">計算結果</div>
      <div id="resultContent">
        <div class="result-empty">商品を追加するとここに結果が表示されます</div>
      </div>
    </div>
  </div>
</div>

<script>
  /* ================================================================
     わけっこ — メインロジック
     ----------------------------------------------------------------
     OCR エンジン: Google Cloud Vision API (TEXT_DETECTION)
     APIキーの渡し方: URL パラメータ ?APIkey=YOUR_KEY
       例) https://yuna-sowa.github.io/wakekko/?APIkey=AIzaSy...
           http://localhost:8080/?APIkey=AIzaSy...
     ================================================================ */

  // ── 定数・状態 ────────────────────────────────────────────────
  const MEMBERS = [
    { key: 'me', label: '自分',  cl: 'cl-me', box: 'me', hcl: 'h-me', fcl: 'f-me' },
    { key: 'a',  label: 'Aさん', cl: 'cl-a',  box: 'a',  hcl: 'h-a',  fcl: 'f-a'  },
    { key: 'b',  label: 'Bさん', cl: 'cl-b',  box: 'b',  hcl: 'h-b',  fcl: 'f-b'  },
    { key: 'c',  label: 'Cさん', cl: 'cl-c',  box: 'c',  hcl: 'h-c',  fcl: 'f-c'  },
  ];

  const items = [];
  const $ = id => document.getElementById(id);
  let selectedFile = null;
  let currentParsedResult = null; // OCR解析結果を保持するグローバル変数
  let receiptTotal = 0; // OCRで取得したレシート合計金額（差額按分に使用）

  // ── ユーティリティ ────────────────────────────────────────────

  // XSS 対策: ユーザー入力や外部テキストを innerHTML に埋め込む前にエスケープする
  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // 全角数字（IME 変換後など）を半角に統一して数値だけ返す
  function zenToHan(str) {
    return str
      .replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
      .replace(/[^0-9]/g, '');
  }

  // ── 画面切替 ──────────────────────────────────────────────────
  function showScreen(id) {
    ['screen-start', 'screen-upload', 'screen-main'].forEach(s => {
      const el = $(s);
      if (el) el.style.display = 'none';
    });
    const target = $(id);
    if (target) target.style.display = id === 'screen-upload' ? 'flex' : 'block';
  }

  // ── OCR ──────────────────────────────────────────────────────

  /**
   * 画像ファイルを受け取り、プレビュー表示と OCR を開始する。
   * fileInput / cameraInput / startCameraInput の change イベントから呼ぶ共通エントリ。
   */
  function handleFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    selectedFile = file;

    // プレビュー表示（FileReader で data URL に変換して <img> に渡す）
    const reader = new FileReader();
    reader.onload = e => {
      $('previewImg').src = e.target.result;
      $('uploadZone').classList.add('has-image');
    };
    reader.readAsDataURL(file);

    analyzeReceipt(file);
  }

  /**
   * 画像ファイルを純粋な Base64 文字列に変換する。
   * Vision API のリクエストボディに埋め込むため、data:... プレフィックスは除去する。
   */
  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload  = e => resolve(e.target.result.split(',')[1]); // "data:image/...;base64," を除去
      reader.onerror = () => reject(new Error('ファイルの読み込みに失敗しました'));
      reader.readAsDataURL(file);
    });
  }

  /**
   * Google Cloud Vision API（TEXT_DETECTION）で OCR を実行し、結果を画面に表示する。
   *
   * APIキーは URL パラメータ ?APIkey=... から取得する。
   * キーが未指定の場合はエラーメッセージを表示して処理を中断する。
   *
   * 処理フロー:
   *   1. URLSearchParams から APIキーを取得
   *   2. 画像を Base64 に変換
   *   3. Vision API に POST → fullTextAnnotation.text を取得
   *   4. parseReceiptItems() でテキストから商品・金額を抽出
   *   5. 結果を画面に表示し、割り勘リストへ追加するボタンを出す
   */
  async function analyzeReceipt(file) {
    const btnAnalyze = $('btnAnalyze');
    const ocrResult  = $('ocrResult');
    const ocrText    = $('ocrText');
    const ocrParsed  = $('ocrParsedList');
    const btnGoMain  = $('btnGoMain');

    // 解析中 UI にリセット
    btnAnalyze.disabled     = true;
    btnAnalyze.textContent  = '解析中…';
    ocrResult.style.display = 'block';
    ocrText.textContent     = '解析しています…';
    ocrParsed.innerHTML     = '';
    btnGoMain.style.display = 'none';

    try {
      // 1. URLパラメータから APIキーを取得
      const apiKey = new URLSearchParams(window.location.search).get('APIkey');
      if (!apiKey) {
        throw new Error('APIキーが指定されていません。URLに ?APIkey=YOUR_KEY を追加してください。');
      }

      // 2. 画像を Base64 に変換
      const base64Image = await fileToBase64(file);

      // 3. Vision API へ POST
      const endpoint = `https://vision.googleapis.com/v1/images:annotate?key=${apiKey}`;
      const response = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          requests: [{
            image:    { content: base64Image },
            features: [{ type: 'TEXT_DETECTION' }],
          }],
        }),
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        const msg = err?.error?.message ?? `HTTP ${response.status}`;
        throw new Error(`Vision API エラー: ${msg}`);
      }

      // 4. fullTextAnnotation.text を取得
      const data       = await response.json();
      const annotation = data?.responses?.[0]?.fullTextAnnotation;
      const text       = annotation?.text ?? '';

      // 生テキストをそのまま表示（デバッグ・確認用）
      ocrText.textContent = text.trim() || '（テキストを検出できませんでした）';

      // 5. 商品・金額・店名・合計をパースして一覧化
      currentParsedResult = parseReceiptItems(text); // グローバルに保持

      if (currentParsedResult.items.length > 0) {
        const metaRows = [
          currentParsedResult.storeName   ? `<div class="ocr-parsed-item ocr-meta"><span>店名</span><span>${esc(currentParsedResult.storeName)}</span></div>` : '',
          currentParsedResult.totalAmount ? `<div class="ocr-parsed-item ocr-meta"><span>合計</span><span>¥${currentParsedResult.totalAmount.toLocaleString()}</span></div>` : '',
        ].join('');
        ocrParsed.innerHTML = metaRows + currentParsedResult.items
          .map(it =>
            `<div class="ocr-parsed-item">`
            + `<span>${esc(it.name)}</span>`
            + `<span>¥${it.price.toLocaleString()}</span>`
            + `</div>`
          )
          .join('');
        btnGoMain.textContent   = '割り勘リストに追加して進む →';
        btnGoMain.style.display = 'block';
        btnGoMain.onclick = () => {
          console.log('[btnGoMain] 保存データ:', currentParsedResult);
          localStorage.setItem('currentParsedResult', JSON.stringify(currentParsedResult));
          items.length = 0; // 既存データをクリアしてOCR結果のみ反映
          receiptTotal = currentParsedResult.totalAmount || 0;
          currentParsedResult.items.forEach(it => {
            const checked = {};
            MEMBERS.forEach(m => (checked[m.key] = false));
            items.push({ id: Date.now() + (Math.random() * 1000 | 0), name: it.name, price: it.price, checked });
          });
          render();
          showScreen('screen-main');
        };
      } else {
        ocrParsed.innerHTML     = '<div class="ocr-empty">商品と金額を自動検出できませんでした。手動で入力してください。</div>';
        btnGoMain.textContent   = '手動で入力する →';
        btnGoMain.style.display = 'block';
        btnGoMain.onclick       = () => showScreen('screen-main');
      }
    } catch (err) {
      ocrText.textContent = `エラー: ${err.message ?? 'OCR処理に失敗しました。もう一度お試しください。'}`;
      ocrResult.style.display = 'block';
    } finally {
      btnAnalyze.disabled    = false;
      btnAnalyze.textContent = '再解析する';
    }
  }

  /**
   * OCR テキストから店名・合計・商品一覧を抽出して返す。
   * OCR崩れを前提とし、金額アンカー方式で商品を検出する。
   *
   * @param {string} text - Vision API の fullTextAnnotation.text
   * @returns {{ storeName: string, totalAmount: number, items: {name:string, price:number}[] }}
   */
  function parseReceiptItems(text) {
    // 全角数字・全角スペースを半角に統一、OCR誤認字を正規化
    const allLines = text.split('\n').map(raw =>
      raw
        .replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
        .replace(/　/g, ' ')
        .replace(/稅/g, '税') // 中国語繁体字「稅」(U+7A05) を日本語「税」(U+7A0E) に統一
        .trim()
    );

    // ■ 1. 解析範囲の特定
    // 終了ワードを含む行で解析を終了（ただし税合計・消費税・税額計はスルー）
    const END_RE  = /合計|ご計|お買上|お買い上げ|総合計|今回計/;
    const SKIP_RE = /税合計|消費税|税額計/;
    let cutIdx = allLines.length, totalLineIdx = -1;
    for (let i = 0; i < allLines.length; i++) {
      const l = allLines[i];
      if (!l || SKIP_RE.test(l)) continue;
      if (END_RE.test(l)) { cutIdx = i; totalLineIdx = i; break; }
    }

    // 合計金額抽出（終了行、または直後8行以内の単独金額行から取得）
    // @単価行・マイナス行はスキップ。¥付きを優先し、¥なしは最初の値をフォールバックとして保持。
    let totalAmount = 0;
    if (totalLineIdx >= 0) {
      const m = allLines[totalLineIdx].match(/[¥￥\\]?\s*(\d{1,3}[ ,.]\s*\d{3}|\d{1,6})\s*円?\s*$/);
      if (m) totalAmount = parseInt(m[1].replace(/\D/g, ''), 10);
      if (!totalAmount) {
        let fallback = 0;
        for (let j = totalLineIdx + 1; j < Math.min(totalLineIdx + 8, allLines.length); j++) {
          if (!allLines[j]) continue;
          if (SKIP_RE.test(allLines[j])) continue;
          if (/^[-－△▲@]/.test(allLines[j])) continue; // 単価・割引行はスキップ
          const hasYen = /[¥￥\\]/.test(allLines[j]);
          const m2 = allLines[j].match(/[¥￥\\]?\s*(\d{1,3}[ ,.]\s*\d{3}|\d{1,6})\s*円?\s*$/);
          if (m2) {
            const v = parseInt(m2[1].replace(/\D/g, ''), 10);
            if (hasYen) { totalAmount = v; break; } // ¥付きを確定値として採用
            if (!fallback) fallback = v;            // 最初のプレーン数字をフォールバック
          }
        }
        if (!totalAmount && fallback) totalAmount = fallback;
      }
    }

    // ■ 2. 前処理：行ノイズの除去
    // 棚番号・分類番号（例：ソ#02、リ#05、#05）を行頭から除去
    const SHELF_RE = /^[ァ-ヶA-Za-z]*#\d+\s*/;
    const rawLines = allLines.slice(0, cutIdx);
    // lines[i]: null=ノイズ行（( または _ で始まる）, ''=空行, 文字列=処理済み行
    // ※ * で始まる行は商品名の可能性があるためノイズ扱いしない（例: *コアラパン）
    const lines = rawLines.map(l => {
      if (!l) return '';
      if (/^[(_]/.test(l)) return null;
      if (/^[Xx]{4,}/.test(l)) return null; // マスクカード番号（XXXXXXXXXXXX1234形式）
      return l.replace(SHELF_RE, '').trim();
    });

    // ■ 3. 禁止ワード（これを含む行は商品として扱わない）
    const FORBIDDEN = /TEL|番号|ポイント|クレジット|小計|合計|会計|税額|消費税|対象額|税込|軽減税率|外税|点|優待券|売上|VISA|Visa|通番|様/;

    const DATE_PAT = /\d{4}[\/\-]\d{2}[\/\-]\d{2}|\d{4}年\d{1,2}月\d{1,2}日/;
    const TIME_PAT = /\d{2}:\d{2}|\d{1,2}時\d{1,2}分/;
    // 金額プレフィックス（¥・￥・\）
    const YEN_RE = /[¥￥\\]/;

    // ── ヘルパー関数 ─────────────────────────────────────────────

    // 行末の正の金額を返す（8桁以上の連続数字は除外）
    // ¥ ￥ \ * をプレフィックスとして許容、, . を桁区切りとして除去
    // 例: *1.200 → 1200、¥1,200 → 1200
    function extractAmt(line) {
      if (!line) return null;
      if (/\d{8,}/.test(line)) return null;
      const m = line.match(/[¥￥\\*]?\s*(\d{1,3}[,\.]\d{3}|\d{1,6})\s*円?\s*$/);
      if (!m) return null;
      const v = parseInt(m[1].replace(/[,.]/g, ''), 10);
      return v > 0 ? v : null;
    }

    // マイナス金額行か（-50 -100 ▲30 など）→ 負の値を返す
    function extractNegAmt(line) {
      if (!line) return null;
      const m = line.match(/[△▲\-－]\s*[¥￥\\*]?\s*(\d{1,3}[,\.]\d{3}|\d{1,6})\s*円?\s*$/);
      if (!m) return null;
      return -parseInt(m[1].replace(/[,.]/g, ''), 10);
    }

    // 金額行か（行末が金額形式で終わる）
    function isPriceLine(line) {
      if (!line) return false;
      if (/\d{8,}/.test(line)) return false;
      const m = line.match(/([¥￥\\*])?\s*(\d{1,3}[,\.]\d{3}|\d{1,6})\s*円?\s*$/);
      if (!m) return false;
      // 通貨記号・桁区切りなしで直前が非空白 → 商品名の一部（例: 旨味納豆3 の末尾3）
      if (!m[1] && !/[,.]/.test(m[2])) {
        const matchStart = line.length - m[0].length;
        if (matchStart > 0 && !/\s/.test(line[matchStart - 1])) return false;
      }
      return true;
    }

    // A型検出：行末の金額を除いた「商品名プレフィックス」を返す（なければnull）
    // ¥68 2個 のような単価+数量パターンも除去したうえで日本語・英字が残るか確認
    function getPrefix(line) {
      if (!line || FORBIDDEN.test(line)) return null;
      const m = line.match(/([¥￥\\*])?\s*(\d{1,3}[,\.]\d{3}|\d{1,6})\s*円?\s*$/);
      if (!m) return null;
      // 通貨記号・桁区切りなしで直前が非空白 → 商品名の一部（例: 旨味納豆3 の末尾3）
      if (!m[1] && !/[,.]/.test(m[2])) {
        const matchStart = line.length - m[0].length;
        if (matchStart > 0 && !/\s/.test(line[matchStart - 1])) return null;
      }
      const prefix = line.slice(0, line.length - m[0].length).trim();
      // 数量ワード・単価記号を除いた核が商品名文字を含むか確認
      const core = prefix
        .replace(/[¥￥\\]?\s*\d[\d,]*\s*[個点本枚袋]/g, '')
        .replace(/[¥￥\\]\s*\d[\d,]*/g, '')
        .replace(/\d+\s*[個点本枚袋]/g, '')
        .trim();
      if (!/[\u3040-\u30FF\u4E00-\u9FFF\uFF66-\uFF9FA-Za-z]/.test(core)) return null;
      return prefix;
    }

    // 商品名として有効な行か
    // 数量ワード・金額記号を除いた核に日本語・英字が残ることを確認
    function isValidName(line) {
      if (!line || FORBIDDEN.test(line)) return false;
      if (/\d{8,}/.test(line) || DATE_PAT.test(line) || TIME_PAT.test(line)) return false;
      const core = line
        .replace(/[¥￥\\]?\s*\d[\d,]*\s*[個点本枚袋]/g, '')
        .replace(/[¥￥\\]\s*\d[\d,]*/g, '')
        .replace(/\d+\s*[個点本枚袋]/g, '')
        .trim();
      return /[\u3040-\u30FF\u4E00-\u9FFF\uFF66-\uFF9FA-Za-z]/.test(core);
    }

    // 商品名クリーニング（記号・JANコード・単価+数量・末尾金額などを除去）
    function cleanName(raw) {
      let n = raw;
      n = n.replace(/^[※＊*]\s*/, '');                         // 先頭 ※ * 除去
      n = n.replace(/^\d{8,13}\s*/, '');                       // JANコード除去
      n = n.replace(/^\d{3,7}[\s※]\s*/, '');                  // 短い番号コード除去
      n = n.replace(/^\d+\s+/, '');                            // 先頭孤立数字除去
      n = n.replace(/\s*[¥￥\\]\s*\d[\d,]*\s*\d*\s*[個点本枚袋].*$/g, '').trim(); // 単価+数量パターン除去
      n = n.replace(/\s*\d+\s*[個点本枚袋]\s*$/g, '').trim(); // 末尾の数量除去
      n = n.replace(/\s*[¥￥\\*]?\s*\d[\d,.]*\s*円?\s*$/g, '').trim(); // 末尾の金額除去
      n = n.replace(/[※\\＼×÷☆★●○■□◇◆▶▷►◀◁▲▼△▽~～｜|]+/g, '');
      n = n.replace(/\s{2,}/g, ' ').trim();
      return n;
    }

    // ── 店名抽出（上から5行の非空行で条件を満たす最初の行）──────────
    let storeName = '';
    const nonEmpty = lines.filter(l => l && l.length > 0);
    for (let i = 0; i < Math.min(5, nonEmpty.length); i++) {
      const l = nonEmpty[i];
      if (/合計|小計|TEL|tel/.test(l)) continue;
      if (DATE_PAT.test(l) || TIME_PAT.test(l)) continue;
      if (/^\d+$/.test(l)) continue;
      if (isPriceLine(l) && !getPrefix(l)) continue;
      storeName = l;
      break;
    }

    // ■ 4. 商品抽出（金額アンカー方式）
    // 金額行を起点に、上方向へ最大3行遡って商品名を取得する
    const items   = [];
    const seen    = new Set();
    const usedIdx = new Set(); // 商品名として使用済みの行インデックス

    function addItem(name, price) {
      const c = cleanName(name);
      if (!c || !isValidName(c)) return false;
      if (totalAmount > 0 && price === totalAmount) return false; // ■ 6. 合計行除外
      const key = `${c}:${price}`;
      if (seen.has(key)) return false;
      seen.add(key);
      items.push({ name: c, price });
      return true;
    }

    // 上方向探索：fromIdx から上に最大(skip+3)行（ノイズ行はカウント外）で商品名を探す
    // skip: 有効な名前行を何件飛ばすか（連続金額ブロック対応）
    function findNameAbove(fromIdx, skip = 0) {
      let checked = 0;
      let skipped = 0;
      for (let j = fromIdx; j >= 0 && checked < skip + 3; j--) {
        const l = lines[j];
        if (l === null) continue; // ノイズ行（カウントしない）
        if (usedIdx.has(j)) {
          if (isPriceLine(l)) continue; // 使用済み価格行はスキップして探索継続
          else break;                   // 使用済み名前行で探索終了
        }
        checked++;
        if (!l) continue; // 空行はスキップ
        if (isValidName(l)) {
          if (skipped < skip) { skipped++; continue; } // skip件は飛ばす
          // 品質区分のみ（特・並・上・大・小・中など）の場合、直上の有効行と結合を試みる
          let name = l;
          if (/^[特並上下大小中極超高低優A-Za-z]{1,3}$/.test(cleanName(l).replace(/\s/g, ''))) {
            for (let k = j - 1; k >= 0; k--) {
              const above = lines[k];
              if (above === null || above === '') continue;
              if (usedIdx.has(k)) break;
              if (isValidName(above)) { usedIdx.add(k); name = above + ' ' + l; }
              break;
            }
          }
          usedIdx.add(j);
          return name;
        }
      }
      return null;
    }

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      if (line === null || line === '') continue;

      // ■ 5. 割引処理（マイナス金額行）
      const negAmt = extractNegAmt(line);
      if (negAmt !== null) {
        // 当該行または直前の非空行にFORBIDDENワードがあれば割引をスキップ
        let labelForbidden = FORBIDDEN.test(line);
        if (!labelForbidden) {
          for (let k = i - 1; k >= 0; k--) {
            if (lines[k] === null) continue;
            if (lines[k] === '') continue;
            labelForbidden = FORBIDDEN.test(lines[k]);
            break;
          }
        }
        if (!labelForbidden && items.length > 0) {
          // 直前の商品に紐づけて金額を減算（0以下になれば商品ごと削除）
          const last = items[items.length - 1];
          const np = last.price + negAmt;
          seen.delete(`${last.name}:${last.price}`);
          if (np > 0) { last.price = np; seen.add(`${last.name}:${np}`); }
          else items.pop();
        }
        // 直前が商品でなければ会計割引（calcSplitByReceiptの差額按分で自動対応）
        continue;
      }

      // 金額行でなければスキップ
      if (!isPriceLine(line)) continue;

      // 日付・時刻行はスキップ（例: 2024/03/12、10:30 が金額として誤抽出されるのを防ぐ）
      if (DATE_PAT.test(line) || TIME_PAT.test(line)) continue;

      // ■ NEW: @単価パターン（「商品名 @単価 数量 合計」形式）
      // 例: キャラメルポップコーン @150 1 1点 150 → 商品名: キャラメルポップコーン, 金額: 150
      const atIdx = line.search(/@\d/);
      if (atIdx > 0) {
        const price = extractAmt(line);
        if (price !== null) {
          const namePart = line.slice(0, atIdx).trim();
          if (namePart) {
            addItem(namePart, price);
            usedIdx.add(i);
            continue;
          }
        }
      }

      // A型：行内に商品名プレフィックスあり（「国産若鶏モモミンチ ¥347」など）
      const prefix = getPrefix(line);
      if (prefix) {
        const QUALITY_RE = /^[特並上下大小中極超高低優A-Za-z]{1,3}$/;
        if (QUALITY_RE.test(cleanName(prefix).replace(/\s/g, ''))) {
          // 品質区分：後続の品質/純粋価格行数をカウントしてskipロジックで対応名前を探す
          let following = 0;
          for (let k = i + 1; k < lines.length; k++) {
            const next = lines[k];
            if (next === null || next === '') continue;
            if (!isPriceLine(next) || DATE_PAT.test(next) || TIME_PAT.test(next)) break;
            const np = getPrefix(next);
            if (!np || QUALITY_RE.test(cleanName(np).replace(/\s/g, ''))) following++;
            else break;
          }
          const name = findNameAbove(i - 1, following);
          addItem(name ? name + ' ' + prefix : prefix, extractAmt(line));
        } else {
          addItem(prefix, extractAmt(line));
        }
        usedIdx.add(i); // A型行を使用済みとしてマーク
        continue;
      }

      // B型 + 金額アンカー方式：上方向に商品名を探す
      // 連続する金額ブロックの場合、後続の価格行数だけ名前をスキップして対応する名前を取得
      // ※ following は純粋な価格行と品質区分A型行の合計（通常のA型izable行は除外）
      const price = extractAmt(line);
      if (price !== null) {
        const QUALITY_RE = /^[特並上下大小中極超高低優A-Za-z]{1,3}$/;
        let following = 0;
        for (let k = i + 1; k < lines.length; k++) {
          const next = lines[k];
          if (next === null || next === '') continue;
          if (!isPriceLine(next) || DATE_PAT.test(next) || TIME_PAT.test(next)) break;
          const np = getPrefix(next);
          if (!np || QUALITY_RE.test(cleanName(np).replace(/\s/g, ''))) following++;
          else break;
        }
        const name = findNameAbove(i - 1, following);
        if (name) addItem(name, price);
      }
    }

    return { storeName, totalAmount, items };
  }

  // ── 商品リスト操作 ────────────────────────────────────────────
  function addItem() {
    const name  = $('itemName').value.trim();
    const price = parseInt($('itemPrice').value, 10);
    if (!name)                     { $('itemName').focus();  return; }
    if (isNaN(price) || price < 0) { $('itemPrice').focus(); return; }

    const checked = {};
    MEMBERS.forEach(m => (checked[m.key] = false));
    items.push({ id: Date.now(), name, price, checked });

    $('itemName').value  = '';
    $('itemPrice').value = '';
    $('itemName').focus();
    render();
  }

  function deleteItem(id) {
    const i = items.findIndex(x => x.id === id);
    if (i !== -1) { items.splice(i, 1); render(); }
  }

  function toggle(itemId, key) {
    const item = items.find(x => x.id === itemId);
    if (item) { item.checked[key] = !item.checked[key]; render(); }
  }

  // 各メンバーの負担額を計算する。
  // 1円未満の端数は先頭のメンバーから順に1円ずつ上乗せして完全に分配する。
  // チェックなしの場合は「自分」に全額を加算する。
  function calcShares(item) {
    const shares = {};
    MEMBERS.forEach(m => (shares[m.key] = 0));
    const sel = MEMBERS.filter(m => item.checked[m.key]);
    if (sel.length === 0) { shares.me = item.price; return shares; }
    const base = Math.floor(item.price / sel.length);
    const rem  = item.price % sel.length;
    sel.forEach((m, i) => { shares[m.key] = base + (i < rem ? 1 : 0); });
    return shares;
  }

  /**
   * レシート合計に基づく割り勘計算。
   *
   * 商品按分の合計とレシート合計の差額（税・値引き端数など）を
   * 各人の購入金額比率で按分し、四捨五入の端数は支払者に集約する。
   * 最終的に全員の合計がレシート合計と完全一致することを保証する。
   *
   * @param {Array}  itemList     - items 配列（price + checked を持つオブジェクト）
   * @param {number} receiptTotal - レシート合計金額（parseReceiptItems の totalAmount）
   * @param {string} [payer]      - 端数調整を受けるメンバーキー（default: 'me'）
   * @returns {Object}            - メンバーキーごとの最終負担額 { me, a, b, c }
   */
  function calcSplitByReceipt(itemList, receiptTotal, payer = 'me') {
    const keys = MEMBERS.map(m => m.key);

    // 1. 各人の商品合計（既存の calcShares を再利用）
    const raw = {};
    keys.forEach(k => (raw[k] = 0));
    for (const item of itemList) {
      const sh = calcShares(item);
      keys.forEach(k => (raw[k] += sh[k]));
    }

    // 2. 差額算出（税・端数・値引きなどによるズレ）
    const itemsTotal = keys.reduce((s, k) => s + raw[k], 0);
    const diff = receiptTotal - itemsTotal;

    if (diff === 0) return { ...raw };

    // 3. 差額を購入金額比率で按分 → 四捨五入
    const adj = {};
    if (itemsTotal > 0) {
      keys.forEach(k => {
        adj[k] = Math.round((raw[k] / itemsTotal) * diff);
      });
    } else {
      // 全員0円（商品なし）→ 支払者が全額負担
      keys.forEach(k => (adj[k] = 0));
      adj[payer] = diff;
    }

    // 4. 四捨五入による端数ズレを支払者に加減
    const adjSum = keys.reduce((s, k) => s + adj[k], 0);
    adj[payer] += diff - adjSum;

    // 5. 最終金額（全員合計 === receiptTotal を保証）
    const finals = {};
    keys.forEach(k => (finals[k] = raw[k] + adj[k]));
    return finals;
  }

  // 商品カードに表示する割り勘ヒント文を返す
  function hint(item) {
    const sel = MEMBERS.filter(m => item.checked[m.key]);
    if (sel.length === 0) return '<b>自分に全額加算</b>';
    return `${sel.map(m => m.label).join(' + ')} で <b>${sel.length}人割り</b>`;
  }

  function render() {
    if (items.length === 0) {
      $('itemList').innerHTML      = '<div class="empty-msg">商品を追加すると、ここに一覧が表示されます</div>';
      $('resultContent').innerHTML = '<div class="result-empty">商品を追加するとここに結果が表示されます</div>';
      return;
    }

    $('itemList').innerHTML = items.map(item => {
      const pills = MEMBERS.map(m => {
        const uid = `c_${item.id}_${m.key}`;
        const chk = item.checked[m.key] ? 'checked' : '';
        return `<span class="pill">`
          + `<input type="checkbox" id="${uid}" ${chk} onchange="toggle(${item.id},'${m.key}')">`
          + `<label for="${uid}" class="${m.cl}">${esc(m.label)}</label>`
          + `</span>`;
      }).join('');

      return `<div class="item-card">`
        + `<div class="item-top">`
        +   `<div>`
        +     `<div class="item-name">${esc(item.name)}</div>`
        +     `<span class="item-price-badge">¥${item.price.toLocaleString()}</span>`
        +   `</div>`
        +   `<button class="btn-del" onclick="deleteItem(${item.id})" title="削除">&times;</button>`
        + `</div>`
        + `<div class="checks">${pills}</div>`
        + `<div class="split-note">${hint(item)}</div>`
        + `</div>`;
    }).join('');

    const rawTotals = {};
    MEMBERS.forEach(m => (rawTotals[m.key] = 0));

    const rows = items.map(item => {
      const sh = calcShares(item);
      MEMBERS.forEach(m => (rawTotals[m.key] += sh[m.key]));
      const cells = MEMBERS.map(m => {
        const v = sh[m.key];
        return `<td class="${v > 0 ? 'val' : 'zero'}">${v > 0 ? '¥' + v.toLocaleString() : '-'}</td>`;
      }).join('');
      return `<tr onclick="this.classList.toggle('expanded')">`
        + `<td><span class="cell-name">${esc(item.name)}</span></td>${cells}`
        + `</tr>`;
    }).join('');

    const totals = receiptTotal > 0
      ? calcSplitByReceipt(items, receiptTotal)
      : rawTotals;

    const boxes = MEMBERS.map(m =>
      `<div class="total-box ${m.box}">`
      + `<div class="total-name">${esc(m.label)}</div>`
      + `<div class="total-yen">¥${totals[m.key].toLocaleString()}</div>`
      + `</div>`
    ).join('');

    const ths = MEMBERS.map(m => `<th class="${m.hcl}">${esc(m.label)}</th>`).join('');
    const fts = MEMBERS.map(m => `<td class="${m.fcl}">¥${totals[m.key].toLocaleString()}</td>`).join('');

    $('resultContent').innerHTML =
      `<div class="totals-grid">${boxes}</div>`
      + `<table class="detail-table">`
      +   `<thead><tr><th>商品</th>${ths}</tr></thead>`
      +   `<tbody>${rows}</tbody>`
      +   `<tfoot><tr><td>合計</td>${fts}</tr></tfoot>`
      + `</table>`;
  }

  // ── イベントリスナー ──────────────────────────────────────────

  // IME 確定後に全角数字を半角に自動変換（スマホ日本語キーボード対策）
  $('itemPrice').addEventListener('compositionend', function () {
    const converted = zenToHan(this.value);
    if (converted) this.value = converted;
  });

  // 商品を追加 / Enter キーでフォーカス移動
  $('btnAdd').addEventListener('click', addItem);
  $('itemPrice').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addItem(); } });
  $('itemName').addEventListener('keydown',  e => { if (e.key === 'Enter') { e.preventDefault(); $('itemPrice').focus(); } });

  // 全商品クリア（確認ダイアログあり）
  $('btnClear').addEventListener('click', () => {
    if (items.length === 0) return;
    if (confirm('すべての商品をクリアしますか？')) { items.length = 0; receiptTotal = 0; render(); }
  });

  // もどるボタン → スタート画面へ
  $('btnBack').addEventListener('click', () => showScreen('screen-start'));

  // スタート画面の「レシートを読み込む」→ カメラ起動
  $('btnGoUpload').addEventListener('click', () => $('startCameraInput').click());

  // スタート画面でカメラ撮影 → アップロード画面を開いて OCR 自動開始
  $('startCameraInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) { showScreen('screen-upload'); handleFile(file); }
  });

  // アップロード画面のサブボタン（ライブラリ / カメラ）
  $('btnLibrary').addEventListener('click', () => $('fileInput').click());
  $('btnCamera').addEventListener('click',  () => $('cameraInput').click());

  // ファイル選択 → プレビュー表示 & OCR 自動開始
  $('fileInput').addEventListener('change',   e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
  $('cameraInput').addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

  // 「再解析する」ボタン（OCR 完了後に有効になる）
  $('btnAnalyze').addEventListener('click', () => {
    if (selectedFile) analyzeReceipt(selectedFile);
  });
</script>

</div><!-- /screen-main -->

  // Service Worker を登録してオフライン対応・PWA インストールを有効にする。
  // HTTPS（GitHub Pages）または localhost でのみ動作する。
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
      .then(() => console.log('Service Worker registered'));
  }
</script>
