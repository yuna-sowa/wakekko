<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>わけっこ - 割り勘アプリ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#F4A987">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Zen Maru Gothic', 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #FFF5F5;
      color: #333333;
      min-height: 100vh;
      line-height: 1.75;
    }

    /* ========== ヘッダー / ロゴ ========== */
    .header {
      background: #fff;
      text-align: center;
      padding: 40px 16px 36px;
      border-bottom: 2px solid #FFE0E0;
    }
    .logo {
      font-size: 30px;
      font-weight: 900;
      color: #E8707A;
      letter-spacing: 8px;
    }
    .logo-sub {
      font-size: 12px;
      font-weight: 500;
      color: #999;
      margin-top: 6px;
      letter-spacing: 2px;
    }

    /* ========== 2カラム ========== */
    .layout {
      display: flex;
      gap: 32px;
      max-width: 1040px;
      margin: 0 auto;
      padding: 36px 32px;
      align-items: flex-start;
    }
    .col-left  { flex: 1; min-width: 0; }
    .col-right { flex: 1; min-width: 0; position: sticky; top: 36px; }

    /* ========== カード共通 ========== */
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 2px 10px rgba(200,100,100,0.06);
      margin-bottom: 28px;
    }
    .card-title {
      font-size: 12px;
      font-weight: 700;
      color: #E8707A;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #FFE8E8;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ========== フォーム ========== */
    .form-grid {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .form-grid input[type="text"] {
      flex: 1;
      min-width: 0;
    }
    .form-grid input[type="number"] {
      width: 100px;
      flex-shrink: 0;
    }
    .form-grid input {
      padding: 13px 18px;
      border: 1.5px solid #F0D8D8;
      border-radius: 16px;
      font-size: 14px;
      font-family: inherit;
      color: #333333;
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-grid input:focus {
      border-color: #E8707A;
      box-shadow: 0 0 0 3px rgba(232,112,122,0.10);
    }
    .form-grid input::placeholder { color: #ccc; }

    .btn-add {
      width: 100%;
      padding: 14px;
      background: #E8707A;
      color: #fff;
      border: none;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 2px;
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 3px 10px rgba(232,112,122,0.25);
    }
    .btn-add:hover { background: #D8606A; }
    .btn-add:active { transform: scale(0.98); }

    /* ========== 商品カード ========== */
    .item-card {
      background: #fff;
      border-radius: 18px;
      padding: 20px 22px;
      box-shadow: 0 2px 10px rgba(200,100,100,0.06);
      margin-bottom: 14px;
      animation: fadeUp 0.25s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    .item-top > div { min-width: 0; flex: 1; }
    .item-name {
      font-size: 14px;
      font-weight: 700;
      color: #333333;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-all;
    }
    .item-price-badge {
      display: inline-block;
      font-size: 13px;
      font-weight: 700;
      color: #E8707A;
      background: #FFF0F0;
      padding: 4px 14px;
      border-radius: 10px;
      margin-top: 6px;
    }
    .btn-del {
      background: #FFF5F5;
      border: 1px solid #F0D8D8;
      color: #D0A8A8;
      width: 30px;
      height: 30px;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .btn-del:hover {
      background: #FFE0E0;
      border-color: #E09090;
      color: #C05050;
    }

    /* ========== メンバー選択ピル ========== */
    .checks {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pill input { display: none; }
    .pill label {
      display: inline-block;
      padding: 6px 18px;
      border: 1.5px solid #F0D8D8;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      color: #bbb;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    /* 自分: ピンク */
    .pill input:checked + label.cl-me {
      border-color: #F0A0A8;
      background: #FFF0F0;
      color: #C85060;
      font-weight: 700;
    }
    /* Aさん: ミント */
    .pill input:checked + label.cl-a {
      border-color: #90C8B8;
      background: #F0FAF6;
      color: #408070;
      font-weight: 700;
    }
    /* Bさん: ラベンダー */
    .pill input:checked + label.cl-b {
      border-color: #C0B0D8;
      background: #F5F0FA;
      color: #685088;
      font-weight: 700;
    }
    /* Cさん: アプリコット */
    .pill input:checked + label.cl-c {
      border-color: #E8C098;
      background: #FFF8F0;
      color: #A87030;
      font-weight: 700;
    }

    .split-note {
      font-size: 11px;
      color: #bbb;
      margin-top: 10px;
    }
    .split-note b { color: #E8707A; }

    .empty-msg {
      text-align: center;
      color: #ccc;
      padding: 48px 16px;
      font-size: 13px;
    }

    /* ========== 結果: 合計カード ========== */
    .totals-grid {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 4px;
    }
    .totals-grid::-webkit-scrollbar { display: none; }
    .total-box {
      flex: 1 0 auto;
      min-width: 80px;
      text-align: center;
      padding: 20px 14px;
      border-radius: 18px;
    }
    .total-box.me { background: #FFF0F0; }
    .total-box.a  { background: #F0FAF6; }
    .total-box.b  { background: #F5F0FA; }
    .total-box.c  { background: #FFF8F0; }

    .total-name {
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    .total-box.me .total-name { color: #C85060; }
    .total-box.a  .total-name { color: #408070; }
    .total-box.b  .total-name { color: #685088; }
    .total-box.c  .total-name { color: #A87030; }

    .total-yen {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.5px;
      white-space: nowrap;
      color: #333333;
    }

    /* ========== 内訳テーブル ========== */
    .detail-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13px;
    }
    .detail-table thead th {
      padding: 12px 6px;
      font-size: 11px;
      font-weight: 700;
      color: #bbb;
      text-align: center;
      border-bottom: 1px solid #FFE8E8;
    }
    .detail-table thead th:first-child { text-align: left; }
    .detail-table thead .h-me { color: #C85060; }
    .detail-table thead .h-a  { color: #408070; }
    .detail-table thead .h-b  { color: #685088; }
    .detail-table thead .h-c  { color: #A87030; }

    .detail-table tbody td {
      padding: 11px 6px;
      text-align: center;
      border-bottom: 1px solid #FFF0F0;
    }
    .detail-table tbody tr:last-child td { border-bottom: none; }
    .detail-table tbody td:first-child {
      text-align: left;
      font-weight: 500;
      color: #666666;
      font-size: 12px;
      max-width: 100px;
      word-break: break-all;
    }
    .detail-table tbody td:first-child .cell-name {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .detail-table tbody tr.expanded td:first-child .cell-name {
      -webkit-line-clamp: unset;
      overflow: visible;
    }
    .detail-table tbody tr { cursor: pointer; transition: background 0.15s; }
    .detail-table tbody tr:active { background: #FFF5F5; }
    .detail-table .val  { color: #333333; font-weight: 700; font-size: 14px; }
    .detail-table .zero { color: #ddd; }

    .detail-table tfoot td {
      padding: 14px 6px;
      font-weight: 900;
      font-size: 15px;
      text-align: center;
      border-top: 1px solid #FFE8E8;
      color: #333333;
    }
    .detail-table tfoot td:first-child { text-align: left; color: #666666; }

    .result-empty {
      text-align: center;
      color: #ccc;
      padding: 40px 0;
      font-size: 13px;
    }

    /* ========== クリアボタン ========== */
    .btn-clear {
      width: 100%;
      padding: 13px;
      background: #fff;
      color: #bbb;
      border: 1.5px solid #F0D8D8;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
    }
    .btn-clear:hover {
      background: #FFF5F5;
      border-color: #E8B0B0;
      color: #999;
    }

    /* ========== レスポンシブ ========== */
    @media (max-width: 720px) {
      .layout {
        flex-direction: column;
        padding: 24px 18px;
        gap: 24px;
      }
      .col-right { position: static; }
      .total-box { min-width: 72px; padding: 18px 10px; }
      .total-yen { font-size: 22px; }
      .form-grid { gap: 8px; }
      .header { padding: 32px 16px 28px; }
      .logo { font-size: 26px; letter-spacing: 6px; }
    }
    @media (max-width: 400px) {
      .logo { font-size: 22px; letter-spacing: 4px; }
      .logo-sub { font-size: 11px; }
      .totals-grid { gap: 8px; }
      .total-box { min-width: 68px; padding: 16px 8px; }
      .total-yen { font-size: 20px; }
      .form-grid { flex-wrap: wrap; }
      .form-grid input[type="text"] { flex: 1 1 100%; }
      .form-grid input[type="number"] { flex: 1 1 100%; width: auto; }
      .detail-table { font-size: 12px; }
      .detail-table .val { font-size: 13px; }
    }

    /* ========== スタート画面 ========== */
    #screen-start {
      min-height: 100vh;
      background: #FAF8F4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 32px 64px;
    }
    #screen-main { display: none; }

    .start-illustration {
      font-size: 64px;
      margin-bottom: 8px;
      line-height: 1;
    }
    .start-logo {
      font-size: 48px;
      font-weight: 900;
      color: #C9673A;
      letter-spacing: 10px;
      margin-bottom: 16px;
    }
    .start-tagline {
      font-size: 14px;
      font-weight: 500;
      color: #A89080;
      letter-spacing: 1.5px;
      text-align: center;
      line-height: 1.9;
      margin-bottom: 64px;
    }
    .btn-start {
      width: 100%;
      max-width: 320px;
      padding: 20px 24px;
      background: #C9673A;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(201,103,58,0.30);
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn-start:hover {
      background: #B8592E;
      box-shadow: 0 8px 24px rgba(201,103,58,0.38);
    }
    .btn-start:active {
      transform: scale(0.97);
      box-shadow: 0 3px 12px rgba(201,103,58,0.25);
    }
    .start-footer {
      margin-top: 40px;
      font-size: 11px;
      color: #C8B8B0;
      letter-spacing: 1px;
    }

    /* ========== レシート読み込み画面 ========== */
    #screen-upload {
      min-height: 100vh;
      background: #FAF8F4;
      display: none;
      flex-direction: column;
    }
    .upload-header {
      display: flex;
      align-items: center;
      padding: 20px 20px 0;
      position: relative;
      min-height: 52px;
    }
    .btn-back {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      color: #B09888;
      cursor: pointer;
      padding: 8px 4px;
      letter-spacing: 0.5px;
      z-index: 1;
    }
    .btn-back:active { opacity: 0.6; }
    .upload-page-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      font-weight: 700;
      color: #7A5C48;
      letter-spacing: 2.5px;
      white-space: nowrap;
    }
    .upload-body {
      flex: 1;
      padding: 28px 24px 56px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }
    /* 選択前: プレースホルダーゾーン */
    .upload-zone {
      display: block;
      width: 100%;
      aspect-ratio: 3 / 4;
      max-height: 52vh;
      border: 2px dashed #D4C4B8;
      border-radius: 24px;
      background: #FFFAF7;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      transition: border-color 0.2s, background 0.2s;
    }
    .upload-zone:hover       { border-color: #C9673A; background: #FFF6EF; }
    .upload-zone.has-image   { border-style: solid; border-color: #C9673A; }
    .upload-zone-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: opacity 0.2s;
    }
    .upload-zone.has-image .upload-zone-placeholder { opacity: 0; pointer-events: none; }
    .upload-zone-icon  { font-size: 52px; line-height: 1; }
    .upload-zone-label {
      font-size: 14px;
      font-weight: 700;
      color: #B09888;
      letter-spacing: 1.5px;
    }
    .upload-zone-sub {
      font-size: 11px;
      color: #C8B8B0;
      letter-spacing: 0.8px;
    }
    /* プレビュー画像 */
    .preview-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    .upload-zone.has-image .preview-img { display: block; }
    /* 選択済みバッジ */
    .preview-badge {
      position: absolute;
      bottom: 14px;
      right: 14px;
      background: rgba(201,103,58,0.88);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 6px 14px;
      border-radius: 20px;
      display: none;
    }
    .upload-zone.has-image .preview-badge { display: block; }
    /* ライブラリ / カメラ ボタン行 */
    .upload-btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .btn-upload-opt {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 18px 12px;
      background: #fff;
      border: 1.5px solid #E8D8CC;
      border-radius: 20px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      color: #8A6858;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(180,130,100,0.06);
    }
    .btn-upload-opt:hover  { background: #FFF5EE; border-color: #C9673A; color: #C9673A; }
    .btn-upload-opt:active { transform: scale(0.97); }
    .btn-upload-opt-icon   { font-size: 26px; line-height: 1; }
    /* 解析ボタン */
    .btn-analyze {
      width: 100%;
      padding: 20px 24px;
      background: #C9673A;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(201,103,58,0.30);
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s, opacity 0.2s;
      margin-top: 4px;
    }
    .btn-analyze:disabled {
      background: #D4C4B8;
      box-shadow: none;
      cursor: not-allowed;
      opacity: 0.65;
    }
    .btn-analyze:not(:disabled):hover  { background: #B8592E; box-shadow: 0 8px 24px rgba(201,103,58,0.38); }
    .btn-analyze:not(:disabled):active { transform: scale(0.97); box-shadow: 0 3px 12px rgba(201,103,58,0.22); }
    .upload-note {
      text-align: center;
      font-size: 11px;
      color: #C8B8B0;
      letter-spacing: 0.5px;
      line-height: 1.8;
    }

    /* ========== OCR解析結果 ========== */
    .ocr-result-box {
      background: #FFFAF7;
      border: 1.5px solid #E8D8CC;
      border-radius: 20px;
      padding: 20px;
    }
    .ocr-result-title {
      font-size: 12px;
      font-weight: 700;
      color: #C9673A;
      margin-bottom: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .ocr-text-area {
      font-size: 12px;
      color: #6A5848;
      line-height: 1.9;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 200px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
    }
    .ocr-parsed-list {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .ocr-parsed-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #FFF5EE;
      border-radius: 12px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      color: #7A5C48;
    }
    .ocr-parsed-item span:last-child {
      font-weight: 700;
      color: #C9673A;
    }
    .ocr-empty {
      text-align: center;
      color: #C8B8B0;
      font-size: 12px;
      padding: 12px 0;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

<!-- ========== スタート画面 ========== -->
<div id="screen-start">
  <div class="start-illustration">🧾</div>
  <div class="start-logo">わけっこ</div>
  <div class="start-tagline">レシートを読み込んで<br>かんたん割り勘</div>
  <button class="btn-start" id="btnGoUpload">レシートを読み込む</button>
  <input type="file" id="startCameraInput" accept="image/*" capture="environment" style="display:none">
  <div class="start-footer">まずはレシートの写真を用意してね</div>
</div>

<!-- ========== レシート読み込み画面 ========== -->
<div id="screen-upload">
  <div class="upload-header">
    <button class="btn-back" id="btnBack">← もどる</button>
    <div class="upload-page-title">レシートを読み込む</div>
  </div>

  <div class="upload-body">
    <!-- アップロードゾーン（ライブラリ用） -->
    <label class="upload-zone" id="uploadZone" for="fileInput">
      <div class="upload-zone-placeholder">
        <div class="upload-zone-icon">🧾</div>
        <div class="upload-zone-label">タップして画像を選択</div>
        <div class="upload-zone-sub">JPG · PNG · HEIC に対応</div>
      </div>
      <img class="preview-img" id="previewImg" alt="プレビュー">
      <div class="preview-badge">✓ 選択済み</div>
    </label>
    <input type="file" id="fileInput" accept="image/*" style="display:none">
    <!-- カメラ専用 input（capture） -->
    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">

    <!-- サブボタン行 -->
    <div class="upload-btn-row">
      <button class="btn-upload-opt" id="btnLibrary">
        <span class="btn-upload-opt-icon">🖼️</span>
        <span>ライブラリから</span>
      </button>
      <button class="btn-upload-opt" id="btnCamera">
        <span class="btn-upload-opt-icon">📷</span>
        <span>写真を撮る</span>
      </button>
    </div>

    <!-- 解析ボタン -->
    <button class="btn-analyze" id="btnAnalyze" disabled>解析する</button>
    <p class="upload-note">レシート全体が映るように撮影してください</p>

    <!-- OCR解析結果エリア -->
    <div id="ocrResult" style="display:none">
      <div class="ocr-result-box">
        <div class="ocr-result-title">解析結果</div>
        <div id="ocrText" class="ocr-text-area"></div>
        <div id="ocrParsedList" class="ocr-parsed-list"></div>
      </div>
      <button class="btn-analyze" id="btnGoMain" style="display:none;margin-top:4px">割り勘リストに追加して進む →</button>
    </div>
  </div>
</div>

<!-- ========== メイン画面 ========== -->
<div id="screen-main">
<div class="header">
  <div class="logo">わけっこ</div>
  <div class="logo-sub">みんなでかんたん割り勘</div>
</div>

<div class="layout">
  <!-- ===== 左カラム: 入力 ===== -->
  <div class="col-left">
    <div class="card">
      <div class="card-title">商品を追加</div>
      <div class="form-grid">
        <input type="text" id="itemName" placeholder="商品名（例: ピザ）">
        <input type="number" id="itemPrice" placeholder="¥ 金額" min="0">
      </div>
      <button class="btn-add" id="btnAdd">+ 追加する</button>
    </div>

    <div id="itemList">
      <div class="empty-msg">商品を追加すると、ここに一覧が表示されます</div>
    </div>

    <button class="btn-clear" id="btnClear">すべてクリア</button>
  </div>

  <!-- ===== 右カラム: 結果 ===== -->
  <div class="col-right">
    <div class="card" id="resultCard">
      <div class="card-title">計算結果</div>
      <div id="resultContent">
        <div class="result-empty">商品を追加するとここに結果が表示されます</div>
      </div>
    </div>
  </div>
</div>

<script>
  /* ================================================================
     わけっこ — メインロジック
     ----------------------------------------------------------------
     OCR エンジン: Google Cloud Vision API (TEXT_DETECTION)
     APIキーの渡し方: URL パラメータ ?APIkey=YOUR_KEY
       例) https://yuna-sowa.github.io/wakekko/?APIkey=AIzaSy...
           http://localhost:8080/?APIkey=AIzaSy...
     ================================================================ */

  // ── 定数・状態 ────────────────────────────────────────────────
  const MEMBERS = [
    { key: 'me', label: '自分',  cl: 'cl-me', box: 'me', hcl: 'h-me', fcl: 'f-me' },
    { key: 'a',  label: 'Aさん', cl: 'cl-a',  box: 'a',  hcl: 'h-a',  fcl: 'f-a'  },
    { key: 'b',  label: 'Bさん', cl: 'cl-b',  box: 'b',  hcl: 'h-b',  fcl: 'f-b'  },
    { key: 'c',  label: 'Cさん', cl: 'cl-c',  box: 'c',  hcl: 'h-c',  fcl: 'f-c'  },
  ];

  const items = [];
  const $ = id => document.getElementById(id);
  let selectedFile = null;
  let currentParsedResult = null; // OCR解析結果を保持するグローバル変数

  // ── ユーティリティ ────────────────────────────────────────────

  // XSS 対策: ユーザー入力や外部テキストを innerHTML に埋め込む前にエスケープする
  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // 全角数字（IME 変換後など）を半角に統一して数値だけ返す
  function zenToHan(str) {
    return str
      .replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
      .replace(/[^0-9]/g, '');
  }

  // ── 画面切替 ──────────────────────────────────────────────────
  function showScreen(id) {
    ['screen-start', 'screen-upload', 'screen-main'].forEach(s => {
      const el = $(s);
      if (el) el.style.display = 'none';
    });
    const target = $(id);
    if (target) target.style.display = id === 'screen-upload' ? 'flex' : 'block';
  }

  // ── OCR ──────────────────────────────────────────────────────

  /**
   * 画像ファイルを受け取り、プレビュー表示と OCR を開始する。
   * fileInput / cameraInput / startCameraInput の change イベントから呼ぶ共通エントリ。
   */
  function handleFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    selectedFile = file;

    // プレビュー表示（FileReader で data URL に変換して <img> に渡す）
    const reader = new FileReader();
    reader.onload = e => {
      $('previewImg').src = e.target.result;
      $('uploadZone').classList.add('has-image');
    };
    reader.readAsDataURL(file);

    analyzeReceipt(file);
  }

  /**
   * 画像ファイルを純粋な Base64 文字列に変換する。
   * Vision API のリクエストボディに埋め込むため、data:... プレフィックスは除去する。
   */
  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload  = e => resolve(e.target.result.split(',')[1]); // "data:image/...;base64," を除去
      reader.onerror = () => reject(new Error('ファイルの読み込みに失敗しました'));
      reader.readAsDataURL(file);
    });
  }

  /**
   * Google Cloud Vision API（TEXT_DETECTION）で OCR を実行し、結果を画面に表示する。
   *
   * APIキーは URL パラメータ ?APIkey=... から取得する。
   * キーが未指定の場合はエラーメッセージを表示して処理を中断する。
   *
   * 処理フロー:
   *   1. URLSearchParams から APIキーを取得
   *   2. 画像を Base64 に変換
   *   3. Vision API に POST → fullTextAnnotation.text を取得
   *   4. parseReceiptItems() でテキストから商品・金額を抽出
   *   5. 結果を画面に表示し、割り勘リストへ追加するボタンを出す
   */
  async function analyzeReceipt(file) {
    const btnAnalyze = $('btnAnalyze');
    const ocrResult  = $('ocrResult');
    const ocrText    = $('ocrText');
    const ocrParsed  = $('ocrParsedList');
    const btnGoMain  = $('btnGoMain');

    // 解析中 UI にリセット
    btnAnalyze.disabled     = true;
    btnAnalyze.textContent  = '解析中…';
    ocrResult.style.display = 'block';
    ocrText.textContent     = '解析しています…';
    ocrParsed.innerHTML     = '';
    btnGoMain.style.display = 'none';

    try {
      // 1. URLパラメータから APIキーを取得
      const apiKey = new URLSearchParams(window.location.search).get('APIkey');
      if (!apiKey) {
        throw new Error('APIキーが指定されていません。URLに ?APIkey=YOUR_KEY を追加してください。');
      }

      // 2. 画像を Base64 に変換
      const base64Image = await fileToBase64(file);

      // 3. Vision API へ POST
      const endpoint = `https://vision.googleapis.com/v1/images:annotate?key=${apiKey}`;
      const response = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          requests: [{
            image:    { content: base64Image },
            features: [{ type: 'TEXT_DETECTION' }],
          }],
        }),
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        const msg = err?.error?.message ?? `HTTP ${response.status}`;
        throw new Error(`Vision API エラー: ${msg}`);
      }

      // 4. fullTextAnnotation.text を取得
      const data       = await response.json();
      const annotation = data?.responses?.[0]?.fullTextAnnotation;
      const text       = annotation?.text ?? '';

      // 生テキストをそのまま表示（デバッグ・確認用）
      ocrText.textContent = text.trim() || '（テキストを検出できませんでした）';

      // 5. 商品・金額・店名・合計をパースして一覧化
      currentParsedResult = parseReceiptItems(text); // グローバルに保持

      if (currentParsedResult.items.length > 0) {
        const metaRows = [
          currentParsedResult.storeName   ? `<div class="ocr-parsed-item ocr-meta"><span>店名</span><span>${esc(currentParsedResult.storeName)}</span></div>` : '',
          currentParsedResult.totalAmount ? `<div class="ocr-parsed-item ocr-meta"><span>合計</span><span>¥${currentParsedResult.totalAmount.toLocaleString()}</span></div>` : '',
        ].join('');
        ocrParsed.innerHTML = metaRows + currentParsedResult.items
          .map(it =>
            `<div class="ocr-parsed-item">`
            + `<span>${esc(it.name)}</span>`
            + `<span>¥${it.price.toLocaleString()}</span>`
            + `</div>`
          )
          .join('');
        btnGoMain.textContent   = '割り勘リストに追加して進む →';
        btnGoMain.style.display = 'block';
        btnGoMain.onclick = () => {
          console.log('[btnGoMain] 保存データ:', currentParsedResult);
          localStorage.setItem('currentParsedResult', JSON.stringify(currentParsedResult));
          items.length = 0; // 既存データをクリアしてOCR結果のみ反映
          currentParsedResult.items.forEach(it => {
            const checked = {};
            MEMBERS.forEach(m => (checked[m.key] = false));
            items.push({ id: Date.now() + (Math.random() * 1000 | 0), name: it.name, price: it.price, checked });
          });
          render();
          showScreen('screen-main');
        };
      } else {
        ocrParsed.innerHTML     = '<div class="ocr-empty">商品と金額を自動検出できませんでした。手動で入力してください。</div>';
        btnGoMain.textContent   = '手動で入力する →';
        btnGoMain.style.display = 'block';
        btnGoMain.onclick       = () => showScreen('screen-main');
      }
    } catch (err) {
      ocrText.textContent = `エラー: ${err.message ?? 'OCR処理に失敗しました。もう一度お試しください。'}`;
      ocrResult.style.display = 'block';
    } finally {
      btnAnalyze.disabled    = false;
      btnAnalyze.textContent = '再解析する';
    }
  }

  /**
   * OCR テキストから店名・合計・商品一覧を抽出して返す。
   *
   * @param {string} text - Vision API の fullTextAnnotation.text
   * @returns {{ storeName: string, totalAmount: number, items: {name:string, price:number}[] }}
   *
   * 処理フロー:
   *   1. 前処理: 「合計/TOTAL/Total」行以降を切り捨て（支払情報を除外）
   *              ※「小計/SUBTOTAL」では切らない
   *   2. 店名: 上から5行（非空行）で条件を満たす最初の行（文字種制限なし）
   *   3. 合計: 「合計」行の末尾金額（¥・カンマを除去して数値化）
   *   4. 商品: 名前候補行の同一行または次の2行以内に「価格のみ行」があれば登録
   */
  function parseReceiptItems(text) {
    // 全角数字・全角スペースを半角に統一（空行も含めインデックスを保持）
    const allLines = text.split('\n').map(raw =>
      raw
        .replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
        .replace(/　/g, ' ')
        .trim()
    );

    // ── 共通パターン ──────────────────────────────────────────────
    const DATE_PAT = /\d{4}[\/\-]\d{2}[\/\-]\d{2}/;
    const TIME_PAT = /\d{2}:\d{2}/;
    const TEL_PAT  = /TEL|tel|0120|\d{2,4}-\d{2,4}-\d{4}/;

    // 「合計/TOTAL/Total」行か（「小計/SUBTOTAL」はfalse）
    function isTotalLine(l) {
      return /合計|TOTAL|Total/.test(l) && !/小計|SUBTOTAL/i.test(l);
    }

    // 「単独の金額のみの行」か（行全体が金額だけで構成される）
    // ※（内消費税等）・税率・支払情報は除外
    function isPureAmountLine(line) {
      if (!line) return false;
      if (/内消費税|税率|コード決済|クレジット/.test(line)) return false;
      return /^[¥￥]?\s*(\d{1,2},\d{3}|\d{2,5})\s*円?\s*$/.test(line);
    }

    // ── 前処理: 最終合計行インデックスの特定 ────────────────────────
    // finalTotalLineIdx: 解析を停止する行のインデックス（allLines基準）
    // この行を処理した時点でそれ以降の解析は完全に停止する
    let finalTotalLineIdx = -1;
    for (let i = 0; i < allLines.length; i++) {
      if (allLines[i] && isTotalLine(allLines[i])) {
        if (extractPrice(allLines[i]) !== null) {
          // 合計行自体に金額あり → その行が最終合計
          finalTotalLineIdx = i;
        } else {
          // 合計行に金額なし → 直下の「単独の金額のみの行」を最終合計とする
          for (let j = i + 1; j < allLines.length; j++) {
            if (!allLines[j]) continue;
            if (isPureAmountLine(allLines[j])) {
              finalTotalLineIdx = j;
              break;
            }
          }
        }
        break;
      }
    }
    // 店名・totalAmount 抽出用に最終合計行まで（含む）をスライス
    const cutIdx = finalTotalLineIdx >= 0 ? finalTotalLineIdx + 1 : allLines.length;
    const lines  = allLines.slice(0, cutIdx);
    const nonEmpty = lines.filter(l => l.length > 0);

    // ── ヘルパー関数 ──────────────────────────────────────────────

    // 行末の正の有効価格（10〜99,999円）を返す。マイナス・TEL・日付はnull
    function extractPrice(line) {
      if (!line) return null;
      if (/[△\-－]\s*[\d,]+\s*円?\s*$/.test(line)) return null; // マイナス金額
      if (TEL_PAT.test(line))  return null;
      if (DATE_PAT.test(line)) return null;
      const m = line.match(/[¥￥]?\s*(\d{1,2},\d{3}|\d{2,5})\s*円?\s*$/);
      if (!m) return null;
      const v = parseInt(m[1].replace(/,/g, ''), 10);
      return (v >= 10 && v < 100_000) ? v : null;
    }

    // 商品名候補として除外すべき行か
    function isSkipLine(line) {
      if (!line)                                    return true;
      if (/^[@＠]/.test(line))                      return true; // @で始まる（単価情報）
      if (/ポイント|値引き?|消費税/.test(line))      return true; // 除外キーワード
      if (/[△\-－]\s*[\d,]+\s*円?\s*$/.test(line)) return true; // マイナス金額
      if (isTotalLine(line))                        return true; // 合計行
      if (/小計|SUBTOTAL/i.test(line))              return true; // 小計行
      if (TEL_PAT.test(line))                       return true;
      if (DATE_PAT.test(line))                      return true;
      if (TIME_PAT.test(line))                      return true;
      return false;
    }

    // 「価格のみ行」か（商品名を含まない、価格だけの行）
    // @行・数字のみ・数量＋価格の形式が該当する
    function isPriceOnlyLine(line) {
      if (!line) return false;
      if (/^[@＠]/.test(line)) return true; // @行は常に価格のみ行
      const pm = line.match(/[¥￥]?\s*(\d{1,2},\d{3}|\d{2,5})\s*円?\s*$/);
      if (!pm) return false;
      const prefix = line.slice(0, line.length - pm[0].length).trim();
      // 価格前のテキストが空 or 数字・記号のみ（「1点」「2個」など）
      return prefix.length === 0 || /^[@＠\d\s点個枚本袋,]+$/.test(prefix);
    }

    // 商品名のクリーニング
    function cleanName(raw) {
      let name = raw;
      name = name.replace(/^[＊*]\s*/, '');         // ① 先頭の * 除去（軽減税率マークなど）
      name = name.replace(/^\d{8,13}\s*/, '');      // ② JANコード除去
      name = name.replace(/^\d{3,7}[\s※]\s*/, ''); // ③ 短い数字コード除去
      name = name.replace(/^\d+\s+/, '');           // ④ 先頭の孤立数字除去
      name = name.replace(/[※\\＼×÷☆★●○■□◇◆▶▷►◀◁▲▼△▽~～｜|]+/g, ''); // ⑤ 記号除去
      name = name.replace(/\s{2,}/g, ' ').trim();   // ⑥ 連続スペース整理
      return name;
    }

    // 商品名として無効か
    function isInvalidName(name) {
      if (!name || name.length === 0)              return true;
      if (/ポイント|値引き?|消費税|合計|小計/.test(name)) return true;
      if (DATE_PAT.test(name))                     return true;
      if (TIME_PAT.test(name))                     return true;
      if (/(\d{4}[\s\-]){3}\d{4}/.test(name))     return true; // クレジットカード番号
      if (/[A-Za-z0-9]{12,}/.test(name))           return true; // 12桁以上の連続英数字
      const xCount = (name.match(/[Xx×Ｘ＊*]/g) || []).length;
      if (name.length > 0 && xCount / name.length >= 0.7) return true; // 70%以上がX/*
      return false;
    }

    // ── 店名抽出 ──────────────────────────────────────────────────
    // 上から5行（非空行）で条件を満たす最初の行（文字種制限なし）
    let storeName = '';
    for (let i = 0; i < Math.min(5, nonEmpty.length); i++) {
      const l = nonEmpty[i];
      if (isTotalLine(l))           continue;
      if (/小計|SUBTOTAL/i.test(l)) continue;
      if (TEL_PAT.test(l))          continue;
      if (DATE_PAT.test(l))         continue;
      if (TIME_PAT.test(l))         continue;
      if (/^\d+$/.test(l))          continue; // 数字のみ
      if (extractPrice(l) !== null) continue; // 金額を含む行
      storeName = l;
      break;
    }

    // ── 合計金額抽出 ──────────────────────────────────────────────
    // 前処理で特定した finalTotalLineIdx の行から金額を取得
    let totalAmount = 0;
    if (finalTotalLineIdx >= 0) {
      const m = allLines[finalTotalLineIdx].match(/[¥￥]?\s*([\d,]+)\s*円?\s*$/);
      if (m) totalAmount = parseInt(m[1].replace(/,/g, ''), 10);
    }

    // ── 商品抽出 ──────────────────────────────────────────────────
    const seen  = new Set();
    const items = [];

    function pushItem(name, price) {
      const cleaned = cleanName(name);
      if (isInvalidName(cleaned)) return;
      const key = `${cleaned}:${price}`;
      if (seen.has(key)) return;
      seen.add(key);
      items.push({ name: cleaned, price });
    }

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      if (!line) continue;

      // ── 「合計」を最終終了トリガーとする ──────────────────────────
      // finalTotalLineIdx に達した時点で解析を完全に停止（break）
      // 後続の登録番号・決済方法・ポイント・再度の合計は一切解析しない
      if (finalTotalLineIdx >= 0 && i >= finalTotalLineIdx) break;

      if (isSkipLine(line)) continue;

      // 行末の価格を確認
      const inlinePrice = extractPrice(line);
      const priceMatch  = inlinePrice !== null
        ? line.match(/[¥￥]?\s*(\d{1,2},\d{3}|\d{2,5})\s*円?\s*$/)
        : null;
      const namePart = (priceMatch
        ? line.slice(0, line.length - priceMatch[0].length)
        : line).trim();

      if (inlinePrice !== null && namePart.length > 0) {
        // ── パターン①: 1行完結（同一行に商品名と価格）──────────────
        pushItem(namePart, inlinePrice);
        continue;
      }

      // ── パターン②: 名前候補行 ────────────────────────────────────
      // 次の2行以内に「価格のみ行」があれば商品として登録する
      // 1行完結型の行（名前＋価格）の価格は借りない
      if (namePart.length > 0) {
        for (let j = i + 1; j <= i + 2 && j < lines.length; j++) {
          // 最終合計行以降の価格は参照しない
          if (finalTotalLineIdx >= 0 && j >= finalTotalLineIdx) break;
          const nextLine = lines[j];
          if (!nextLine)                  continue; // 空行はスキップ
          if (!isPriceOnlyLine(nextLine)) continue; // 名前+価格行の価格は借りない
          const nextPrice = extractPrice(nextLine);
          if (nextPrice !== null) {
            pushItem(namePart, nextPrice);
            break;
          }
        }
        // 2行以内に価格のみ行がなければ商品として登録しない
      }
    }

    return { storeName, totalAmount, items };
  }

  // ── 商品リスト操作 ────────────────────────────────────────────
  function addItem() {
    const name  = $('itemName').value.trim();
    const price = parseInt($('itemPrice').value, 10);
    if (!name)                     { $('itemName').focus();  return; }
    if (isNaN(price) || price < 0) { $('itemPrice').focus(); return; }

    const checked = {};
    MEMBERS.forEach(m => (checked[m.key] = false));
    items.push({ id: Date.now(), name, price, checked });

    $('itemName').value  = '';
    $('itemPrice').value = '';
    $('itemName').focus();
    render();
  }

  function deleteItem(id) {
    const i = items.findIndex(x => x.id === id);
    if (i !== -1) { items.splice(i, 1); render(); }
  }

  function toggle(itemId, key) {
    const item = items.find(x => x.id === itemId);
    if (item) { item.checked[key] = !item.checked[key]; render(); }
  }

  // 各メンバーの負担額を計算する。
  // 1円未満の端数は先頭のメンバーから順に1円ずつ上乗せして完全に分配する。
  // チェックなしの場合は「自分」に全額を加算する。
  function calcShares(item) {
    const shares = {};
    MEMBERS.forEach(m => (shares[m.key] = 0));
    const sel = MEMBERS.filter(m => item.checked[m.key]);
    if (sel.length === 0) { shares.me = item.price; return shares; }
    const base = Math.floor(item.price / sel.length);
    const rem  = item.price % sel.length;
    sel.forEach((m, i) => { shares[m.key] = base + (i < rem ? 1 : 0); });
    return shares;
  }

  /**
   * レシート合計に基づく割り勘計算。
   *
   * 商品按分の合計とレシート合計の差額（税・値引き端数など）を
   * 各人の購入金額比率で按分し、四捨五入の端数は支払者に集約する。
   * 最終的に全員の合計がレシート合計と完全一致することを保証する。
   *
   * @param {Array}  itemList     - items 配列（price + checked を持つオブジェクト）
   * @param {number} receiptTotal - レシート合計金額（parseReceiptItems の totalAmount）
   * @param {string} [payer]      - 端数調整を受けるメンバーキー（default: 'me'）
   * @returns {Object}            - メンバーキーごとの最終負担額 { me, a, b, c }
   */
  function calcSplitByReceipt(itemList, receiptTotal, payer = 'me') {
    const keys = MEMBERS.map(m => m.key);

    // 1. 各人の商品合計（既存の calcShares を再利用）
    const raw = {};
    keys.forEach(k => (raw[k] = 0));
    for (const item of itemList) {
      const sh = calcShares(item);
      keys.forEach(k => (raw[k] += sh[k]));
    }

    // 2. 差額算出（税・端数・値引きなどによるズレ）
    const itemsTotal = keys.reduce((s, k) => s + raw[k], 0);
    const diff = receiptTotal - itemsTotal;

    if (diff === 0) return { ...raw };

    // 3. 差額を購入金額比率で按分 → 四捨五入
    const adj = {};
    if (itemsTotal > 0) {
      keys.forEach(k => {
        adj[k] = Math.round((raw[k] / itemsTotal) * diff);
      });
    } else {
      // 全員0円（商品なし）→ 支払者が全額負担
      keys.forEach(k => (adj[k] = 0));
      adj[payer] = diff;
    }

    // 4. 四捨五入による端数ズレを支払者に加減
    const adjSum = keys.reduce((s, k) => s + adj[k], 0);
    adj[payer] += diff - adjSum;

    // 5. 最終金額（全員合計 === receiptTotal を保証）
    const finals = {};
    keys.forEach(k => (finals[k] = raw[k] + adj[k]));
    return finals;
  }

  // 商品カードに表示する割り勘ヒント文を返す
  function hint(item) {
    const sel = MEMBERS.filter(m => item.checked[m.key]);
    if (sel.length === 0) return '<b>自分に全額加算</b>';
    return `${sel.map(m => m.label).join(' + ')} で <b>${sel.length}人割り</b>`;
  }

  function render() {
    if (items.length === 0) {
      $('itemList').innerHTML      = '<div class="empty-msg">商品を追加すると、ここに一覧が表示されます</div>';
      $('resultContent').innerHTML = '<div class="result-empty">商品を追加するとここに結果が表示されます</div>';
      return;
    }

    $('itemList').innerHTML = items.map(item => {
      const pills = MEMBERS.map(m => {
        const uid = `c_${item.id}_${m.key}`;
        const chk = item.checked[m.key] ? 'checked' : '';
        return `<span class="pill">`
          + `<input type="checkbox" id="${uid}" ${chk} onchange="toggle(${item.id},'${m.key}')">`
          + `<label for="${uid}" class="${m.cl}">${esc(m.label)}</label>`
          + `</span>`;
      }).join('');

      return `<div class="item-card">`
        + `<div class="item-top">`
        +   `<div>`
        +     `<div class="item-name">${esc(item.name)}</div>`
        +     `<span class="item-price-badge">¥${item.price.toLocaleString()}</span>`
        +   `</div>`
        +   `<button class="btn-del" onclick="deleteItem(${item.id})" title="削除">&times;</button>`
        + `</div>`
        + `<div class="checks">${pills}</div>`
        + `<div class="split-note">${hint(item)}</div>`
        + `</div>`;
    }).join('');

    const totals = {};
    MEMBERS.forEach(m => (totals[m.key] = 0));

    const rows = items.map(item => {
      const sh = calcShares(item);
      MEMBERS.forEach(m => (totals[m.key] += sh[m.key]));
      const cells = MEMBERS.map(m => {
        const v = sh[m.key];
        return `<td class="${v > 0 ? 'val' : 'zero'}">${v > 0 ? '¥' + v.toLocaleString() : '-'}</td>`;
      }).join('');
      return `<tr onclick="this.classList.toggle('expanded')">`
        + `<td><span class="cell-name">${esc(item.name)}</span></td>${cells}`
        + `</tr>`;
    }).join('');

    const boxes = MEMBERS.map(m =>
      `<div class="total-box ${m.box}">`
      + `<div class="total-name">${esc(m.label)}</div>`
      + `<div class="total-yen">¥${totals[m.key].toLocaleString()}</div>`
      + `</div>`
    ).join('');

    const ths = MEMBERS.map(m => `<th class="${m.hcl}">${esc(m.label)}</th>`).join('');
    const fts = MEMBERS.map(m => `<td class="${m.fcl}">¥${totals[m.key].toLocaleString()}</td>`).join('');

    $('resultContent').innerHTML =
      `<div class="totals-grid">${boxes}</div>`
      + `<table class="detail-table">`
      +   `<thead><tr><th>商品</th>${ths}</tr></thead>`
      +   `<tbody>${rows}</tbody>`
      +   `<tfoot><tr><td>合計</td>${fts}</tr></tfoot>`
      + `</table>`;
  }

  // ── イベントリスナー ──────────────────────────────────────────

  // IME 確定後に全角数字を半角に自動変換（スマホ日本語キーボード対策）
  $('itemPrice').addEventListener('compositionend', function () {
    const converted = zenToHan(this.value);
    if (converted) this.value = converted;
  });

  // 商品を追加 / Enter キーでフォーカス移動
  $('btnAdd').addEventListener('click', addItem);
  $('itemPrice').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addItem(); } });
  $('itemName').addEventListener('keydown',  e => { if (e.key === 'Enter') { e.preventDefault(); $('itemPrice').focus(); } });

  // 全商品クリア（確認ダイアログあり）
  $('btnClear').addEventListener('click', () => {
    if (items.length === 0) return;
    if (confirm('すべての商品をクリアしますか？')) { items.length = 0; render(); }
  });

  // もどるボタン → スタート画面へ
  $('btnBack').addEventListener('click', () => showScreen('screen-start'));

  // スタート画面の「レシートを読み込む」→ カメラ起動
  $('btnGoUpload').addEventListener('click', () => $('startCameraInput').click());

  // スタート画面でカメラ撮影 → アップロード画面を開いて OCR 自動開始
  $('startCameraInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) { showScreen('screen-upload'); handleFile(file); }
  });

  // アップロード画面のサブボタン（ライブラリ / カメラ）
  $('btnLibrary').addEventListener('click', () => $('fileInput').click());
  $('btnCamera').addEventListener('click',  () => $('cameraInput').click());

  // ファイル選択 → プレビュー表示 & OCR 自動開始
  $('fileInput').addEventListener('change',   e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
  $('cameraInput').addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

  // 「再解析する」ボタン（OCR 完了後に有効になる）
  $('btnAnalyze').addEventListener('click', () => {
    if (selectedFile) analyzeReceipt(selectedFile);
  });
</script>

</div><!-- /screen-main -->

  // Service Worker を登録してオフライン対応・PWA インストールを有効にする。
  // HTTPS（GitHub Pages）または localhost でのみ動作する。
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
      .then(() => console.log('Service Worker registered'));
  }
</script>
