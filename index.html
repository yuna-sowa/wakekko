<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>わけっこ - 割り勘アプリ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#F4A987">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Zen Maru Gothic', 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #FFF5F5;
      color: #333333;
      min-height: 100vh;
      line-height: 1.75;
    }

    /* ========== ヘッダー / ロゴ ========== */
    .header {
      background: #fff;
      text-align: center;
      padding: 40px 16px 36px;
      border-bottom: 2px solid #FFE0E0;
    }
    .logo {
      font-size: 30px;
      font-weight: 900;
      color: #E8707A;
      letter-spacing: 8px;
    }
    .logo-sub {
      font-size: 12px;
      font-weight: 500;
      color: #999;
      margin-top: 6px;
      letter-spacing: 2px;
    }

    /* ========== レイアウト ========== */
    .layout {
      max-width: 540px;
      margin: 0 auto;
      padding: 36px 32px;
    }

    /* ========== カード共通 ========== */
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 2px 10px rgba(200,100,100,0.06);
      margin-bottom: 28px;
    }
    .card-title {
      font-size: 12px;
      font-weight: 700;
      color: #E8707A;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #FFE8E8;
      letter-spacing: 2px;
    }
    .add-form-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      margin-bottom: 0;
      border-bottom: none;
      padding-bottom: 0;
    }
    .add-form-title.open {
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #FFE8E8;
    }
    .add-form-title #addFormChevron {
      font-size: 10px;
      color: #ccc;
    }

    /* ========== フォーム ========== */
    .form-grid {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .form-grid input[type="text"] {
      flex: 1;
      min-width: 0;
    }
    .form-grid input[type="number"] {
      width: 100px;
      flex-shrink: 0;
    }
    .form-grid input {
      padding: 13px 18px;
      border: 1.5px solid #F0D8D8;
      border-radius: 16px;
      font-size: 14px;
      font-family: inherit;
      color: #333333;
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-grid input:focus {
      border-color: #E8707A;
      box-shadow: 0 0 0 3px rgba(232,112,122,0.10);
    }
    .form-grid input::placeholder { color: #ccc; }

    .btn-add {
      width: 100%;
      padding: 14px;
      background: #E8707A;
      color: #fff;
      border: none;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 2px;
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 3px 10px rgba(232,112,122,0.25);
    }
    .btn-add:hover { background: #D8606A; }
    .btn-add:active { transform: scale(0.98); }

    /* ========== 商品カード ========== */
    .item-card {
      background: #fff;
      border-radius: 18px;
      padding: 20px 22px;
      box-shadow: 0 2px 10px rgba(200,100,100,0.06);
      margin-bottom: 14px;
      animation: fadeUp 0.25s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item-card {
      cursor: pointer;
      user-select: none;
    }
    .item-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .item-card.open .item-top {
      margin-bottom: 14px;
    }
    .item-top > div:first-child { min-width: 0; flex: 1; }
    .item-top-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .expand-chevron {
      font-size: 10px;
      color: #ccc;
      line-height: 1;
    }
    .split-note-compact {
      font-size: 11px;
      color: #bbb;
      margin-top: 6px;
    }
    .split-note-compact b { color: #E8707A; }
    .item-name {
      font-size: 14px;
      font-weight: 700;
      color: #333333;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-all;
    }
    .item-price-badge {
      display: inline-block;
      font-size: 13px;
      font-weight: 700;
      color: #E8707A;
      background: #FFF0F0;
      padding: 4px 14px;
      border-radius: 10px;
      margin-top: 6px;
    }
    .btn-del {
      background: #FFF5F5;
      border: 1px solid #F0D8D8;
      color: #D0A8A8;
      width: 30px;
      height: 30px;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .btn-del:hover {
      background: #FFE0E0;
      border-color: #E09090;
      color: #C05050;
    }

    /* ========== メンバー選択ピル ========== */
    .checks {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pill input { display: none; }
    .pill label {
      display: inline-block;
      padding: 6px 18px;
      border: 1.5px solid #F0D8D8;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      color: #bbb;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    /* 自分: ピンク */
    .pill input:checked + label.cl-me {
      border-color: #F0A0A8;
      background: #FFF0F0;
      color: #C85060;
      font-weight: 700;
    }
    /* Aさん: ミント */
    .pill input:checked + label.cl-a {
      border-color: #90C8B8;
      background: #F0FAF6;
      color: #408070;
      font-weight: 700;
    }
    /* Bさん: ラベンダー */
    .pill input:checked + label.cl-b {
      border-color: #C0B0D8;
      background: #F5F0FA;
      color: #685088;
      font-weight: 700;
    }
    /* Cさん: アプリコット */
    .pill input:checked + label.cl-c {
      border-color: #E8C098;
      background: #FFF8F0;
      color: #A87030;
      font-weight: 700;
    }

    .split-note {
      font-size: 11px;
      color: #bbb;
      margin-top: 10px;
    }
    .split-note b { color: #E8707A; }

    /* ========== インライン編集 ========== */
    .editable-field { cursor: pointer; }
    .edit-icon {
      font-size: 10px;
      color: #ddd;
      margin-left: 3px;
      vertical-align: middle;
      transition: color 0.15s;
    }
    .editable-field:hover .edit-icon,
    .editable-field:active .edit-icon { color: #E8707A; }
    .edit-input {
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      color: #333;
      border: 1.5px solid #E8707A;
      border-radius: 8px;
      padding: 3px 8px;
      outline: none;
      background: #FFF8F8;
      box-sizing: border-box;
      width: 100%;
    }
    .edit-price-input {
      width: 130px;
      text-align: right;
      font-size: 13px;
    }

    /* ========== 個数割り当てコントロール ========== */
    .qty-checks { display: flex; flex-direction: column; gap: 8px; }
    .qty-row { display: flex; align-items: center; justify-content: space-between; }
    .qty-label {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1.5px solid #F0D8D8;
      color: #bbb;
      min-width: 60px;
      text-align: center;
    }
    .qty-label.cl-me { border-color: #F0A0A8; background: #FFF0F0; color: #C85060; }
    .qty-label.cl-a  { border-color: #90C8B8; background: #F0FAF6; color: #408070; }
    .qty-label.cl-b  { border-color: #C0B0D8; background: #F5F0FA; color: #685088; }
    .qty-label.cl-c  { border-color: #E8C098; background: #FFF8F0; color: #A87030; }
    .qty-ctrl { display: flex; align-items: center; gap: 12px; }
    .qty-btn {
      background: #FFF5F5;
      border: 1.5px solid #F0D8D8;
      color: #E8707A;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      flex-shrink: 0;
    }
    .qty-btn:hover { background: #FFE0E0; }
    .qty-btn:disabled { opacity: 0.25; cursor: default; pointer-events: none; }
    .qty-num { font-size: 18px; font-weight: 700; color: #333; min-width: 24px; text-align: center; }
    .qty-unit-hint { font-size: 11px; font-weight: 400; color: #aaa; }
    .qty-remaining {
      font-size: 12px;
      font-weight: 700;
      text-align: right;
      margin-bottom: 6px;
      color: #E8707A;
    }
    .qty-remaining.complete { color: #5CBF8A; }
    .qty-total-hint { font-size: 11px; color: #ddd; margin-top: 4px; text-align: right; }

    .empty-msg {
      text-align: center;
      color: #ccc;
      padding: 48px 16px;
      font-size: 13px;
    }

    /* ========== 結果: 合計カード ========== */
    .totals-grid {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 4px;
    }
    .totals-grid::-webkit-scrollbar { display: none; }
    .total-box {
      flex: 1 0 auto;
      min-width: 80px;
      text-align: center;
      padding: 20px 14px;
      border-radius: 18px;
    }
    .total-box.me { background: #FFF0F0; }
    .total-box.a  { background: #F0FAF6; }
    .total-box.b  { background: #F5F0FA; }
    .total-box.c  { background: #FFF8F0; }

    .total-name {
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    .total-box.me .total-name { color: #C85060; }
    .total-box.a  .total-name { color: #408070; }
    .total-box.b  .total-name { color: #685088; }
    .total-box.c  .total-name { color: #A87030; }

    .total-yen {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.5px;
      white-space: nowrap;
      color: #333333;
    }

    /* ========== 内訳テーブル ========== */
    .detail-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13px;
    }
    .detail-table thead th {
      padding: 12px 6px;
      font-size: 11px;
      font-weight: 700;
      color: #bbb;
      text-align: center;
      border-bottom: 1px solid #FFE8E8;
    }
    .detail-table thead th:first-child { text-align: left; }
    .detail-table thead .h-me { color: #C85060; }
    .detail-table thead .h-a  { color: #408070; }
    .detail-table thead .h-b  { color: #685088; }
    .detail-table thead .h-c  { color: #A87030; }

    .detail-table tbody td {
      padding: 11px 6px;
      text-align: center;
      border-bottom: 1px solid #FFF0F0;
    }
    .detail-table tbody tr:last-child td { border-bottom: none; }
    .detail-table tbody td:first-child {
      text-align: left;
      font-weight: 500;
      color: #666666;
      font-size: 12px;
      max-width: 100px;
      word-break: break-all;
    }
    .detail-table tbody td:first-child .cell-name {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .detail-table tbody tr.expanded td:first-child .cell-name {
      -webkit-line-clamp: unset;
      overflow: visible;
    }
    .detail-table tbody tr { cursor: pointer; transition: background 0.15s; }
    .detail-table tbody tr:active { background: #FFF5F5; }
    .detail-table .val  { color: #333333; font-weight: 700; font-size: 14px; }
    .detail-table .zero { color: #ddd; }
    .detail-table .adj-row td { border-top: 1px dashed #F0D8D8; }
    .detail-table .adj-row .cell-name { color: #bbb; font-size: 11px; line-height: 1.5; }
    .detail-table .adj-row small { display: block; color: #bbb; }
    .detail-table .adj-val { color: #bbb !important; font-weight: 500 !important; font-size: 12px !important; }
    .split-warning {
      background: #FFF5F0;
      border: 1px solid #FFD0B0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 12px;
      color: #C06020;
      margin-top: 12px;
      line-height: 1.6;
    }

    .detail-table tfoot td {
      padding: 14px 6px;
      font-weight: 900;
      font-size: 15px;
      text-align: center;
      border-top: 1px solid #FFE8E8;
      color: #333333;
    }
    .detail-table tfoot td:first-child { text-align: left; color: #666666; }

    .result-empty {
      text-align: center;
      color: #ccc;
      padding: 40px 0;
      font-size: 13px;
    }

    /* ========== クリアボタン ========== */
    .btn-clear {
      width: 100%;
      padding: 13px;
      margin-bottom: 28px;
      background: #fff;
      color: #bbb;
      border: 1.5px solid #F0D8D8;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
    }
    .btn-clear:hover {
      background: #FFF5F5;
      border-color: #E8B0B0;
      color: #999;
    }

    /* ========== レスポンシブ ========== */
    @media (max-width: 480px) {
      .layout {
        padding: 24px 18px;
      }
      .total-box { min-width: 72px; padding: 18px 10px; }
      .total-yen { font-size: 22px; }
      .form-grid { gap: 8px; }
      .header { padding: 32px 16px 28px; }
      .logo { font-size: 26px; letter-spacing: 6px; }
    }
    @media (max-width: 400px) {
      .logo { font-size: 22px; letter-spacing: 4px; }
      .logo-sub { font-size: 11px; }
      .totals-grid { gap: 8px; }
      .total-box { min-width: 68px; padding: 16px 8px; }
      .total-yen { font-size: 20px; }
      .form-grid { flex-wrap: wrap; }
      .form-grid input[type="text"] { flex: 1 1 100%; }
      .form-grid input[type="number"] { flex: 1 1 100%; width: auto; }
      .detail-table { font-size: 12px; }
      .detail-table .val { font-size: 13px; }
    }

    /* ========== ボトムシート ========== */
    .bottom-sheet-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }
    .bottom-sheet-overlay.open {
      display: flex;
      animation: bsOverlayIn 0.22s ease;
    }
    .bottom-sheet {
      background: #fff;
      border-radius: 24px 24px 0 0;
      padding: 20px 24px 40px;
      width: 100%;
      max-width: 540px;
      animation: bsSlideUp 0.28s cubic-bezier(0.34,1.2,0.64,1);
    }
    .bottom-sheet-handle {
      width: 36px; height: 4px;
      background: #E0D0C8;
      border-radius: 4px;
      margin: 0 auto 20px;
    }
    .bottom-sheet-title {
      font-size: 13px;
      font-weight: 700;
      color: #9A7A68;
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 20px;
    }
    .bottom-sheet-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .bs-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 22px 12px;
      background: #FFFAF7;
      border: 1.5px solid #E8D8CC;
      border-radius: 20px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      color: #8A6858;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .bs-btn:hover  { background: #FFF0E6; border-color: #C9673A; color: #C9673A; }
    .bs-btn:active { transform: scale(0.97); }
    .bs-btn-icon   { font-size: 32px; line-height: 1; }
    .bottom-sheet-cancel {
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      background: none;
      border: none;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      color: #B09888;
      cursor: pointer;
      letter-spacing: 1px;
    }
    @keyframes bsOverlayIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    @keyframes bsSlideUp {
      from { transform: translateY(100%); } to { transform: translateY(0); }
    }

    /* ========== スタート画面 ========== */
    #screen-start {
      min-height: 100vh;
      background: linear-gradient(170deg, #FDF6EE 0%, #FAF0E6 45%, #F5E8DC 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 28px 60px;
      position: relative;
      overflow: hidden;
    }
    #screen-main { display: none; }

    /* 背景グロー */
    .start-glow-top {
      position: absolute;
      top: -120px; left: 50%;
      transform: translateX(-50%);
      width: 480px; height: 480px;
      background: radial-gradient(circle, rgba(201,103,58,0.16) 0%, transparent 65%);
      pointer-events: none;
    }
    .start-glow-br {
      position: absolute;
      bottom: -100px; right: -80px;
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(232,112,122,0.10) 0%, transparent 65%);
      pointer-events: none;
    }

    /* フローティングドット */
    .start-dot {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }
    .start-dot--1 {
      width: 72px; height: 72px;
      background: rgba(201,103,58,0.07);
      top: 10%; right: -16px;
      animation: sdFloat 9s ease-in-out infinite;
    }
    .start-dot--2 {
      width: 44px; height: 44px;
      background: rgba(232,112,122,0.09);
      bottom: 22%; left: -10px;
      animation: sdFloat 11s 1s ease-in-out infinite reverse;
    }
    .start-dot--3 {
      width: 20px; height: 20px;
      background: rgba(201,103,58,0.11);
      top: 28%; left: 6%;
      animation: sdFloat 7s 2s ease-in-out infinite;
    }
    .start-dot--4 {
      width: 32px; height: 32px;
      background: rgba(232,112,122,0.07);
      top: 18%; right: 14%;
      animation: sdFloat 13s 0.5s ease-in-out infinite reverse;
    }

    /* レシートカード（ヒービジュアル） */
    .start-receipt {
      position: relative;
      width: 210px;
      background: #FFFFFF;
      border-radius: 3px 3px 12px 12px;
      padding: 22px 22px 26px;
      margin-bottom: 36px;
      box-shadow:
        0 6px 32px rgba(160,80,40,0.13),
        0 2px 8px rgba(160,80,40,0.08),
        0 0 0 1px rgba(201,103,58,0.06);
      animation: sdReceiptDrop 0.72s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    /* ミシン目（上部・下部は点線ボーダーで表現） */
    .start-receipt::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: repeating-linear-gradient(
        90deg,
        #EDD8C4 0px, #EDD8C4 6px,
        transparent 6px, transparent 12px
      );
      border-radius: 3px 3px 0 0;
    }
    .start-receipt::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 4px;
      background: repeating-linear-gradient(
        90deg,
        #EDD8C4 0px, #EDD8C4 6px,
        transparent 6px, transparent 12px
      );
      border-radius: 0 0 12px 12px;
    }

    .start-receipt-head {
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      color: #C9673A;
      letter-spacing: 3px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px dashed #EDD8C4;
    }
    .start-receipt-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 10.5px;
      color: #8A7060;
      margin-bottom: 6px;
      gap: 8px;
    }
    .start-receipt-row .rn {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .start-receipt-row .rp { font-weight: 700; color: #5A4A40; flex-shrink: 0; }
    .start-receipt-divider {
      border: none;
      border-top: 1px dashed #EDD8C4;
      margin: 12px 0;
    }
    .start-receipt-total {
      display: flex;
      justify-content: space-between;

    /* ========== レシート読み込み画面 ========== */
    #screen-upload {
      min-height: 100vh;
      background: #FAF8F4;

    .upload-zone {

</head>

<script>
  /* ================================================================
     わけっこ — メインロジック
     ----------------------------------------------------------------
     OCR エンジン: Google Cloud Vision API (TEXT_DETECTION)
     APIキーの渡し方: URL パラメータ ?APIkey=YOUR_KEY
       例) https://yuna-sowa.github.io/wakekko/?APIkey=AIzaSy...
           http://localhost:8080/?APIkey=AIzaSy...
     ================================================================ */

  // ── 定数・状態 ────────────────────────────────────────────────
  const MEMBERS = [
    { key: 'me', label: '自分',  cl: 'cl-me', box: 'me', hcl: 'h-me', fcl: 'f-me' },
    { key: 'a',  label: 'Aさん', cl: 'cl-a',  box: 'a',  hcl: 'h-a',  fcl: 'f-a'  },
    { key: 'b',  label: 'Bさん', cl: 'cl-b',  box: 'b',  hcl: 'h-b',  fcl: 'f-b'  },
    { key: 'c',  label: 'Cさん', cl: 'cl-c',  box: 'c',  hcl: 'h-c',  fcl: 'f-c'  },
  ];

  const items = [];
  const $ = id => document.getElementById(id);
  let selectedFile = null;
  let currentParsedResult = null; // OCR解析結果を保持するグローバル変数
  let receiptTotal = 0; // OCRで取得したレシート合計金額（差額按分に使用）

  // ── ユーティリティ ────────────────────────────────────────────

  // XSS 対策: ユーザー入力や外部テキストを innerHTML に埋め込む前にエスケープする
  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // 全角数字（IME 変換後など）を半角に統一して数値だけ返す
  function zenToHan(str) {
    return str
      .replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
      .replace(/[^0-9]/g, '');
  }

  // ── 画面切替 ──────────────────────────────────────────────────
  function showScreen(id) {
    ['screen-start', 'screen-upload', 'screen-main'].forEach(s => {
      const el = $(s);
      if (el) el.style.display = 'none';
    });
    const target = $(id);
    if (target) target.style.display = id === 'screen-upload' ? 'flex' : 'block';
  }

  // ── OCR ──────────────────────────────────────────────────────

  /**
   * 画像ファイルを受け取り、プレビュー表示と OCR を開始する。
   * fileInput / cameraInput / startCameraInput の change イベントから呼ぶ共通エントリ。
   */
  function handleFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    selectedFile = file;

    // プレビュー表示（FileReader で data URL に変換して <img> に渡す）
    const reader = new FileReader();
    reader.onload = e => {
      $('previewImg').src = e.target.result;
      $('uploadZone').classList.add('has-image');
    };
    reader.readAsDataURL(file);

    analyzeReceipt(file);
  }

  /**
   * 画像ファイルを純粋な Base64 文字列に変換する。
   * Vision API のリクエストボディに埋め込むため、data:... プレフィックスは除去する。
   */
  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload  = e => resolve(e.target.result.split(',')[1]); // "data:image/...;base64," を除去
      reader.onerror = () => reject(new Error('ファイルの読み込みに失敗しました'));
      reader.readAsDataURL(file);
    });
  }

  /**
   * Google Cloud Vision API（TEXT_DETECTION）で OCR を実行し、結果を画面に表示する。
   *
   * APIキーは URL パラメータ ?APIkey=... から取得する。
   * キーが未指定の場合はエラーメッセージを表示して処理を中断する。
   *
   * 処理フロー:
   *   1. URLSearchParams から APIキーを取得
   *   2. 画像を Base64 に変換
   *   3. Vision API に POST → fullTextAnnotation.text を取得
   *   4. Claude API でテキストから商品・金額を抽出
   *   5. 結果を画面に表示し、割り勘リストへ追加するボタンを出す
   */
  async function analyzeReceipt(file) {
    const btnAnalyze = $('btnAnalyze');
    const ocrResult  = $('ocrResult');
    const ocrText    = $('ocrText');
    const ocrParsed  = $('ocrParsedList');
    const btnGoMain  = $('btnGoMain');

    // 解析中 UI にリセット
    btnAnalyze.disabled     = true;
    btnAnalyze.textContent  = '解析中…';
    ocrResult.style.display = 'block';
    ocrText.textContent     = '解析しています…';
    ocrParsed.innerHTML     = '';
    btnGoMain.style.display = 'none';

    try {
      // 1. URLパラメータから APIキーを取得
      const apiKey    = new URLSearchParams(window.location.search).get('APIkey');
      const claudeKey = new URLSearchParams(window.location.search).get('ClaudeKey');
      if (!apiKey)    throw new Error('Google APIキーが指定されていません。URLに ?APIkey=YOUR_KEY を追加してください。');
      if (!claudeKey) throw new Error('Claude APIキーが指定されていません。URLに &ClaudeKey=YOUR_KEY を追加してください。');

      // 2. 画像を Base64 に変換
      const base64Image = await fileToBase64(file);

      // 3. Vision API へ POST
      ocrText.textContent = '① 文字を読み取り中…';
      const endpoint = `https://vision.googleapis.com/v1/images:annotate?key=${apiKey}`;
      const response = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          requests: [{
            image:    { content: base64Image },
            features: [{ type: 'DOCUMENT_TEXT_DETECTION' }],
          }],
        }),
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        const msg = err?.error?.message ?? `HTTP ${response.status}`;
        throw new Error(`Vision API エラー: ${msg}`);
      }

      // 4. fullTextAnnotation.text を取得
      const data       = await response.json();
      const annotation = data?.responses?.[0]?.fullTextAnnotation;
      const text       = annotation?.text ?? '';

      // 生テキストをそのまま表示（デバッグ・確認用）
      ocrText.textContent = text.trim() || '（テキストを検出できませんでした）';

      // 5. Claude AI で商品・金額・店名・合計を抽出
      ocrParsed.innerHTML = '<div class="ocr-empty">② AIが商品リストを作成中…</div>';
      currentParsedResult = await parseReceiptWithClaude(text, claudeKey); // グローバルに保持

      if (currentParsedResult.items.length > 0) {
        const metaRows = [
          currentParsedResult.storeName   ? `<div class="ocr-parsed-item ocr-meta"><span>店名</span><span>${esc(currentParsedResult.storeName)}</span></div>` : '',
          currentParsedResult.totalAmount ? `<div class="ocr-parsed-item ocr-meta"><span>合計</span><span>¥${currentParsedResult.totalAmount.toLocaleString()}</span></div>` : '',
        ].join('');
        ocrParsed.innerHTML = metaRows + currentParsedResult.items
          .map(it => {
            const qtyBadge = it.quantity > 1 ? ` <small>×${it.quantity}</small>` : '';
            return `<div class="ocr-parsed-item">`
              + `<span>${esc(it.name)}${qtyBadge}</span>`
              + `<span>¥${it.price.toLocaleString()}</span>`
              + `</div>`;
          })
          .join('');
        btnGoMain.textContent   = '割り勘リストに追加して進む →';
        btnGoMain.style.display = 'block';
        btnGoMain.onclick = () => {
          console.log('[btnGoMain] 保存データ:', currentParsedResult);
          localStorage.setItem('currentParsedResult', JSON.stringify(currentParsedResult));
          items.length = 0; // 既存データをクリアしてOCR結果のみ反映
          receiptTotal = currentParsedResult.totalAmount || 0;
          currentParsedResult.items.forEach(it => {
            const checked = {};
            MEMBERS.forEach(m => (checked[m.key] = false));
            const qty = {};
            MEMBERS.forEach(m => (qty[m.key] = 0));
            items.push({
              id: Date.now() + (Math.random() * 1000 | 0),
              name: it.name, price: it.price,
              quantity: it.quantity || 1, unitPrice: it.unitPrice || null,
              checked, qty, fromReceipt: true,
            });
          });
          render();
          showScreen('screen-main');
        };
      } else {
        ocrParsed.innerHTML     = '<div class="ocr-empty">商品と金額を自動検出できませんでした。手動で入力してください。</div>';
        btnGoMain.textContent   = '手動で入力する →';
        btnGoMain.style.display = 'block';
        btnGoMain.onclick       = () => showScreen('screen-main');
      }
    } catch (err) {
      ocrText.textContent = `エラー: ${err.message ?? 'OCR処理に失敗しました。もう一度お試しください。'}`;
      ocrResult.style.display = 'block';
    } finally {
      btnAnalyze.disabled    = false;
      btnAnalyze.textContent = '再解析する';
    }
  }

  /**
   * Claude AI に OCR テキストを渡して商品リストを返す。
   * @param {string} text - Vision API の fullTextAnnotation.text
   * @param {string} claudeKey - Claude API キー
   * @returns {Promise<{ storeName: string, totalAmount: number, items: {name:string, price:number}[] }>}
   */
  async function parseReceiptWithClaude(text, claudeKey) {
    const prompt = `あなたはレシート解析AIです。以下のレシートOCRテキストから商品情報を抽出し、JSONのみで返してください。説明文は不要です。

## 抽出ルール
- storeName: 店名（不明なら空文字）
- totalAmount: 合計金額の数値（¥・カンマなし）
- items: 商品リスト
  - name: 商品名（記号・コード類を除いた読みやすい名前）
  - price: 割引・クーポン適用後の正の整数
- TEL・ポイント・消費税・日時などはitemsに含めない
- 割引・クーポンは該当商品の価格に反映させ、itemsには含めない

## 金額の読み方
- 金額の後に「内」「外」「税」が付いている場合（例: 1,078内）は、それを除いた数字が金額
- 「¥」「￥」「\\」は通貨記号として無視し、数字部分だけを金額とする

## 2セクション形式のレシート（関西スーパー等）
- レシートには同じ商品が2回登場することがある（上部サマリーと下部明細）
- 商品名の前に「*」が付いている行は**明細セクション**の価格で、こちらが正確な元値
- 同じ商品が「*」ありと「*」なしで両方ある場合は、「*」付きの明細価格を優先すること
- 「自動割引1 10.00 -XX」の「-XX」が割引額で、その商品の元値から引いた値が最終価格
- 割引額はその商品元値のおよそ10%（例: 元値¥199 → 割引-19、元値¥89 → 割引-8）
- OCRの読み取り順の都合で割引行が**商品行より前**に現れる場合がある。その場合も直後の商品に適用する
- OCRが崩れて複数商品の価格・割引が混在した行になることがある。割引額と商品価格の10%の対応で正しく紐付けること
- 抽出完了後、全商品の最終価格の合計がレシートに記載された税抜き合計額（「税8%対象」の金額）と一致するか確認すること。不一致の場合は割引の紐付けを見直すこと

## コストコのレシート
- 価格末尾の \`T\`（10%）または \`E\`（8%）は税区分コードであり金額ではない（例: \`3,188 T\` → ¥3,188）
- **同名商品の重複排除禁止**：同じ商品名が複数回登場しても1件にまとめず、それぞれ別の購入として抽出すること。\`>>> BOTTOM OF BASKET ITEM COUNT N <<<\` はその商品をN個購入したことを示す
- **CPNブロックの処理**：\`CPN\` 行を含むブロックはクーポン詳細であり、以下のルールで処理する
  - \`*\`なし通常商品の場合：商品の最終価格は \`X,XXX X,XXX T/E\` 形式ですでに割引済み。後続の \`NNN-T\` や \`NNN-E\` 行はクーポン割引額の記録なので **itemsに含めない**
  - \`*\`付き商品の場合：\`CPN / *商品名 / CPN / コード / NNN-T(E)\` の形式で現れる。\`*\`付き商品名が実商品で \`NNN\` がその最終価格（例: \`CPN / *イトウエンムキチャクロマメ / CPN / 44461 / 0300 / 300-E\` → 商品「イトウエンムキチャクロマメ」¥300）
- **元値と最終価格の使い分け**：同一商品に \`2,998 2,998 T\`（最終価格）と \`3.988 T\`（割引前元値）の両方がある場合は小さい方の価格（割引後）を使う
- **除外すべき行**：CPN（単独行）・SUBTOTAL・TOTAL・TAX・IRC・B.O.B・末尾が \`TPD\` の行（例: \`MERRIES B SELF TPD\`、\`TOILET BRUSH TPD\`）
- \`数字@\` は数量マーカーであり商品名ではない（例: \`1@\`・\`2@\`）

## 複数行にまたがる商品の読み方
- 「単価×数量」「@単価 数量」のような行は商品名ではなく数量・単価の補足行
- その場合、商品名はその直前の行、金額はその補足行に記載された合計金額を使う
- 例：
  おむつ           ← 商品名
  ¥298×2  596内   ← 単価×数量。商品名=おむつ、金額=596

## 個数がある商品の読み方
- 「ランチプレート ¥1,500×3 4,500内」のように単価・個数・合計がある場合は quantity と unitPrice も返す
- quantity: 個数（整数）、unitPrice: 単価（整数）、price: 合計金額（unitPrice × quantity）
- 個数が1または不明な場合は quantity と unitPrice は省略する

## 返答形式（JSONのみ、余分なテキストなし）
{"storeName":"","totalAmount":0,"items":[{"name":"","price":0,"quantity":3,"unitPrice":1500}]}

OCRテキスト:
${text}`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': claudeKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 2048,
        messages: [{ role: 'user', content: prompt }],
      }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      const msg = err?.error?.message ?? `HTTP ${res.status}`;
      throw new Error(`Claude API エラー: ${msg}`);
    }

    const data    = await res.json();
    const content = data?.content?.[0]?.text ?? '';
    const match   = content.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('Claude APIの応答からJSONを取得できませんでした');

    const parsed = JSON.parse(match[0]);
    return {
      storeName:   String(parsed.storeName  ?? '').trim(),
      totalAmount: Number(parsed.totalAmount) || 0,
      items: (parsed.items ?? [])
        .map(it => {
          const quantity  = Number(it.quantity)  || 1;
          const rawPrice  = Number(it.price)     || 0;
          const rawUnit   = Number(it.unitPrice) || 0;
          // AIが単価を price として返すケースを補正:
          // unitPrice が設定済みで price が単価と等しい（＝合計未計算）なら price を再計算
          let price = rawPrice;
          let unitPrice = null;
          if (quantity > 1) {
            if (rawUnit > 0) {
              unitPrice = rawUnit;
              // price が単価と一致する or unitPrice*quantity の方が大きいなら合計に補正
              price = (rawPrice === rawUnit || rawPrice < rawUnit * quantity) ? rawUnit * quantity : rawPrice;
            } else {
              unitPrice = Math.round(rawPrice / quantity);
            }
          }
          return {
            name:      String(it.name ?? '').trim(),
            price,
            quantity:  quantity > 1 ? quantity : 1,
            unitPrice: quantity > 1 ? unitPrice : null,
          };
        })
        .filter(it => it.name && it.price > 0),
    };
  }

  // ── 商品リスト操作 ────────────────────────────────────────────
  function addItem() {
    const name  = $('itemName').value.trim();
    const price = parseInt($('itemPrice').value, 10);
    if (!name)                     { $('itemName').focus();  return; }
    if (isNaN(price) || price < 0) { $('itemPrice').focus(); return; }

    const checked = {};
    MEMBERS.forEach(m => (checked[m.key] = false));
    items.push({ id: Date.now(), name, price, quantity: 1, unitPrice: null, checked, qty: {}, fromReceipt: false });

    $('itemName').value  = '';
    $('itemPrice').value = '';
    $('itemName').focus();
    render();
  }

  function deleteItem(id) {
    const i = items.findIndex(x => x.id === id);
    if (i === -1) return;
    const item = items[i];
    if (item.fromReceipt) receiptTotal = Math.max(0, receiptTotal - item.price);
    items.splice(i, 1);
    if (editingState?.id === id) editingState = null;
    openItemIds.delete(id);
    render();
  }

  function toggle(itemId, key) {
    const item = items.find(x => x.id === itemId);
    if (item) { item.checked[key] = !item.checked[key]; render(); }
  }

  // ── インライン編集 ───────────────────────────────────────────
  let editingState = null; // { id, field: 'name' | 'price' }
  let openItemIds  = new Set(); // 展開中の商品カード id セット

  window.toggleItem = function(id) {
    if (openItemIds.has(id)) openItemIds.delete(id);
    else openItemIds.add(id);
    render();
  };

  function startEdit(id, field) {
    openItemIds.add(id); // カードを展開してから編集
    editingState = { id, field };
    render();
  }

  function saveEdit(id, field, value) {
    if (!editingState) return; // blur が Enter 後に二重発火するのを防ぐ
    const item = items.find(x => x.id === id);
    if (item) {
      if (field === 'name') {
        const v = value.trim();
        if (v) item.name = v;
      } else if (field === 'price') {
        const v = parseInt(String(value).replace(/[^0-9]/g, ''), 10);
        if (!isNaN(v) && v > 0) {
          item.price = v;
          if (item.quantity > 1) item.unitPrice = Math.round(v / item.quantity);
        }
      }
    }
    editingState = null;
    render();
  }

  function cancelEdit() {
    editingState = null;
    render();
  }

  function setQty(itemId, key, val) {
    const item = items.find(x => x.id === itemId);
    if (!item) return;
    const currentTotal = MEMBERS.reduce((s, m) => s + (item.qty[m.key] || 0), 0);
    const delta = val - (item.qty[key] || 0);
    if (delta > 0 && currentTotal + delta > item.quantity) return;
    item.qty[key] = Math.max(0, val);
    render();
  }

  // 各メンバーの負担額を計算する。
  // 個数割り当てモード（quantity > 1）: 割り当て個数×単価で按分、端数は先頭から1円加算。
  // チェックモード: 1円未満の端数は先頭のメンバーから順に1円ずつ上乗せして完全に分配する。
  // チェックなし／個数未割り当ての場合は「自分」に全額を加算する。
  function calcShares(item) {
    const shares = {};
    MEMBERS.forEach(m => (shares[m.key] = 0));

    if (item.quantity > 1) {
      const assigned = MEMBERS.filter(m => (item.qty?.[m.key] || 0) > 0);
      const totalAssigned = MEMBERS.reduce((s, m) => s + (item.qty?.[m.key] || 0), 0);
      if (totalAssigned === 0) return shares; // 未割り当て → 全員0（表では「-」表示）
      // 個数に比例した金額を配分
      assigned.forEach(m => {
        shares[m.key] = Math.round(item.price * item.qty[m.key] / item.quantity);
      });
      // 全量割り当て済みの場合のみ端数補正（合計がitem.priceと一致するよう）
      if (totalAssigned === item.quantity) {
        const sum = assigned.reduce((s, m) => s + shares[m.key], 0);
        let rem = item.price - sum;
        for (const m of assigned) { if (rem <= 0) break; shares[m.key]++; rem--; }
      }
      return shares;
    }

    const sel = MEMBERS.filter(m => item.checked[m.key]);
    if (sel.length === 0) { shares.me = item.price; return shares; }
    const base = Math.floor(item.price / sel.length);
    const rem  = item.price % sel.length;
    sel.forEach((m, i) => { shares[m.key] = base + (i < rem ? 1 : 0); });
    return shares;
  }

  /**
   * レシート合計に基づく割り勘計算。
   * レシート商品のみで差額を計算し、手動商品は別途加算する。
   *
   * ケース2（差額正）: 差額を購入比率で自動按分 → adjRow を返す
   * ケース3（差額負・5%未満）: 同上（マイナス按分）
   * ケース3（差額負・5%以上）: 調整せず警告を返す
   *
   * @returns {{ finals, adjRow, warning }}
   */
  function calcSplitByReceipt(itemList, receiptTotal, payer = 'me') {
    const keys         = MEMBERS.map(m => m.key);
    const receiptItems = itemList.filter(it => it.fromReceipt);
    const manualItems  = itemList.filter(it => !it.fromReceipt);

    // レシート商品の各人合計
    const receiptRaw = {};
    keys.forEach(k => (receiptRaw[k] = 0));
    for (const item of receiptItems) {
      const sh = calcShares(item);
      keys.forEach(k => (receiptRaw[k] += sh[k]));
    }

    // 手動商品の各人合計
    const manualRaw = {};
    keys.forEach(k => (manualRaw[k] = 0));
    for (const item of manualItems) {
      const sh = calcShares(item);
      keys.forEach(k => (manualRaw[k] += sh[k]));
    }

    // 差額計算（レシート商品のみ）
    const receiptItemsTotal = keys.reduce((s, k) => s + receiptRaw[k], 0);
    const diff = receiptTotal - receiptItemsTotal;

    const adj = {};
    keys.forEach(k => (adj[k] = 0));
    let adjRow = null, warning = null;

    if (diff !== 0) {
      const diffRate = Math.abs(diff) / receiptTotal;
      if (diff > 0 || diffRate < 0.05) {
        // 自動按分（購入比率で分配）
        if (receiptItemsTotal > 0) {
          keys.forEach(k => { adj[k] = Math.round((receiptRaw[k] / receiptItemsTotal) * diff); });
        } else {
          adj[payer] = diff;
        }
        // 端数補正
        const adjSum = keys.reduce((s, k) => s + adj[k], 0);
        adj[payer] += diff - adjSum;
        adjRow = { adj: { ...adj }, total: diff };
      } else {
        // 5%以上のマイナス差額 → 警告、調整なし
        warning = { diff, rate: Math.round(diffRate * 100) };
      }
    }

    const finals = {};
    keys.forEach(k => (finals[k] = receiptRaw[k] + adj[k] + manualRaw[k]));
    return { finals, adjRow, warning };
  }

  // 商品カードに表示する割り勘ヒント文を返す
  function hint(item) {
    if (item.quantity > 1) {
      const totalAssigned = MEMBERS.reduce((s, m) => s + (item.qty?.[m.key] || 0), 0);
      if (totalAssigned === 0) return `<b>⚠️ ${item.quantity}個を誰かに割り当ててください</b>`;
      const parts = MEMBERS.filter(m => (item.qty?.[m.key] || 0) > 0)
        .map(m => `${m.label}×${item.qty[m.key]}`).join(' ＋ ');
      const unassigned = item.quantity - totalAssigned;
      const suffix = unassigned > 0
        ? `　<b>⚠️ 残り${unassigned}個を割り当ててください</b>`
        : '　<b>✓ 割り当て完了</b>';
      return parts + suffix;
    }
    const sel = MEMBERS.filter(m => item.checked[m.key]);
    if (sel.length === 0) return '<b>自分に全額加算</b>';
    return `${sel.map(m => m.label).join(' + ')} で <b>${sel.length}人割り</b>`;
  }

  function render() {
    if (items.length === 0) {
      $('itemList').innerHTML      = '<div class="empty-msg">商品を追加すると、ここに一覧が表示されます</div>';
      $('resultContent').innerHTML = '<div class="result-empty">商品を追加するとここに結果が表示されます</div>';
      return;
    }

    $('itemList').innerHTML = items.map(item => {
      let controls, priceBadge;
      // qty>1 の商品は初回表示時に自動展開
      if (item.quantity > 1) openItemIds.add(item.id);
      const isOpen      = openItemIds.has(item.id);
      const isEditName  = item.fromReceipt && editingState?.id === item.id && editingState?.field === 'name';
      const isEditPrice = item.fromReceipt && editingState?.id === item.id && editingState?.field === 'price';

      if (item.quantity > 1) {
        // 個数割り当てモード
        const totalAssigned = MEMBERS.reduce((s, m) => s + (item.qty?.[m.key] || 0), 0);
        const remaining = item.quantity - totalAssigned;
        const complete  = remaining === 0;
        const qtyRows = MEMBERS.map(m => {
          const v = item.qty?.[m.key] || 0;
          const minusDis = v <= 0        ? 'disabled' : '';
          const plusDis  = remaining <= 0 ? 'disabled' : '';
          return `<div class="qty-row">`
            + `<span class="qty-label ${m.cl}">${esc(m.label)}</span>`
            + `<div class="qty-ctrl">`
            +   `<button class="qty-btn" onclick="setQty(${item.id},'${m.key}',${v - 1})" ${minusDis}>−</button>`
            +   `<span class="qty-num">${v}</span>`
            +   `<button class="qty-btn" onclick="setQty(${item.id},'${m.key}',${v + 1})" ${plusDis}>＋</button>`
            + `</div>`
            + `</div>`;
        }).join('');
        const remainingLabel = complete
          ? `<div class="qty-remaining complete">✓ 全${item.quantity}個を割り当て済み</div>`
          : `<div class="qty-remaining">残り ${remaining}個</div>`;
        controls = remainingLabel
          + `<div class="qty-checks">${qtyRows}</div>`
          + `<div class="qty-total-hint">合計 ${totalAssigned} / ${item.quantity}個</div>`;
        priceBadge = `¥${item.price.toLocaleString()} `
          + `<span class="qty-unit-hint">(¥${item.unitPrice.toLocaleString()}×${item.quantity})</span>`;
      } else {
        // チェックボックスモード
        const pills = MEMBERS.map(m => {
          const uid = `c_${item.id}_${m.key}`;
          const chk = item.checked[m.key] ? 'checked' : '';
          return `<span class="pill">`
            + `<input type="checkbox" id="${uid}" ${chk} onchange="toggle(${item.id},'${m.key}')">`
            + `<label for="${uid}" class="${m.cl}">${esc(m.label)}</label>`
            + `</span>`;
        }).join('');
        controls = `<div class="checks">${pills}</div>`;
        priceBadge = `¥${item.price.toLocaleString()}`;
      }

      // 商品名 HTML（レシート商品は展開時のみ編集可）
      const nameHtml = isEditName
        ? `<input class="edit-input edit-input-focus" type="text" value="${esc(item.name)}"
             onclick="event.stopPropagation()"
             onkeydown="if(event.key==='Enter'){event.preventDefault();saveEdit(${item.id},'name',this.value)}else if(event.key==='Escape'){cancelEdit()}"
             onblur="saveEdit(${item.id},'name',this.value)">`
        : `<div class="item-name${(item.fromReceipt && isOpen) ? ' editable-field' : ''}"${(item.fromReceipt && isOpen) ? ` onclick="event.stopPropagation();startEdit(${item.id},'name')"` : ''}>${esc(item.name)}${(item.fromReceipt && isOpen) ? '<span class="edit-icon">✎</span>' : ''}</div>`;

      // 価格バッジ HTML（レシート商品は展開時のみ編集可）
      const badgeHtml = isEditPrice
        ? `<span class="item-price-badge"><input class="edit-input edit-price-input edit-input-focus" type="number" value="${item.price}" min="1"
             onclick="event.stopPropagation()"
             onkeydown="if(event.key==='Enter'){event.preventDefault();saveEdit(${item.id},'price',this.value)}else if(event.key==='Escape'){cancelEdit()}"
             onblur="saveEdit(${item.id},'price',this.value)"></span>`
        : `<span class="item-price-badge${(item.fromReceipt && isOpen) ? ' editable-field' : ''}"${(item.fromReceipt && isOpen) ? ` onclick="event.stopPropagation();startEdit(${item.id},'price')"` : ''}>${priceBadge}${(item.fromReceipt && isOpen) ? '<span class="edit-icon">✎</span>' : ''}</span>`;

      return `<div class="item-card${isOpen ? ' open' : ''}" onclick="toggleItem(${item.id})">`
        + `<div class="item-top">`
        +   `<div>`
        +     nameHtml
        +     badgeHtml
        +   `</div>`
        +   `<div class="item-top-actions">`
        +     `<span class="expand-chevron">${isOpen ? '▲' : '▼'}</span>`
        +     `<button class="btn-del" onclick="event.stopPropagation();deleteItem(${item.id})" title="削除">&times;</button>`
        +   `</div>`
        + `</div>`
        + (isOpen
            ? `<div class="item-controls" onclick="event.stopPropagation()">${controls}<div class="split-note">${hint(item)}</div></div>`
            : `<div class="split-note-compact">${hint(item)}</div>`)
        + `</div>`;
    }).join('');

    // 編集モード中はinputにフォーカスを当てる
    const focusEl = $('itemList').querySelector('.edit-input-focus');
    if (focusEl) { focusEl.focus(); try { focusEl.select(); } catch(e) {} }

    const rawTotals = {};
    MEMBERS.forEach(m => (rawTotals[m.key] = 0));

    const rows = items.map(item => {
      const sh = calcShares(item);
      MEMBERS.forEach(m => (rawTotals[m.key] += sh[m.key]));
      const cells = MEMBERS.map(m => {
        const v = sh[m.key];
        return `<td class="${v > 0 ? 'val' : 'zero'}">${v > 0 ? '¥' + v.toLocaleString() : '-'}</td>`;
      }).join('');
      return `<tr onclick="this.classList.toggle('expanded')">`
        + `<td><span class="cell-name">${esc(item.name)}</span></td>${cells}`
        + `</tr>`;
    }).join('');

    // qty≥2で未割り当て商品があるときはレシート合計按分を使わない（差額が歪むため）
    const hasUnassignedQty = items.some(it =>
      it.quantity > 1 && MEMBERS.reduce((s, m) => s + (it.qty?.[m.key] || 0), 0) < it.quantity
    );

    let totals, adjRow = null, splitWarning = null;
    if (receiptTotal > 0 && !hasUnassignedQty) {
      const result = calcSplitByReceipt(items, receiptTotal);
      totals       = result.finals;
      adjRow       = result.adjRow;
      splitWarning = result.warning;
    } else {
      totals = rawTotals;
    }

    // 調整額行（差額を自動按分した場合のみ表示）
    let adjRowHtml = '';
    if (adjRow) {
      const sign     = adjRow.total > 0 ? '＋' : '−';
      const absTotal = Math.abs(adjRow.total).toLocaleString();
      const adjCells = MEMBERS.map(m => {
        const v = adjRow.adj[m.key];
        if (v === 0) return `<td class="zero">-</td>`;
        return `<td class="val adj-val">${v > 0 ? '＋¥' : '−¥'}${Math.abs(v).toLocaleString()}</td>`;
      }).join('');
      adjRowHtml = `<tr class="adj-row">`
        + `<td><span class="cell-name">調整額（税など）<small>${sign}¥${absTotal}</small></span></td>`
        + adjCells + `</tr>`;
    }

    // 警告（5%以上のマイナス差額）
    let warningHtml = '';
    if (splitWarning) {
      const absStr = Math.abs(splitWarning.diff).toLocaleString();
      warningHtml = `<div class="split-warning">⚠️ 商品合計がレシート合計より¥${absStr}（${splitWarning.rate}%）多くなっています。商品の金額をご確認ください。</div>`;
    }

    const boxes = MEMBERS.map(m =>
      `<div class="total-box ${m.box}">`
      + `<div class="total-name">${esc(m.label)}</div>`
      + `<div class="total-yen">¥${totals[m.key].toLocaleString()}</div>`
      + `</div>`
    ).join('');

    const ths = MEMBERS.map(m => `<th class="${m.hcl}">${esc(m.label)}</th>`).join('');
    const fts = MEMBERS.map(m => `<td class="${m.fcl}">¥${totals[m.key].toLocaleString()}</td>`).join('');

    $('resultContent').innerHTML =
      `<div class="totals-grid">${boxes}</div>`
      + `<table class="detail-table">`
      +   `<thead><tr><th>商品</th>${ths}</tr></thead>`
      +   `<tbody>${rows}${adjRowHtml}</tbody>`
      +   `<tfoot><tr><td>合計</td>${fts}</tr></tfoot>`
      + `</table>`
      + warningHtml;
  }

  // ── イベントリスナー ──────────────────────────────────────────

  // IME 確定後に全角数字を半角に自動変換（スマホ日本語キーボード対策）
  $('itemPrice').addEventListener('compositionend', function () {
    const converted = zenToHan(this.value);
    if (converted) this.value = converted;
  });

  // 商品を追加フォームの折りたたみ
  let addFormOpen = false;
  window.toggleAddForm = function() {
    addFormOpen = !addFormOpen;
    const body    = $('addFormBody');
    const chevron = $('addFormChevron');
    const title   = chevron.closest('.add-form-title');
    body.style.display = addFormOpen ? '' : 'none';
    chevron.textContent = addFormOpen ? '▲' : '▼';
    title.classList.toggle('open', addFormOpen);
    if (addFormOpen) $('itemName').focus();
  };

  // 商品を追加 / Enter キーでフォーカス移動
  $('btnAdd').addEventListener('click', addItem);
  $('itemPrice').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addItem(); } });
  $('itemName').addEventListener('keydown',  e => { if (e.key === 'Enter') { e.preventDefault(); $('itemPrice').focus(); } });

  // 全商品クリア（確認ダイアログあり）
  $('btnClear').addEventListener('click', () => {
    if (items.length === 0) return;
    if (confirm('すべての商品をクリアしますか？')) { items.length = 0; receiptTotal = 0; render(); }
  });

  // もどるボタン → スタート画面へ
  $('btnBack').addEventListener('click', () => showScreen('screen-start'));

  // スタート画面の「レシートを読み込む」→ ボトムシート表示
  $('btnGoUpload').addEventListener('click', () => {
    $('bottomSheetOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  });

  // ボトムシート: オーバーレイ・キャンセルで閉じる
  function closeBottomSheet() {
    $('bottomSheetOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }
  $('bottomSheetOverlay').addEventListener('click', e => {
    if (e.target === $('bottomSheetOverlay')) closeBottomSheet();
  });
  $('bsBtnCancel').addEventListener('click', closeBottomSheet);

  // ボトムシート: カメラ（inputクリックを先に実行してiOSのジェスチャー制限を回避）
  $('bsBtnCamera').addEventListener('click', () => {
    $('startCameraInput').click();
    closeBottomSheet();
  });

  // ボトムシート: ライブラリ（同上）
  $('bsBtnLibrary').addEventListener('click', () => {
    $('startLibraryInput').click();
    closeBottomSheet();
  });

  // スタート画面でカメラ撮影 → アップロード画面を開いて OCR 自動開始
  $('startCameraInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) { showScreen('screen-upload'); handleFile(file); }
  });

  // スタート画面でライブラリ選択 → アップロード画面を開いて OCR 自動開始
  $('startLibraryInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) { showScreen('screen-upload'); handleFile(file); }
  });

  // アップロード画面のサブボタン（ライブラリ / カメラ）
  $('btnLibrary').addEventListener('click', () => $('fileInput').click());
  $('btnCamera').addEventListener('click',  () => $('cameraInput').click());

  // ファイル選択 → プレビュー表示 & OCR 自動開始
  $('fileInput').addEventListener('change',   e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
  $('cameraInput').addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

  // 「再解析する」ボタン（OCR 完了後に有効になる）
  $('btnAnalyze').addEventListener('click', () => {
    if (selectedFile) analyzeReceipt(selectedFile);
  });
</script>

</div><!-- /screen-main -->
<script>
  // Service Worker を登録してオフライン対応・PWA インストールを有効にする。
  // HTTPS（GitHub Pages）または localhost でのみ動作する。
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
      .then(() => console.log('Service Worker registered'));
  }
</script>
</body>
</html>
