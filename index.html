<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>わけっこ - 割り勘アプリ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#F4A987">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Zen Maru Gothic', 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #FFF5F5;
      color: #333333;
      min-height: 100vh;
      line-height: 1.75;
    }

    /* ========== ヘッダー / ロゴ ========== */
    .header {
      background: #fff;
      text-align: center;
      padding: 40px 16px 36px;
      border-bottom: 2px solid #FFE0E0;
    }
    .logo {
      font-size: 30px;
      font-weight: 900;
      color: #E8707A;
      letter-spacing: 8px;
    }
    .logo-sub {
      font-size: 12px;
      font-weight: 500;
      color: #999;
      margin-top: 6px;
      letter-spacing: 2px;
    }

    /* ========== 2カラム ========== */
    .layout {
      display: flex;
      gap: 32px;
      max-width: 1040px;
      margin: 0 auto;
      padding: 36px 32px;
      align-items: flex-start;
    }
    .col-left  { flex: 1; min-width: 0; }
    .col-right { flex: 1; min-width: 0; position: sticky; top: 36px; }

    /* ========== カード共通 ========== */
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 2px 10px rgba(200,100,100,0.06);
      margin-bottom: 28px;
    }
    .card-title {
      font-size: 12px;
      font-weight: 700;
      color: #E8707A;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #FFE8E8;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ========== フォーム ========== */
    .form-grid {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .form-grid input[type="text"] {
      flex: 1;
      min-width: 0;
    }
    .form-grid input[type="number"] {
      width: 100px;
      flex-shrink: 0;
    }
    .form-grid input {
      padding: 13px 18px;
      border: 1.5px solid #F0D8D8;
      border-radius: 16px;
      font-size: 14px;
      font-family: inherit;
      color: #333333;
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-grid input:focus {
      border-color: #E8707A;
      box-shadow: 0 0 0 3px rgba(232,112,122,0.10);
    }
    .form-grid input::placeholder { color: #ccc; }

    .btn-add {
      width: 100%;
      padding: 14px;
      background: #E8707A;
      color: #fff;
      border: none;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 2px;
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 3px 10px rgba(232,112,122,0.25);
    }
    .btn-add:hover { background: #D8606A; }
    .btn-add:active { transform: scale(0.98); }

    /* ========== 商品カード ========== */
    .item-card {
      background: #fff;
      border-radius: 18px;
      padding: 20px 22px;
      box-shadow: 0 2px 10px rgba(200,100,100,0.06);
      margin-bottom: 14px;
      animation: fadeUp 0.25s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    .item-top > div { min-width: 0; flex: 1; }
    .item-name {
      font-size: 14px;
      font-weight: 700;
      color: #333333;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-all;
    }
    .item-price-badge {
      display: inline-block;
      font-size: 13px;
      font-weight: 700;
      color: #E8707A;
      background: #FFF0F0;
      padding: 4px 14px;
      border-radius: 10px;
      margin-top: 6px;
    }
    .btn-del {
      background: #FFF5F5;
      border: 1px solid #F0D8D8;
      color: #D0A8A8;
      width: 30px;
      height: 30px;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .btn-del:hover {
      background: #FFE0E0;
      border-color: #E09090;
      color: #C05050;
    }

    /* ========== メンバー選択ピル ========== */
    .checks {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pill input { display: none; }
    .pill label {
      display: inline-block;
      padding: 6px 18px;
      border: 1.5px solid #F0D8D8;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      color: #bbb;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    /* 自分: ピンク */
    .pill input:checked + label.cl-me {
      border-color: #F0A0A8;
      background: #FFF0F0;
      color: #C85060;
      font-weight: 700;
    }
    /* Aさん: ミント */
    .pill input:checked + label.cl-a {
      border-color: #90C8B8;
      background: #F0FAF6;
      color: #408070;
      font-weight: 700;
    }
    /* Bさん: ラベンダー */
    .pill input:checked + label.cl-b {
      border-color: #C0B0D8;
      background: #F5F0FA;
      color: #685088;
      font-weight: 700;
    }
    /* Cさん: アプリコット */
    .pill input:checked + label.cl-c {
      border-color: #E8C098;
      background: #FFF8F0;
      color: #A87030;
      font-weight: 700;
    }

    .split-note {
      font-size: 11px;
      color: #bbb;
      margin-top: 10px;
    }
    .split-note b { color: #E8707A; }

    /* ========== 個数割り当てコントロール ========== */
    .qty-checks { display: flex; flex-direction: column; gap: 8px; }
    .qty-row { display: flex; align-items: center; justify-content: space-between; }
    .qty-label {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1.5px solid #F0D8D8;
      color: #bbb;
      min-width: 60px;
      text-align: center;
    }
    .qty-label.cl-me { border-color: #F0A0A8; background: #FFF0F0; color: #C85060; }
    .qty-label.cl-a  { border-color: #90C8B8; background: #F0FAF6; color: #408070; }
    .qty-label.cl-b  { border-color: #C0B0D8; background: #F5F0FA; color: #685088; }
    .qty-label.cl-c  { border-color: #E8C098; background: #FFF8F0; color: #A87030; }
    .qty-ctrl { display: flex; align-items: center; gap: 12px; }
    .qty-btn {
      background: #FFF5F5;
      border: 1.5px solid #F0D8D8;
      color: #E8707A;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      flex-shrink: 0;
    }
    .qty-btn:hover { background: #FFE0E0; }
    .qty-btn:disabled { opacity: 0.25; cursor: default; pointer-events: none; }
    .qty-num { font-size: 18px; font-weight: 700; color: #333; min-width: 24px; text-align: center; }
    .qty-unit-hint { font-size: 11px; font-weight: 400; color: #aaa; }
    .qty-remaining {
      font-size: 12px;
      font-weight: 700;
      text-align: right;
      margin-bottom: 6px;
      color: #E8707A;
    }
    .qty-remaining.complete { color: #5CBF8A; }
    .qty-total-hint { font-size: 11px; color: #ddd; margin-top: 4px; text-align: right; }

    .empty-msg {
      text-align: center;
      color: #ccc;
      padding: 48px 16px;
      font-size: 13px;
    }

    /* ========== 結果: 合計カード ========== */
    .totals-grid {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 4px;
    }
    .totals-grid::-webkit-scrollbar { display: none; }
    .total-box {
      flex: 1 0 auto;
      min-width: 80px;
      text-align: center;
      padding: 20px 14px;
      border-radius: 18px;
    }
    .total-box.me { background: #FFF0F0; }
    .total-box.a  { background: #F0FAF6; }
    .total-box.b  { background: #F5F0FA; }
    .total-box.c  { background: #FFF8F0; }

    .total-name {
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    .total-box.me .total-name { color: #C85060; }
    .total-box.a  .total-name { color: #408070; }
    .total-box.b  .total-name { color: #685088; }
    .total-box.c  .total-name { color: #A87030; }

    .total-yen {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.5px;
      white-space: nowrap;
      color: #333333;
    }

    /* ========== 内訳テーブル ========== */
    .detail-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13px;
    }
    .detail-table thead th {
      padding: 12px 6px;
      font-size: 11px;
      font-weight: 700;
      color: #bbb;
      text-align: center;
      border-bottom: 1px solid #FFE8E8;
    }
    .detail-table thead th:first-child { text-align: left; }
    .detail-table thead .h-me { color: #C85060; }
    .detail-table thead .h-a  { color: #408070; }
    .detail-table thead .h-b  { color: #685088; }
    .detail-table thead .h-c  { color: #A87030; }

    .detail-table tbody td {
      padding: 11px 6px;
      text-align: center;
      border-bottom: 1px solid #FFF0F0;
    }
    .detail-table tbody tr:last-child td { border-bottom: none; }
    .detail-table tbody td:first-child {
      text-align: left;
      font-weight: 500;
      color: #666666;
      font-size: 12px;
      max-width: 100px;
      word-break: break-all;
    }
    .detail-table tbody td:first-child .cell-name {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .detail-table tbody tr.expanded td:first-child .cell-name {
      -webkit-line-clamp: unset;
      overflow: visible;
    }
    .detail-table tbody tr { cursor: pointer; transition: background 0.15s; }
    .detail-table tbody tr:active { background: #FFF5F5; }
    .detail-table .val  { color: #333333; font-weight: 700; font-size: 14px; }
    .detail-table .zero { color: #ddd; }

    .detail-table tfoot td {
      padding: 14px 6px;
      font-weight: 900;
      font-size: 15px;
      text-align: center;
      border-top: 1px solid #FFE8E8;
      color: #333333;
    }
    .detail-table tfoot td:first-child { text-align: left; color: #666666; }

    .result-empty {
      text-align: center;
      color: #ccc;
      padding: 40px 0;
      font-size: 13px;
    }

    /* ========== クリアボタン ========== */
    .btn-clear {
      width: 100%;
      padding: 13px;
      background: #fff;
      color: #bbb;
      border: 1.5px solid #F0D8D8;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
    }
    .btn-clear:hover {
      background: #FFF5F5;
      border-color: #E8B0B0;
      color: #999;
    }

    /* ========== レスポンシブ ========== */
    @media (max-width: 720px) {
      .layout {
        flex-direction: column;
        padding: 24px 18px;
        gap: 24px;
      }
      .col-right { position: static; }
      .total-box { min-width: 72px; padding: 18px 10px; }
      .total-yen { font-size: 22px; }
      .form-grid { gap: 8px; }
      .header { padding: 32px 16px 28px; }
      .logo { font-size: 26px; letter-spacing: 6px; }
    }
    @media (max-width: 400px) {
      .logo { font-size: 22px; letter-spacing: 4px; }
      .logo-sub { font-size: 11px; }
      .totals-grid { gap: 8px; }
      .total-box { min-width: 68px; padding: 16px 8px; }
      .total-yen { font-size: 20px; }
      .form-grid { flex-wrap: wrap; }
      .form-grid input[type="text"] { flex: 1 1 100%; }
      .form-grid input[type="number"] { flex: 1 1 100%; width: auto; }
      .detail-table { font-size: 12px; }
      .detail-table .val { font-size: 13px; }
    }

    /* ========== スタート画面 ========== */
    #screen-start {
      min-height: 100vh;
      background: #FAF8F4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 32px 64px;
    }
    #screen-main { display: none; }

    .start-illustration {
      font-size: 64px;
      margin-bottom: 8px;
      line-height: 1;
    }
    .start-logo {
      font-size: 48px;
      font-weight: 900;
      color: #C9673A;
      letter-spacing: 10px;
      margin-bottom: 16px;
    }
    .start-tagline {
      font-size: 14px;
      font-weight: 500;
      color: #A89080;
      letter-spacing: 1.5px;
      text-align: center;
      line-height: 1.9;
      margin-bottom: 64px;
    }
    .btn-start {
      width: 100%;
      max-width: 320px;
      padding: 20px 24px;
      background: #C9673A;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(201,103,58,0.30);
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn-start:hover {
      background: #B8592E;
      box-shadow: 0 8px 24px rgba(201,103,58,0.38);
    }
    .btn-start:active {
      transform: scale(0.97);
      box-shadow: 0 3px 12px rgba(201,103,58,0.25);
    }
    .start-footer {
      margin-top: 40px;
      font-size: 11px;
      color: #C8B8B0;
      letter-spacing: 1px;
    }

    /* ========== レシート読み込み画面 ========== */
    #screen-upload {
      min-height: 100vh;
      background: #FAF8F4;
      display: none;
      flex-direction: column;
    }
    .upload-header {
      display: flex;
      align-items: center;
      padding: 20px 20px 0;
      position: relative;
      min-height: 52px;
    }
    .btn-back {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      color: #B09888;
      cursor: pointer;
      padding: 8px 4px;
      letter-spacing: 0.5px;
      z-index: 1;
    }
    .btn-back:active { opacity: 0.6; }
    .upload-page-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      font-weight: 700;
      color: #7A5C48;
      letter-spacing: 2.5px;
      white-space: nowrap;
    }
    .upload-body {
      flex: 1;
      padding: 28px 24px 56px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }
    /* 選択前: プレースホルダーゾーン */
    .upload-zone {
      display: block;
      width: 100%;
      aspect-ratio: 3 / 4;
      max-height: 52vh;
      border: 2px dashed #D4C4B8;
      border-radius: 24px;
      background: #FFFAF7;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      transition: border-color 0.2s, background 0.2s;
    }
    .upload-zone:hover       { border-color: #C9673A; background: #FFF6EF; }
    .upload-zone.has-image   { border-style: solid; border-color: #C9673A; }
    .upload-zone-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: opacity 0.2s;
    }
    .upload-zone.has-image .upload-zone-placeholder { opacity: 0; pointer-events: none; }
    .upload-zone-icon  { font-size: 52px; line-height: 1; }
    .upload-zone-label {
      font-size: 14px;
      font-weight: 700;
      color: #B09888;
      letter-spacing: 1.5px;
    }
    .upload-zone-sub {
      font-size: 11px;
      color: #C8B8B0;
      letter-spacing: 0.8px;
    }
    /* プレビュー画像 */
    .preview-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    .upload-zone.has-image .preview-img { display: block; }
    /* 選択済みバッジ */
    .preview-badge {
      position: absolute;
      bottom: 14px;
      right: 14px;
      background: rgba(201,103,58,0.88);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 6px 14px;
      border-radius: 20px;
      display: none;
    }
    .upload-zone.has-image .preview-badge { display: block; }
    /* ライブラリ / カメラ ボタン行 */
    .upload-btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .btn-upload-opt {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 18px 12px;
      background: #fff;
      border: 1.5px solid #E8D8CC;
      border-radius: 20px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      color: #8A6858;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(180,130,100,0.06);
    }
    .btn-upload-opt:hover  { background: #FFF5EE; border-color: #C9673A; color: #C9673A; }
    .btn-upload-opt:active { transform: scale(0.97); }
    .btn-upload-opt-icon   { font-size: 26px; line-height: 1; }
    /* 解析ボタン */
    .btn-analyze {
      width: 100%;
      padding: 20px 24px;
      background: #C9673A;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(201,103,58,0.30);
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s, opacity 0.2s;
      margin-top: 4px;
    }
    .btn-analyze:disabled {
      background: #D4C4B8;
      box-shadow: none;
      cursor: not-allowed;
      opacity: 0.65;
    }
    .btn-analyze:not(:disabled):hover  { background: #B8592E; box-shadow: 0 8px 24px rgba(201,103,58,0.38); }
    .btn-analyze:not(:disabled):active { transform: scale(0.97); box-shadow: 0 3px 12px rgba(201,103,58,0.22); }
    .upload-note {
      text-align: center;
      font-size: 11px;
      color: #C8B8B0;
      letter-spacing: 0.5px;
      line-height: 1.8;
    }

    /* ========== OCR解析結果 ========== */
    .ocr-result-box {
      background: #FFFAF7;
      border: 1.5px solid #E8D8CC;
      border-radius: 20px;
      padding: 20px;
    }
    .ocr-result-title {
      font-size: 12px;
      font-weight: 700;
      color: #C9673A;
      margin-bottom: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .ocr-text-area {
      font-size: 12px;
      color: #6A5848;
      line-height: 1.9;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 200px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
    }
    .ocr-parsed-list {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .ocr-parsed-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #FFF5EE;
      border-radius: 12px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      color: #7A5C48;
    }
    .ocr-parsed-item span:last-child {
      font-weight: 700;
      color: #C9673A;
    }
    .ocr-empty {
      text-align: center;
      color: #C8B8B0;
      font-size: 12px;
      padding: 12px 0;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

<!-- ========== スタート画面 ========== -->
<div id="screen-start">
  <div class="start-illustration">🧾</div>
  <div class="start-logo">わけっこ</div>
  <div class="start-tagline">レシートを読み込んで<br>かんたん割り勘</div>

<div class="header">

</div>

<div class="layout">
  <!-- ===== 左カラム: 入力 ===== -->
  <div class="col-left">
    <div class="card">
      <div class="card-title">商品を追加</div>

  </div>

  <!-- ===== 右カラム: 結果 ===== -->
  <div class="col-right">
    <div class="card" id="resultCard">
      <div class="card-title">計算結果</div>

        <div class="result-empty">商品を追加するとここに結果が表示されます</div>
      </div>
    </div>

<script>
  /* ================================================================
     わけっこ — メインロジック
     ----------------------------------------------------------------
     OCR エンジン: Google Cloud Vision API (TEXT_DETECTION)
     APIキーの渡し方: URL パラメータ ?APIkey=YOUR_KEY
       例) https://yuna-sowa.github.io/wakekko/?APIkey=AIzaSy...
           http://localhost:8080/?APIkey=AIzaSy...
     ================================================================ */

  // ── 定数・状態 ────────────────────────────────────────────────
  const MEMBERS = [
    { key: 'me', label: '自分',  cl: 'cl-me', box: 'me', hcl: 'h-me', fcl: 'f-me' },
    { key: 'a',  label: 'Aさん', cl: 'cl-a',  box: 'a',  hcl: 'h-a',  fcl: 'f-a'  },
    { key: 'b',  label: 'Bさん', cl: 'cl-b',  box: 'b',  hcl: 'h-b',  fcl: 'f-b'  },
    { key: 'c',  label: 'Cさん', cl: 'cl-c',  box: 'c',  hcl: 'h-c',  fcl: 'f-c'  },
  ];

  const items = [];
  const $ = id => document.getElementById(id);
  let selectedFile = null;
  let currentParsedResult = null; // OCR解析結果を保持するグローバル変数
  let receiptTotal = 0; // OCRで取得したレシート合計金額（差額按分に使用）

  // ── ユーティリティ ────────────────────────────────────────────

  // XSS 対策: ユーザー入力や外部テキストを innerHTML に埋め込む前にエスケープする
  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // 全角数字（IME 変換後など）を半角に統一して数値だけ返す
  function zenToHan(str) {
    return str
      .replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
      .replace(/[^0-9]/g, '');
  }

  // ── 画面切替 ──────────────────────────────────────────────────
  function showScreen(id) {
    ['screen-start', 'screen-upload', 'screen-main'].forEach(s => {
      const el = $(s);
      if (el) el.style.display = 'none';
    });
    const target = $(id);
    if (target) target.style.display = id === 'screen-upload' ? 'flex' : 'block';
  }

  // ── OCR ──────────────────────────────────────────────────────

  /**
   * 画像ファイルを受け取り、プレビュー表示と OCR を開始する。
   * fileInput / cameraInput / startCameraInput の change イベントから呼ぶ共通エントリ。
   */
  function handleFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    selectedFile = file;

    // プレビュー表示（FileReader で data URL に変換して <img> に渡す）
    const reader = new FileReader();
    reader.onload = e => {
      $('previewImg').src = e.target.result;
      $('uploadZone').classList.add('has-image');
    };
    reader.readAsDataURL(file);

    analyzeReceipt(file);
  }

  /**
   * 画像ファイルを純粋な Base64 文字列に変換する。
   * Vision API のリクエストボディに埋め込むため、data:... プレフィックスは除去する。
   */
  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload  = e => resolve(e.target.result.split(',')[1]); // "data:image/...;base64," を除去
      reader.onerror = () => reject(new Error('ファイルの読み込みに失敗しました'));
      reader.readAsDataURL(file);
    });
  }

  /**
   * Google Cloud Vision API（TEXT_DETECTION）で OCR を実行し、結果を画面に表示する。
   *
   * APIキーは URL パラメータ ?APIkey=... から取得する。
   * キーが未指定の場合はエラーメッセージを表示して処理を中断する。
   *
   * 処理フロー:
   *   1. URLSearchParams から APIキーを取得
   *   2. 画像を Base64 に変換
   *   3. Vision API に POST → fullTextAnnotation.text を取得
   *   4. Claude API でテキストから商品・金額を抽出
   *   5. 結果を画面に表示し、割り勘リストへ追加するボタンを出す
   */
  async function analyzeReceipt(file) {
    const btnAnalyze = $('btnAnalyze');
    const ocrResult  = $('ocrResult');
    const ocrText    = $('ocrText');
    const ocrParsed  = $('ocrParsedList');
    const btnGoMain  = $('btnGoMain');

    // 解析中 UI にリセット
    btnAnalyze.disabled     = true;
    btnAnalyze.textContent  = '解析中…';
    ocrResult.style.display = 'block';
    ocrText.textContent     = '解析しています…';
    ocrParsed.innerHTML     = '';
    btnGoMain.style.display = 'none';

    try {
      // 1. URLパラメータから APIキーを取得
      const apiKey    = new URLSearchParams(window.location.search).get('APIkey');
      const claudeKey = new URLSearchParams(window.location.search).get('ClaudeKey');
      if (!apiKey)    throw new Error('Google APIキーが指定されていません。URLに ?APIkey=YOUR_KEY を追加してください。');
      if (!claudeKey) throw new Error('Claude APIキーが指定されていません。URLに &ClaudeKey=YOUR_KEY を追加してください。');

      // 2. 画像を Base64 に変換
      const base64Image = await fileToBase64(file);

      // 3. Vision API へ POST
      ocrText.textContent = '① 文字を読み取り中…';
      const endpoint = `https://vision.googleapis.com/v1/images:annotate?key=${apiKey}`;
      const response = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          requests: [{
            image:    { content: base64Image },
            features: [{ type: 'DOCUMENT_TEXT_DETECTION' }],
          }],
        }),
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        const msg = err?.error?.message ?? `HTTP ${response.status}`;
        throw new Error(`Vision API エラー: ${msg}`);
      }

      // 4. fullTextAnnotation.text を取得
      const data       = await response.json();
      const annotation = data?.responses?.[0]?.fullTextAnnotation;
      const text       = annotation?.text ?? '';

      // 生テキストをそのまま表示（デバッグ・確認用）
      ocrText.textContent = text.trim() || '（テキストを検出できませんでした）';

      // 5. Claude AI で商品・金額・店名・合計を抽出
      ocrParsed.innerHTML = '<div class="ocr-empty">② AIが商品リストを作成中…</div>';
      currentParsedResult = await parseReceiptWithClaude(text, claudeKey); // グローバルに保持

      if (currentParsedResult.items.length > 0) {
        const metaRows = [
          currentParsedResult.storeName   ? `<div class="ocr-parsed-item ocr-meta"><span>店名</span><span>${esc(currentParsedResult.storeName)}</span></div>` : '',
          currentParsedResult.totalAmount ? `<div class="ocr-parsed-item ocr-meta"><span>合計</span><span>¥${currentParsedResult.totalAmount.toLocaleString()}</span></div>` : '',
        ].join('');
        ocrParsed.innerHTML = metaRows + currentParsedResult.items
          .map(it => {
            const qtyBadge = it.quantity > 1 ? ` <small>×${it.quantity}</small>` : '';
            return `<div class="ocr-parsed-item">`
              + `<span>${esc(it.name)}${qtyBadge}</span>`
              + `<span>¥${it.price.toLocaleString()}</span>`
              + `</div>`;
          })
          .join('');
        btnGoMain.textContent   = '割り勘リストに追加して進む →';
        btnGoMain.style.display = 'block';
        btnGoMain.onclick = () => {
          console.log('[btnGoMain] 保存データ:', currentParsedResult);
          localStorage.setItem('currentParsedResult', JSON.stringify(currentParsedResult));
          items.length = 0; // 既存データをクリアしてOCR結果のみ反映
          receiptTotal = currentParsedResult.totalAmount || 0;
          currentParsedResult.items.forEach(it => {
            const checked = {};
            MEMBERS.forEach(m => (checked[m.key] = false));
            const qty = {};
            MEMBERS.forEach(m => (qty[m.key] = 0));
            items.push({
              id: Date.now() + (Math.random() * 1000 | 0),
              name: it.name, price: it.price,
              quantity: it.quantity || 1, unitPrice: it.unitPrice || null,
              checked, qty,
            });
          });
          render();
          showScreen('screen-main');
        };
      } else {
        ocrParsed.innerHTML     = '<div class="ocr-empty">商品と金額を自動検出できませんでした。手動で入力してください。</div>';
        btnGoMain.textContent   = '手動で入力する →';
        btnGoMain.style.display = 'block';
        btnGoMain.onclick       = () => showScreen('screen-main');
      }
    } catch (err) {
      ocrText.textContent = `エラー: ${err.message ?? 'OCR処理に失敗しました。もう一度お試しください。'}`;
      ocrResult.style.display = 'block';
    } finally {
      btnAnalyze.disabled    = false;
      btnAnalyze.textContent = '再解析する';
    }
  }

  /**
   * Claude AI に OCR テキストを渡して商品リストを返す。
   * @param {string} text - Vision API の fullTextAnnotation.text
   * @param {string} claudeKey - Claude API キー
   * @returns {Promise<{ storeName: string, totalAmount: number, items: {name:string, price:number}[] }>}
   */
  async function parseReceiptWithClaude(text, claudeKey) {
    const prompt = `あなたはレシート解析AIです。以下のレシートOCRテキストから商品情報を抽出し、JSONのみで返してください。説明文は不要です。

## 抽出ルール
- storeName: 店名（不明なら空文字）
- totalAmount: 合計金額の数値（¥・カンマなし）
- items: 商品リスト
  - name: 商品名（記号・コード類を除いた読みやすい名前）
  - price: 割引・クーポン適用後の正の整数
- TEL・ポイント・消費税・日時などはitemsに含めない
- 割引・クーポンは該当商品の価格に反映させ、itemsには含めない

## 金額の読み方
- 金額の後に「内」「外」「税」が付いている場合（例: 1,078内）は、それを除いた数字が金額
- 「¥」「￥」「\\」は通貨記号として無視し、数字部分だけを金額とする

## 複数行にまたがる商品の読み方
- 「単価×数量」「@単価 数量」のような行は商品名ではなく数量・単価の補足行
- その場合、商品名はその直前の行、金額はその補足行に記載された合計金額を使う
- 例：
  おむつ           ← 商品名
  ¥298×2  596内   ← 単価×数量。商品名=おむつ、金額=596

## 個数がある商品の読み方
- 「ランチプレート ¥1,500×3 4,500内」のように単価・個数・合計がある場合は quantity と unitPrice も返す
- quantity: 個数（整数）、unitPrice: 単価（整数）、price: 合計金額（unitPrice × quantity）
- 個数が1または不明な場合は quantity と unitPrice は省略する

## 返答形式（JSONのみ、余分なテキストなし）
{"storeName":"","totalAmount":0,"items":[{"name":"","price":0,"quantity":3,"unitPrice":1500}]}

OCRテキスト:
${text}`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': claudeKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 2048,
        messages: [{ role: 'user', content: prompt }],
      }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      const msg = err?.error?.message ?? `HTTP ${res.status}`;
      throw new Error(`Claude API エラー: ${msg}`);
    }

    const data    = await res.json();
    const content = data?.content?.[0]?.text ?? '';
    const match   = content.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('Claude APIの応答からJSONを取得できませんでした');

    const parsed = JSON.parse(match[0]);
    return {
      storeName:   String(parsed.storeName  ?? '').trim(),
      totalAmount: Number(parsed.totalAmount) || 0,
      items: (parsed.items ?? [])
        .map(it => {
          const quantity = Number(it.quantity) || 1;
          const unitPrice = quantity > 1 ? (Number(it.unitPrice) || Math.round(Number(it.price) / quantity)) : null;
          return {
            name:      String(it.name ?? '').trim(),
            price:     Number(it.price) || 0,
            quantity:  quantity > 1 ? quantity : 1,
            unitPrice: quantity > 1 ? unitPrice : null,
          };
        })
        .filter(it => it.name && it.price > 0),
    };
  }

  // ── 商品リスト操作 ────────────────────────────────────────────
  function addItem() {
    const name  = $('itemName').value.trim();
    const price = parseInt($('itemPrice').value, 10);
    if (!name)                     { $('itemName').focus();  return; }
    if (isNaN(price) || price < 0) { $('itemPrice').focus(); return; }

    const checked = {};
    MEMBERS.forEach(m => (checked[m.key] = false));
    items.push({ id: Date.now(), name, price, checked });

    $('itemName').value  = '';
    $('itemPrice').value = '';
    $('itemName').focus();
    render();
  }

  function deleteItem(id) {
    const i = items.findIndex(x => x.id === id);
    if (i !== -1) { items.splice(i, 1); render(); }
  }

  function toggle(itemId, key) {
    const item = items.find(x => x.id === itemId);
    if (item) { item.checked[key] = !item.checked[key]; render(); }
  }

  function setQty(itemId, key, val) {
    const item = items.find(x => x.id === itemId);
    if (!item) return;
    const currentTotal = MEMBERS.reduce((s, m) => s + (item.qty[m.key] || 0), 0);
    const delta = val - (item.qty[key] || 0);
    if (delta > 0 && currentTotal + delta > item.quantity) return;
    item.qty[key] = Math.max(0, val);
    render();
  }

  // 各メンバーの負担額を計算する。
  // 個数割り当てモード（quantity > 1）: 割り当て個数×単価で按分、端数は先頭から1円加算。
  // チェックモード: 1円未満の端数は先頭のメンバーから順に1円ずつ上乗せして完全に分配する。
  // チェックなし／個数未割り当ての場合は「自分」に全額を加算する。
  function calcShares(item) {
    const shares = {};
    MEMBERS.forEach(m => (shares[m.key] = 0));

    if (item.quantity > 1) {
      const assigned = MEMBERS.filter(m => (item.qty?.[m.key] || 0) > 0);
      const totalAssigned = MEMBERS.reduce((s, m) => s + (item.qty?.[m.key] || 0), 0);
      if (totalAssigned === 0) { shares.me = item.price; return shares; }
      assigned.forEach(m => {
        shares[m.key] = Math.floor(item.price * item.qty[m.key] / totalAssigned);
      });
      // 未割当分（1円単位端数）を先頭のメンバーから配分
      const unassignedQty = item.quantity - totalAssigned;
      if (unassignedQty > 0) {
        const unassignedPrice = Math.round(item.price * unassignedQty / item.quantity);
        shares.me = (shares.me || 0) + unassignedPrice;
      }
      let rem = item.price - MEMBERS.reduce((s, m) => s + shares[m.key], 0);
      for (const m of assigned) { if (rem <= 0) break; shares[m.key]++; rem--; }
      return shares;
    }

    const sel = MEMBERS.filter(m => item.checked[m.key]);
    if (sel.length === 0) { shares.me = item.price; return shares; }
    const base = Math.floor(item.price / sel.length);
    const rem  = item.price % sel.length;
    sel.forEach((m, i) => { shares[m.key] = base + (i < rem ? 1 : 0); });
    return shares;
  }

  /**
   * レシート合計に基づく割り勘計算。
   *
   * 商品按分の合計とレシート合計の差額（税・値引き端数など）を
   * 各人の購入金額比率で按分し、四捨五入の端数は支払者に集約する。
   * 最終的に全員の合計がレシート合計と完全一致することを保証する。
   *
   * @param {Array}  itemList     - items 配列（price + checked を持つオブジェクト）
   * @param {number} receiptTotal - レシート合計金額
   * @param {string} [payer]      - 端数調整を受けるメンバーキー（default: 'me'）
   * @returns {Object}            - メンバーキーごとの最終負担額 { me, a, b, c }
   */
  function calcSplitByReceipt(itemList, receiptTotal, payer = 'me') {
    const keys = MEMBERS.map(m => m.key);

    // 1. 各人の商品合計（既存の calcShares を再利用）
    const raw = {};
    keys.forEach(k => (raw[k] = 0));
    for (const item of itemList) {
      const sh = calcShares(item);
      keys.forEach(k => (raw[k] += sh[k]));
    }

    // 2. 差額算出（税・端数・値引きなどによるズレ）
    const itemsTotal = keys.reduce((s, k) => s + raw[k], 0);
    const diff = receiptTotal - itemsTotal;

    if (diff === 0) return { ...raw };

    // 3. 差額を購入金額比率で按分 → 四捨五入
    const adj = {};
    if (itemsTotal > 0) {
      keys.forEach(k => {
        adj[k] = Math.round((raw[k] / itemsTotal) * diff);
      });
    } else {
      // 全員0円（商品なし）→ 支払者が全額負担
      keys.forEach(k => (adj[k] = 0));
      adj[payer] = diff;
    }

    // 4. 四捨五入による端数ズレを支払者に加減
    const adjSum = keys.reduce((s, k) => s + adj[k], 0);
    adj[payer] += diff - adjSum;

    // 5. 最終金額（全員合計 === receiptTotal を保証）
    const finals = {};
    keys.forEach(k => (finals[k] = raw[k] + adj[k]));
    return finals;
  }

  // 商品カードに表示する割り勘ヒント文を返す
  function hint(item) {
    if (item.quantity > 1) {
      const totalAssigned = MEMBERS.reduce((s, m) => s + (item.qty?.[m.key] || 0), 0);
      if (totalAssigned === 0) return `<b>⚠️ ${item.quantity}個を誰かに割り当ててください</b>`;
      const parts = MEMBERS.filter(m => (item.qty?.[m.key] || 0) > 0)
        .map(m => `${m.label}×${item.qty[m.key]}`).join(' ＋ ');
      const unassigned = item.quantity - totalAssigned;
      const suffix = unassigned > 0
        ? `　<b>⚠️ 残り${unassigned}個を割り当ててください</b>`
        : '　<b>✓ 割り当て完了</b>';
      return parts + suffix;
    }
    const sel = MEMBERS.filter(m => item.checked[m.key]);
    if (sel.length === 0) return '<b>自分に全額加算</b>';
    return `${sel.map(m => m.label).join(' + ')} で <b>${sel.length}人割り</b>`;
  }

  function render() {
    if (items.length === 0) {
      $('itemList').innerHTML      = '<div class="empty-msg">商品を追加すると、ここに一覧が表示されます</div>';
      $('resultContent').innerHTML = '<div class="result-empty">商品を追加するとここに結果が表示されます</div>';
      return;
    }

    $('itemList').innerHTML = items.map(item => {
      let controls, priceBadge;

      if (item.quantity > 1) {
        // 個数割り当てモード
        const totalAssigned = MEMBERS.reduce((s, m) => s + (item.qty?.[m.key] || 0), 0);
        const remaining = item.quantity - totalAssigned;
        const complete  = remaining === 0;
        const qtyRows = MEMBERS.map(m => {
          const v = item.qty?.[m.key] || 0;
          const minusDis = v <= 0        ? 'disabled' : '';
          const plusDis  = remaining <= 0 ? 'disabled' : '';
          return `<div class="qty-row">`
            + `<span class="qty-label ${m.cl}">${esc(m.label)}</span>`
            + `<div class="qty-ctrl">`
            +   `<button class="qty-btn" onclick="setQty(${item.id},'${m.key}',${v - 1})" ${minusDis}>−</button>`
            +   `<span class="qty-num">${v}</span>`
            +   `<button class="qty-btn" onclick="setQty(${item.id},'${m.key}',${v + 1})" ${plusDis}>＋</button>`
            + `</div>`
            + `</div>`;
        }).join('');
        const remainingLabel = complete
          ? `<div class="qty-remaining complete">✓ 全${item.quantity}個を割り当て済み</div>`
          : totalAssigned === 0
            ? `<div class="qty-remaining">⚠️ ${item.quantity}個を割り当ててください</div>`
            : `<div class="qty-remaining">残り ${remaining}個</div>`;
        controls = remainingLabel
          + `<div class="qty-checks">${qtyRows}</div>`
          + `<div class="qty-total-hint">合計 ${totalAssigned} / ${item.quantity}個</div>`;
        priceBadge = `¥${item.price.toLocaleString()} `
          + `<span class="qty-unit-hint">(¥${item.unitPrice.toLocaleString()}×${item.quantity})</span>`;
      } else {
        // チェックボックスモード
        const pills = MEMBERS.map(m => {
          const uid = `c_${item.id}_${m.key}`;
          const chk = item.checked[m.key] ? 'checked' : '';
          return `<span class="pill">`
            + `<input type="checkbox" id="${uid}" ${chk} onchange="toggle(${item.id},'${m.key}')">`
            + `<label for="${uid}" class="${m.cl}">${esc(m.label)}</label>`
            + `</span>`;
        }).join('');
        controls = `<div class="checks">${pills}</div>`;
        priceBadge = `¥${item.price.toLocaleString()}`;
      }

      return `<div class="item-card">`
        + `<div class="item-top">`
        +   `<div>`
        +     `<div class="item-name">${esc(item.name)}</div>`
        +     `<span class="item-price-badge">${priceBadge}</span>`
        +   `</div>`
        +   `<button class="btn-del" onclick="deleteItem(${item.id})" title="削除">&times;</button>`
        + `</div>`
        + controls
        + `<div class="split-note">${hint(item)}</div>`
        + `</div>`;
    }).join('');

    const rawTotals = {};
    MEMBERS.forEach(m => (rawTotals[m.key] = 0));

    const rows = items.map(item => {
      const sh = calcShares(item);
      MEMBERS.forEach(m => (rawTotals[m.key] += sh[m.key]));
      const cells = MEMBERS.map(m => {
        const v = sh[m.key];
        return `<td class="${v > 0 ? 'val' : 'zero'}">${v > 0 ? '¥' + v.toLocaleString() : '-'}</td>`;
      }).join('');
      return `<tr onclick="this.classList.toggle('expanded')">`
        + `<td><span class="cell-name">${esc(item.name)}</span></td>${cells}`
        + `</tr>`;
    }).join('');

    const totals = receiptTotal > 0
      ? calcSplitByReceipt(items, receiptTotal)
      : rawTotals;

    const boxes = MEMBERS.map(m =>
      `<div class="total-box ${m.box}">`
      + `<div class="total-name">${esc(m.label)}</div>`
      + `<div class="total-yen">¥${totals[m.key].toLocaleString()}</div>`
      + `</div>`
    ).join('');

    const ths = MEMBERS.map(m => `<th class="${m.hcl}">${esc(m.label)}</th>`).join('');
    const fts = MEMBERS.map(m => `<td class="${m.fcl}">¥${totals[m.key].toLocaleString()}</td>`).join('');

    $('resultContent').innerHTML =
      `<div class="totals-grid">${boxes}</div>`
      + `<table class="detail-table">`
      +   `<thead><tr><th>商品</th>${ths}</tr></thead>`
      +   `<tbody>${rows}</tbody>`
      +   `<tfoot><tr><td>合計</td>${fts}</tr></tfoot>`
      + `</table>`;
  }

  // ── イベントリスナー ──────────────────────────────────────────

  // IME 確定後に全角数字を半角に自動変換（スマホ日本語キーボード対策）
  $('itemPrice').addEventListener('compositionend', function () {
    const converted = zenToHan(this.value);
    if (converted) this.value = converted;
  });

  // 商品を追加 / Enter キーでフォーカス移動
  $('btnAdd').addEventListener('click', addItem);
  $('itemPrice').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addItem(); } });
  $('itemName').addEventListener('keydown',  e => { if (e.key === 'Enter') { e.preventDefault(); $('itemPrice').focus(); } });

  // 全商品クリア（確認ダイアログあり）
  $('btnClear').addEventListener('click', () => {
    if (items.length === 0) return;
    if (confirm('すべての商品をクリアしますか？')) { items.length = 0; receiptTotal = 0; render(); }
  });

  // もどるボタン → スタート画面へ
  $('btnBack').addEventListener('click', () => showScreen('screen-start'));

  // スタート画面の「レシートを読み込む」→ カメラ起動
  $('btnGoUpload').addEventListener('click', () => $('startCameraInput').click());

  // スタート画面でカメラ撮影 → アップロード画面を開いて OCR 自動開始
  $('startCameraInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) { showScreen('screen-upload'); handleFile(file); }
  });

  // アップロード画面のサブボタン（ライブラリ / カメラ）
  $('btnLibrary').addEventListener('click', () => $('fileInput').click());
  $('btnCamera').addEventListener('click',  () => $('cameraInput').click());

  // ファイル選択 → プレビュー表示 & OCR 自動開始
  $('fileInput').addEventListener('change',   e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
  $('cameraInput').addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

  // 「再解析する」ボタン（OCR 完了後に有効になる）
  $('btnAnalyze').addEventListener('click', () => {
    if (selectedFile) analyzeReceipt(selectedFile);
  });
</script>

</div><!-- /screen-main -->
<script>
  // Service Worker を登録してオフライン対応・PWA インストールを有効にする。
  // HTTPS（GitHub Pages）または localhost でのみ動作する。
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
      .then(() => console.log('Service Worker registered'));
  }
</script>
</body>
</html>
